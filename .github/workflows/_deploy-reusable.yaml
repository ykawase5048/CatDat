name: Reusable Deployment Workflow

on:
  workflow_call:
    inputs:
      is_prod:
        required: true
        type: boolean
    secrets:
      NETLIFY_SITE_ID:
        required: true
      NETLIFY_ACCESS_TOKEN:
        required: true
      PUBLIC_ADMIN_URL:
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Use Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.14.0
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm i

      - name: Build database
        run: |
          pnpm db:setup
          pnpm db:update

      - name: Build app
        env:
          PUBLIC_PLAYWRIGHT: ''
          PUBLIC_ADMIN_URL: ${{ secrets.PUBLIC_ADMIN_URL }}
        run: pnpm build

      - name: Get latest commit message
        id: msg
        run: |
          echo "COMMIT_MESSAGE<<EOF" >> $GITHUB_ENV
          git log -1 --pretty=%B >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Deploy to Netlify
        run: |
          pnpm --package=netlify-cli dlx netlify deploy --no-build \
            --dir build \
            --site ${{ secrets.NETLIFY_SITE_ID }} \
            --auth ${{ secrets.NETLIFY_ACCESS_TOKEN }} \
            --message "${{ env.COMMIT_MESSAGE }}" \
            ${{ inputs.is_prod && '--prod' || '' }}

      - name: Create deployment tag
        if: ${{ success() && inputs.is_prod }}
        run: |
          TIMESTAMP=$(date -u +'%Y%m%d-%H%M%S')
          TAG="deploy-${TIMESTAMP}-${GITHUB_SHA::7}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Deploy $TAG"
          git push --no-verify origin "$TAG"
