id: Z_div
name: preordered set of integers w.r.t. divisibility
notation: $(\IZ,\mid)$
objects: integers
morphisms: 'a unique morphism $(a,b) : a \to b$ if $a$ divides $b$'
description: This is a preordered set, not a partially ordered set, because $a$ and $-a$ divide each other, but are not equal for $a \neq 0$. Notice that this category is equivalent (but not isomorphic) to $(\IN,\mid)$.
nlab_link: null

tags:
  - number theory
  - thin

related:
  - N

satisfied_properties:
  - property: small
    proof: This is trivial.

  - property: countable
    proof: This is trivial.

  - property: thin
    proof: This is trivial.
    check_redundancy: false

  - property: distributive
    proof: 'We need to prove $\lcm_i \gcd(a, b_i) \cong \gcd(a, \lcm_i b_i)$ for finite families. If $x$ denotes the LHS and $y$ denotes the RHS, the relation $x \mid y$ is formal. If $v_p(-) : \IZ \to \IN_{\infty}$  denotes the multiplicity of a prime $p$, then $v_p(x)$ equals $\max_i \min(v_p(a),v_p(b_i))$, and $v_p(y)$ equals $\min(v_p(a), \max_i v_p(b_i))$. Since our family is finite, there is some $i_0$ with $\max_i v_p(b_i) = v_p(b_{i_0})$. Then $v_p(x) \geq \min(v_p(a),v_p(b_{i_0})) = v_p(y)$. This proves $y \mid x$.'

  - property: locally ℵ₁-presentable
    proof: Every $\aleph_1$-directed diagram is eventually constant.

unsatisfied_properties:
  - property: skeletal
    proof: The integers $+1$ and $-1$ are isomorphic, but not equal.

  - property: self-dual
    proof: The only integer with infinitely many divisors (up to isomorphism) is $0$. But many integers have infinitely many multiples (up to isomorphism).

  - property: countably distributive
    proof: We have $2 \times \coprod_n 3^n = \gcd(2,\lcm_n(3^n)) = \gcd(2,0) = 2$, but $\coprod_n (2 \times 3^n) = \lcm_n \gcd(2,3^n) = \lcm_n 1  = 1$.

  - property: countably codistributive
    proof: If $p$ runs through all odd primes, we have $2 \sqcup \prod_p p = \lcm(2,\gcd_p p) = \lcm(2,0) = 0$, but $\prod_p (2 \sqcup p) = \gcd_p (\lcm(2,p)) = \gcd_p (2 \cdot p) = 2$.

special_objects:
  initial object:
    description: $1$
  terminal object:
    description: $0$
  coproducts:
    description: the least common multiple, can be $0$ for infinite families
  products:
    description: greatest common divisor

special_morphisms:
  isomorphisms:
    description: 'the identities $(a,a) : a \to a$ and the isomorphisms $(a,-a) : a \to -a$ for $a \in \IZ$'
    proof: This is trivial.
