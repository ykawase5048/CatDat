id: Ring
name: category of rings
notation: $\Ring$
objects: rings
morphisms: ring homomorphisms
description: Here, rings always have a unit, and homomorphisms preserve them.
nlab_link: https://ncatlab.org/nlab/show/Ring

tags:
  - algebra

related:
  - Alg(R)
  - CRing
  - Rng

comments:
  - It is likely that the epimorphisms can be described as for <a href="/category/CRing">$\CRing$</a>.

satisfied_properties:
  - property: locally small
    proof: There is a forgetful functor $\Ring \to \Set$ and $\Set$ is locally small.

  - property: finitary algebraic
    proof: Take the algebraic theory of a ring.

  - property: strict terminal object
    proof: 'If $f : 0 \to R$ is a homomorphism, then $R$ satisfies $1=f(1)=f(0)=0$, so that $R=0$.'

  - property: Malcev
    proof: This follows in the same way as for <a href="/category/Grp">$\Grp$</a>, see also Example 2.2.5 in <a href="https://ncatlab.org/nlab/show/Malcev,+protomodular,+homological+and+semi-abelian+categories" target="_blank">Malcev, protomodular, homological and semi-abelian categories</a>.

  - property: disjoint finite products
    proof: 'To show that $A \sqcup_{A \times B} B$ is trivial, let $R$ be a ring which admits homomorphisms $f : A \to R$, $g : B \to R$ with $f(p_1(a,b))=g(p_2(a,b))$ for all $(a,b) \in A \times B$, i.e. $f(a)=g(b)$. Applying this to $a=0$, $b=1$ yields $1=0$ in $R$.'

unsatisfied_properties:
  - property: skeletal
    proof: This is trivial.

  - property: balanced
    proof: The inclusion $\IZ \hookrightarrow \IQ$ is a counterexample.

  - property: semi-strongly connected
    proof: This is because already the full subcategory <a href="/category/CRing">$\CRing$</a> does not have this property.

  - property: cogenerating set
    proof: 'We apply <a href="/content/missing_cogenerating_sets">this lemma</a> to the collection of fields: If $F$ is a field and $R$ is a non-trivial ring, any ring homomorphism $F \to R$ is injective. For every infinite cardinal $\kappa$ the field of rational functions in $\kappa$ variables has cardinality $\geq \kappa$ and a non-trivial automorphism (swap two variables).'

  - property: codistributive
    proof: 'If $\sqcup$ denotes the coproduct of rings (see <a href="https://math.stackexchange.com/questions/625874" target="_blank">MSE/625874</a> for their description) and $R$ is a ring, the canonical morphism $R \sqcup \IZ^2 \to (R \sqcup \IZ)^2 = R^2$ is usually no isomorphism. For example, for $R = \IZ[X]$ the coproduct on the LHS is not commutative, it has the ring presentation $\langle X,E : E^2=E \rangle$.'

  - property: co-Malcev
    proof: 'See <a href="https://mathoverflow.net/questions/509552">MO/509552</a>: Consider the forgetful functor $U : \Ring \to \Set$ and the relation $R \subseteq U^2$ defined by $R(A) \coloneqq \{(a,b) \in U(A)^2 : ab = a^2\}$. Both are representable: $U$ by $\IZ[X]$ and $S$ by $\IZ \langle X,Y \rangle / \langle XY-X^2 \rangle$. It is clear that $R$ is reflexive, but not symmetric.'

  - property: coregular
    proof: 'Let $B \coloneqq M_2(\IQ)$ and $A \coloneqq \IQ^2$. Then $A \to B$, $(x,y) \mapsto \diag(x,y)$ is a regular monomorphism: A direct calculation shows that a matrix is diagonal iff it commutes with $M \coloneqq \bigl(\begin{smallmatrix} 1 & 0 \\ 0 & 2 \end{smallmatrix}\bigr)$, so that $A \to B$ is the equalizer of the identity $B \to B$ and the conjugation $B \to B$, $X \mapsto M X M^{-1}$. Consider the homomorphism $A \to K$, $(a,b) \mapsto a$. We claim that $K \to K \sqcup_A B$ is not a monomorphism, because in fact, the pushout $K \sqcup_A B$ is zero: Since $A \to K$ is surjective with kernel $0 \times K$, the pushout is $B/\langle 0 \times K \rangle$, which is $0$ because $B$ is simple (<a href="https://math.stackexchange.com/questions/22629" target="_blank">proof</a>) or via a direct calculation with elementary matrices.'

  - property: regular quotient object classifier
    proof: We may copy the proof for <a href="/category/CRing">$\CRing$</a> (since the proof there did not use that $P$ is commutative). Alternatively, any regular quotient object classifier in $\Ring$ would produce one in $\CRing$ by Lemma 1 <a href="/content/subcategories">here</a> (dualized).

  - property: cocartesian cofiltered limits
    proof: >-
      Consider the ring $A = \IZ[X]$ and the sequence of rings $B_n = \IZ[Y]/(Y^{n+1})$ with projections $B_{n+1} \to B_n$, whose limit is $\IZ[[Y]]$. Every element in the coproduct of rings $\IZ[X] \sqcup \IZ[[Y]]$ has a finite "free product" length. Now consider the elements
      $$w_n = (1 + XY) (1+XY^2) \cdots (1+X Y^n) \in A \sqcup B_n.$$
      Because of $w_n \equiv w_{n-1} \bmod Y^n$ these form an element $w \in \lim_n (A \sqcup B_n)$. Expanding $w_n$, the longest term is $XY XY^2 \cdots X Y^n$ of "free product" length $2n$, which is unbounded.

  - property: cofiltered-limit-stable epimorphisms
    proof: We know that <a href="/category/CRing">$\CRing$</a> does not have this property. Now use the contrapositive of the dual of Lemma 2 <a href="/content/subcategories">here</a> applied to the forgetful functor $\CRing \to \Ring$. It preserves epimorphisms by <a href="https://math.stackexchange.com/questions/5133488" target="_blank">MSE/5133488</a>.

  - property: effective cocongruences
    proof: See <a href="https://mathoverflow.net/a/510809" target="_blank">MO/510744</a>.

special_objects:
  initial object:
    description: ring of integers
  terminal object:
    description: zero ring
  coproducts:
    description: see <a href="https://math.stackexchange.com/questions/625874" target="_blank">MSE/625874</a>
  products:
    description: direct products with pointwise operations

special_morphisms:
  isomorphisms:
    description: bijective ring homomorphisms
    proof: This characterization holds in every algebraic category.
  monomorphisms:
    description: injective ring homomorphisms
    proof: 'This holds in every finitary algebraic category: the forgetful functor to $\Set$ is faithful, hence reflects monomorphisms, and it is continuous (even representable), hence preserves monomorphisms.'
  regular epimorphisms:
    description: surjective homomorphisms
    proof: This holds in every finitary algebraic category.
