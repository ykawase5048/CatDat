id: FinAb
name: category of finite abelian groups
notation: $\FinAb$
objects: finite abelian groups
morphisms: group homomorphisms
description: null
nlab_link: https://ncatlab.org/nlab/show/finite+abelian+group

tags:
  - algebra

related:
  - Ab
  - Ab_fg
  - FinGrp
  - TorsAb

satisfied_properties:
  - property: locally small
    proof: There is a forgetful functor $\FinAb \to \Set$ and $\Set$ is locally small.

  - property: locally finite
    proof: There is a faithful functor $\FinAb \to \FinSet$ and <a href="/category/FinSet">$\FinSet$</a> is locally finite.

  - property: essentially countable
    proof: The underlying set of a finite structure can be chosen to be a subset of $\IN$.

  - property: abelian
    proof: This follows from the fact for <a href="/category/Ab">$\Ab$</a>.

  - property: self-dual
    proof: 'This is a simple special case of Pontryagin duality: The functor $\Hom(-,\IQ/\IZ)$ provides the equivalence.'

unsatisfied_properties:
  - property: small
    proof: Even the collection of trivial groups is not small.

  - property: skeletal
    proof: There are many trivial and hence isomorphic groups which are not equal.

  - property: countable
    proof: This is trivial.

  - property: split abelian
    proof: The sequence $0 \to \IZ/2 \to \IZ/4 \to \IZ/2 \to 0$ does not split.

  - property: generator
    proof: If $A,B$ are finite abelian groups whose orders are coprime, then we know that $\Hom(A,B)$ is trivial. But a generator would admit a non-trivial homomorphism to any other non-trivial finite abelian group.

special_objects:
  initial object:
    description: trivial group
  terminal object:
    description: trivial group
  coproducts:
    description: '[finite case] direct sum'
  products:
    description: '[finite case] direct products with pointwise operations'

special_morphisms:
  isomorphisms:
    description: bijective homomorphisms
    proof: It is a full subcategory of $\Ab$, for which we know that isomorphisms are bijective homomorphisms.
  monomorphisms:
    description: injective homomorphisms
    proof: 'Let $f : A \to B$ be a monomorphism of finite abelian groups. Let $a \in A$ be in the kernel of $a$, say of order $n$. Then we may view $a$ as a morphism $a : \IZ/n \to A$ with $f \circ a = 0$, and $\IZ/n$ is finite. Hence, $a = 0$.'
  epimorphisms:
    description: surjective homomorphisms
    proof: Use the same proof as for abelian groups.
