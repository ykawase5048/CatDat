id: BG_c
name: delooping of an infinite countable group
notation: $BG$
objects: a single object
morphisms: the elements of an infinite countable group $G$
description: Every group $G$ yields a groupoid $BG$ with a single object $*$, morphisms given by the elements of $G$, and composition given by the group operation. In this example, we consider the case of an infinite countable group $G$ (such as $G = \IZ$).
nlab_link: https://ncatlab.org/nlab/show/delooping

tags:
  - algebra
  - category theory
  - single object

related:
  - BG_f
  - BG_u
  - BN

satisfied_properties:
  - property: small
    proof: This is trivial.

  - property: groupoid
    proof: This is trivial.

  - property: connected
    proof: This is trivial.

  - property: skeletal
    proof: There is just one object.

  - property: generator
    proof: The unique object is a generator for trivial reasons.

  - property: countable
    proof: This is because $G$ is countable.

unsatisfied_properties:
  - property: locally finite
    proof: This is because we choose $G$ to be infinite.

special_objects: {}

special_morphisms:
  isomorphisms:
    description: every morphism
    proof: It is a groupoid.
  monomorphisms:
    description: every morphism
    proof: This is trivial.
  epimorphisms:
    description: every morphism
    proof: This holds because it is a groupoid.
  regular monomorphisms:
    description: same as monomorphisms
    proof: This is because the category is mono-regular.
  regular epimorphisms:
    description: same as isomorphisms
    proof: This is because the category is left cancellative.
