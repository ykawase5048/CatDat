id: N_oo
name: partially ordered set of extended natural numbers
notation: $(\IN_\infty, \leq)$
objects: natural numbers and $\infty$
morphisms: 'a unique morphism $(n, m) : n \to m$ if $n \leq m$, where of course $n \leq \infty$ for all $n$'
description: null
nlab_link: null

tags:
  - number theory

related:
  - N
  - On

satisfied_properties:
  - property: small
    proof: This is trivial.

  - property: countable
    proof: This is trivial.

  - property: coproducts
    proof: Take the supremum.
    check_redundancy: false

  - property: semi-strongly connected
    proof: This is trivial.

  - property: direct
    proof: This is because the natural numbers with $\infty$ with respect to $<$ are well-founded.

  - property: locally strongly finitely presentable
    proof: We already saw that coproducts, and therefore colimits exist. Every natural number is strongly finitely presentable, and $\infty$ is the colimit of all $n < \infty$.

unsatisfied_properties:
  - property: essentially finite
    proof: This is trivial.

  - property: self-dual
    proof: This is because every upper set is infinite, but every lower set is finite.

  - property: inverse
    proof: Consider the strictly increasing sequence $0 < 1 < 2 < \cdots$.

  - property: finitary algebraic
    proof: This follows from <a href="/content/thin_algebraic_categories">this lemma</a>.

special_objects:
  initial object:
    description: $0$
  terminal object:
    description: $\infty$
  coproducts:
    description: supremum
  products:
    description: infimum

special_morphisms:
  isomorphisms:
    description: only the identity morphisms
    proof: This is true for every poset (regarded as a thin category).
