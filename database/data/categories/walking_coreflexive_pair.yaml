id: walking_coreflexive_pair
name: walking coreflexive pair
notation: $\Delta^{\leq 1}$
objects: two objects $[0]$ and $[1]$
morphisms: 'the identities, two morphisms $i,j : [0] \rightrightarrows [1]$, a morphism $p : [1] \to [0]$ with $p i = p j = \id_{[0]}$, and the two idempotent morphisms $ip, jp : [1] \to [1]$.'
description: >-
  This category is equal to the truncated simplex category $\Delta^{\leq 1}$, i.e. the full subcategory of $\Delta$ spanned by $[0] = \{0\}$ and $[1] = \{0 < 1\}$; this also explains our notation of the category and its objects.
  $$[0] \begin{array}{c} \xhookrightarrow{~~i~~} \\ \xtwoheadleftarrow{~~p~~} \\ \xhookrightarrow{~~j~~} \end{array} [1]$$
  The morphisms $i,j$ are the two inclusions, $p$ is their unique retraction, and $ip,jp : [1] \to [1]$ are the two constant maps. The name of this category comes from the fact that a functor $\Delta^{\leq 1} \to \C$ is the same as a <a href="https://ncatlab.org/nlab/show/reflexive+pair" target="_blank">coreflexive pair</a> in $\C$. Its dual is therefore the walking reflexive pair.
nlab_link: null
tags:
  - category theory

related:
  - Delta
  - walking_pair
  - walking_splitting

satisfied_properties:
  - property: small
    proof: This is trivial.

  - property: finite
    proof: This is trivial.

  - property: strongly connected
    proof: This is trivial.

  - property: gaunt
    proof: This is obvious.

  - property: terminal object
    proof: The object $[0]$ is terminal since it is already terminal in <a href="/category/Delta">$\Delta$</a>.

  - property: generator
    proof: The object $[0]$ is generator since this is already true in <a href="/category/Delta">$\Delta$</a>. A direct proof is also possible.

  - property: cogenerator
    proof: The object $[1]$ is cogenerator since this is already true in <a href="/category/Delta">$\Delta$</a>. A direct proof is also possible.

  - property: epi-regular
    proof: 'The only non-identity epimorphism is $p$, which is the coequalizer of $\id, ip : [1] \rightrightarrows [1]$ (since $pi = \id$).'

  - property: mono-regular
    proof: 'The only non-identity monomorphisms are $i$ and $j$. The morphism $i$ is the equalizer of $\id, ip : [1] \rightrightarrows [1]$ (since $pi = \id$), and for $j$ it is the same argument.'

  - property: coequalizers
    proof: 'We already know that the <a href="/category/Delta">$\Delta$</a> has coequalizers, and the proof has shown that the cardinality does not increase, so we are done. But a direct proof is also possible: There are four non-equal parallel pairs: $(i,j)$, $(ip,jp)$, $(\id,ip)$, and $(\id,jp)$. The first two have the same coequalizer (if it exists) since $p$ is an epimorphism, the last two are symmetric, and we already remarked that $p$ is a coequalizer of $(\id,ip)$. So it suffices to check that $p$ is a coequalizer of $i,j$, which is easy.'

  - property: cosifted
    proof: Our proof that the <a href="/category/Delta">$\Delta$</a> is cosifted has only used $[0],[1]$ as auxiliary objects and therefore also shows that $\Delta^{\leq 1}$ is cosifted.

  - property: generalized variety
    proof: This actually holds for every truncated simplex category $\Delta^{\leq n}$. See <a href="https://mathoverflow.net/questions/510760" target="_blank">MO/510760</a> for a proof that sifted colimits exist. See <a href="https://mathoverflow.net/questions/510827" target="_blank">MO/510827</a> for a proof that every object is strongly finitely presentable.

unsatisfied_properties:
  - property: strict terminal object
    proof: 'The morphism $i : [0] \to [1]$ from the terminal object $[0]$ is a witness.'

  - property: cofiltered
    proof: 'The morphisms $i,j : [0] \rightrightarrows [1]$ are not equalized by any morphism.'

  - property: coreflexive equalizers
    proof: 'The coreflexive pair $i,j : [0] \rightrightarrows [1]$ has no equalizer, in fact is not equalized by any morphism.'

  - property: pushouts
    proof: Assume that $[1] \xleftarrow{i} [0] \xrightarrow{i} [1]$ has a pushout in $\Delta^{\leq 1}$, where $i(0)=0$. This amounts to a universal totally ordered set of cardinality $\leq 2$ with elements $a,b,c$ satisfying $a \leq b$, $a \leq c$. Since a finite totally ordered set has trivial automorphism group, the automorphism defined by $a \mapsto a$, $b \mapsto c$, $c \mapsto b$ must be the identity, i.e., we have $b = c$. However, in $[1]$ the equations $0 \leq 0$, $0 \leq 1$ then show that the universal property fails.

  - property: multi-complete
    # TODO: remove this manual proof once locally multi-presentable is dualized, cf. #139
    proof: 'This follows directly from existing results: If its dual, the walking reflexive pair, was multi-cocomplete, then since it is also accessible, it would be <a href="/category-property/locally_multi-presentable">locally multi-presentable</a>. But then it would have connected limits, in particular pullbacks.'

special_objects:
  terminal object:
    description: $[1]$

special_morphisms:
  isomorphisms:
    description: the two identities
    proof: This is obvious.
  monomorphisms:
    description: the identities and $i$, $j$
    proof: Since $pi = \id$, but $ip \neq \id$, we conclude that $i$ is a monomorphism, but $p$ is not. Likewise, $j$ is a monomorphism. Since $p$ is not a monomorphism, $ip$ and $jp$ are also no monomorphisms.
  epimorphisms:
    description: the identities and $p$
    proof: Since $pi = \id$, but $ip \neq \id$, we conclude that $p$ is an epimorphism, but $i$ is not. Hence, also $ip$ is not an epimorphism. Likewise, $j$ and $jp$ are no epimorphisms.
