id: walking_span
name: walking span
notation: $\Span$
objects: $0,1,2$
morphisms: $0 \to 1$, $0 \to 2$, and the identities
description: >-
  This category can be pictured as:
  $$\{1 \leftarrow 0 \rightarrow 2\}$$
  Its name comes from the fact that a functor $\Span \to \C$ is the same as a <a href="https://ncatlab.org/nlab/show/span" target="_blank">span</a> in $\C$.
nlab_link: https://ncatlab.org/nlab/show/span#the_walking_span
tags:
  - category theory

related:
  - walking_morphism
  - walking_pair

satisfied_properties:
  - property: small
    proof: This is trivial.

  - property: finite
    proof: This is trivial.

  - property: thin
    proof: This is trivial.

  - property: skeletal
    proof: The three objects are not isomorphic.

  - property: initial object
    proof: $0$ is an initial object.

  - property: binary products
    proof: We have $0 \times x = 0$ for all $x$, $x \times x = x$, and $1 \times 2 = 0$.

  - property: locally cartesian closed
    proof: The slice category over $0$ is the <a href="/category/1">trivial category</a>, and the slice category over $1$ is the <a href="/category/walking_morphism">walking morphism</a>, which is cartesian closed. The same holds for $2$ by symmetry.

unsatisfied_properties:
  - property: sifted
    proof: There is no cospan between $1$ and $2$.

special_objects:
  initial object:
    description: $0$
  products:
    description: '[binary case] $1 \times 2 = 0$, $x \times x = x$, $0 \times x = 0$'

special_morphisms:
  isomorphisms:
    description: the three identities
    proof: This is trivial.
