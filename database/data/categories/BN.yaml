id: BN
name: delooping of the additive monoid of natural numbers
notation: $B\IN$
objects: a single object
morphisms: the natural numbers, with addition serving as composition
description: Every monoid $M$ induces a category $BM$ with a single object $*$, morphisms given by the elements of $M$, and composition given by the monoid operation. Some of the properties of this category depend on the specific monoid. In this example, we take the commutative monoid $M = (\IN,+,0)$, so composition is $n \circ m = n + m$.
nlab_link: null

tags:
  - category theory
  - number theory
  - single object

related:
  - BG_c
  - BOn

satisfied_properties:
  - property: small
    proof: This is trivial.

  - property: countable
    proof: This is trivial.

  - property: strongly connected
    proof: This is trivial.

  - property: self-dual
    proof: The identity is a self-duality since the addition is commutative.

  - property: generator
    proof: The unique object is a generator for trivial reasons.

  - property: left cancellative
    proof: This is because addition of natural numbers is cancellative.

  - property: gaunt
    proof: This is because $0$ is the only natural number with an additive inverse.

  - property: locally cartesian closed
    proof: The slice category $B\IN / *$ is isomorphic to the poset $(\IN,\geq)$ (not to $(\IN,\leq)$). This category is thin and and semi-strongly connected, <a href="/category-implication/sequential_implies_lcc">hence</a> cartesian closed.

  - property: ℵ₁-accessible
    proof: A proof can be found <a href="/content/aleph1-filtered-colimits-in-deloopings">here</a> as Proposition 2.

unsatisfied_properties:
  - property: one-way
    proof: This is trivial.

  - property: locally finite
    proof: This is trivial.

  - property: sequential limits
    proof: Assume that the sequence $\cdots \xrightarrow{1}  \bullet \xrightarrow{1} \bullet \xrightarrow{1} \bullet$ has a limit. This is a (universal) sequence of natural numbers $n_0,n_1,\dotsc$ satisfying $n_i = n_{i+1} + 1$. But then $n_i = n_0 - i$, and in particular $n_{n_0 + 1} = - 1$, a contradiction.

special_objects: {}

special_morphisms:
  isomorphisms:
    description: only the number $0$
    proof: The $0$ is the only natural number which has an additive inverse, since for $n > 0$ we have $n + m > 0$ for all $m$.
