id: On
name: poset of ordinal numbers
notation: $(\On,\leq)$
objects: ordinal numbers
morphisms: 'a unique morphism $(\alpha,\beta): \alpha \to \beta$ if $\alpha \leq \beta$'
description: This is a large variant of the poset of natural numbers.
nlab_link: null

tags:
  - set theory
  - thin

related:
  - N

satisfied_properties:
  - property: thin
    proof: This is trivial.
    check_redundancy: false

  - property: locally small
    proof: This is trivial.

  - property: cocomplete
    proof: Every set of ordinal numbers has a supremum.

  - property: binary products
    proof: For ordinal numbers $\alpha,\beta$ their minimum exists, it is $\alpha$ when $\alpha \leq \beta$ and $\beta$ otherwise.

  - property: connected limits
    proof: Every non-empty set of ordinal numbers has a minimum.

  - property: well-powered
    proof: This is because for every ordinal $\alpha$ the collection of ordinals $\leq \alpha$ is a set (namely, $\alpha + 1$).

  - property: semi-strongly connected
    proof: It is well-known that for ordinals $\alpha,\beta$ we have $\alpha \leq \beta$ or $\beta \leq \alpha$.

  - property: direct
    proof: This is because the ordinal numbers with respect to $<$ are well-founded (by definition).

unsatisfied_properties:
  - property: terminal object
    proof: There is no largest ordinal $\alpha$ since $\alpha + 1$ will always be larger.

  - property: well-copowered
    proof: The "quotients" of $0$ are all ordinals.

  - property: inverse
    proof: Consider the strictly increasing sequence $0 < 1 < 2 < \cdots$.

special_objects:
  initial object:
    description: $0$
  coproducts:
    description: supremum

special_morphisms:
  isomorphisms:
    description: only the identities
    proof: This is true for every poset (regarded as a category).
  monomorphisms:
    description: every morphism
    proof: It is a thin category.
  epimorphisms:
    description: every morphism
    proof: It is a thin category.
  regular monomorphisms:
    description: same as isomorphisms
    proof: This is because the category is right cancellative.
  regular epimorphisms:
    description: same as isomorphisms
    proof: This is because the category is left cancellative.
