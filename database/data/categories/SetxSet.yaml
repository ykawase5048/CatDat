id: SetxSet
name: category of pairs of sets
notation: $\Set \times \Set$
objects: pairs $(A,B)$ of sets $A$ and $B$
morphisms: A morphism $(A,B) \to (C,D)$ consists of a map $A \to C$ and a map $B \to D$.
description: This is an example of the <a href="https://ncatlab.org/nlab/show/product+category" target="_blank">product of categories</a>. It inherits most (but not all) properties from $\Set$. It can also be seen as the category $\Sh(1+1)$ of sheaves on a discrete space with two points, and also as the slice category $\Set/(1+1)$.
nlab_link: null

tags:
  - set theory

related:
  - Set
  - Set_arrow
  - Sh(X)

satisfied_properties:
  - property: locally small
    proof: This is obvious.

  - property: Grothendieck topos
    proof: It is equivalent to the category of sheaves on a discrete space with two points.

  - property: locally strongly finitely presentable
    proof: Take the two-sorted algebraic theory with no operations and no equations.

unsatisfied_properties:
  - property: skeletal
    proof: This is trivial.

  - property: semi-strongly connected
    proof: When $X$ is non-empty, there is no morphism between $(\varnothing,X)$ and $(X,\varnothing)$.

  - property: generator
    proof: >-
      Assume that $(A,B)$ is a generator. Of course, $A$ and $B$ cannot be both empty. Assume w.l.o.g. that $A$ is non-empty. Then there is no morphism $(A,B) \to (0,1)$, but there are two different morphisms $(0,1) \rightrightarrows (0,2)$.

      Alternatively, the claim follows from <a href="/content/topos-with-generator">this result</a>.

special_objects:
  initial object:
    description: $(0,0)$
  terminal object:
    description: $(1,1)$
  coproducts:
    description: component-wise disjoint union
  products:
    description: component-wise direct product

special_morphisms:
  isomorphisms:
    description: pairs of bijective maps
    proof: This is easy.
  monomorphisms:
    description: pairs of injective maps
    proof: This follows from the fact for the category of sets.
  epimorphisms:
    description: pairs of surjective maps
    proof: This follows from the fact for the category of sets.
