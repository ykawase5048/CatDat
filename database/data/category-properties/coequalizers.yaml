id: coequalizers
relation: has
description: 'A <i>coequalizer</i> of a pair of morphisms $f,g : A \rightrightarrows B$ is an object $C$ with a morphism $c : B \to C$ such that $c \circ f = c \circ g$ and which is universal with respect to this property. This property refers to the existence of coequalizers.'
nlab_link: https://ncatlab.org/nlab/show/coequalizer
dual: equalizers
invariant_under_equivalences: true

