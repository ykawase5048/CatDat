id: coregular
relation: is
description: A category is <i>coregular</i> when its dual is regular, i.e. it is finitely cocomplete, for every morphism $Y \to X$ its cokernel pair $X \rightrightarrows X \sqcup_Y X$ has an equalizer, and regular monomorphisms are stable under pushouts.
nlab_link: null
dual: regular
invariant_under_equivalences: true

