id: normal monomorphism
relation: is a
description: 'A morphism $f : A \to B$ in a category with <a href="/category-property/zero_morphisms">zero morphisms</a> is a <i>normal monomorphism</i> if it is the kernel of a morphism $g : B \to C$, i.e. the equalizer of $g$ and the zero morphism $0 : B \to C$.'
nlab_link: https://ncatlab.org/nlab/show/normal+monomorphism
invariant_under_equivalences: true
dual: normal epimorphism
related:
  - regular monomorphism

tags:
  - types of monomorphisms
