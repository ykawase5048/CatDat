# results on products and powers

- id: products_include_powers
  assumptions:
    - products
  conclusions:
    - powers
  proof: This is trivial.
  is_equivalence: false

- id: products_include_aleph2-small_products
  assumptions:
    - products
  conclusions:
    - ℵ₂-small products
  proof: This is trivial.
  is_equivalence: false

- id: aleph2-small_products_consequences
  assumptions:
    - ℵ₂-small products
  conclusions:
    - ℵ₂-small powers
    - countable products
  proof: This is trivial.
  is_equivalence: false

- id: finite_products_characterization
  assumptions:
    - finite products
  conclusions:
    - binary products
    - terminal object
  proof: The non-trivial direction follows since finite products can be constructed recursively via $X_1 \times \cdots \times X_{n+1} = (X_1 \times \cdots \times X_n) \times X_{n+1}$.
  is_equivalence: true

- id: products_criterion
  assumptions:
    - cofiltered limits
    - finite products
  conclusions:
    - products
  proof: The product $\prod_{i \in I} X_i$ is the cofiltered limit of the finite partial products $\prod_{i \in E} X_i$ where $E$ ranges over the finite subsets of $I$.
  is_equivalence: false

- id: products_criterion_countable
  assumptions:
    - ℵ₁-cofiltered limits
    - countable products
  conclusions:
    - products
  proof: The product $\prod_{i \in I} X_i$ is the $\aleph_1$-cofiltered limit of the countable partial products $\prod_{i \in C} X_i$ where $C$ ranges over the countable subsets of $I$.
  is_equivalence: false

- id: binary_products_criterion
  assumptions:
    - pullbacks
    - terminal object
  conclusions:
    - binary products
  proof: If $1$ is a terminal object, then $X \times_1 Y = X \times Y$.
  is_equivalence: false

- id: countable_products_consequence
  assumptions:
    - countable products
  conclusions:
    - countable powers
    - finite products
  proof: This is trivial.
  is_equivalence: false

- id: countable_products_criterion
  assumptions:
    - finite products
    - sequential limits
  conclusions:
    - countable products
  proof: If $X_1,X_2,\dotsc$ is an infinite sequence of objects, then their product is the limit of the sequence $\cdots \to X_2 \times X_1 \to X_1$.
  is_equivalence: false

- id: finite_products_include_finite_powers
  assumptions:
    - finite products
  conclusions:
    - finite powers
  proof: This is trivial.
  is_equivalence: false

- id: binary_products_include_binary_powers
  assumptions:
    - binary products
  conclusions:
    - binary powers
  proof: This is trivial.
  is_equivalence: false

- id: powers_include_aleph2-small_powers
  assumptions:
    - powers
  conclusions:
    - ℵ₂-small powers
  proof: This is trivial.
  is_equivalence: false

- id: aleph2-small-powers_include_countable_powers
  assumptions:
    - ℵ₂-small powers
  conclusions:
    - countable powers
  proof: This is trivial.
  is_equivalence: false

- id: countable_powers_include_finite_powers
  assumptions:
    - countable powers
  conclusions:
    - finite powers
  proof: This is trivial.
  is_equivalence: false

- id: finite_powers_consequences
  assumptions:
