# results on connected categories and related notions

- id: connected_consequence
  assumptions:
    - connected
  conclusions:
    - inhabited
  proof: This holds by definition.
  is_equivalence: false

- id: strongly_connected_consequence
  assumptions:
    - strongly connected
  conclusions:
    - semi-strongly connected
  proof: This is immediate from the definition.
  is_equivalence: false

- id: semi-strongly_connected_consequence
  assumptions:
    - semi-strongly connected
  conclusions:
    - connected
  proof: This is immediate from the definition.
  is_equivalence: false

- id: thin_not_strongly_connected
  assumptions:
    - strongly connected
    - thin
  conclusions:
    - trivial
  proof: This is obvious.
  is_equivalence: false

- id: zero_morphisms_mean_strongly_connected
  assumptions:
    - inhabited
    - zero morphisms
  conclusions:
    - strongly connected
  proof: This holds by definition.
  is_equivalence: false

- id: strongly_connected_pointed_criterion
  assumptions:
    - initial object
    - strongly connected
    - terminal object
  conclusions:
    - pointed
  proof: By assumption there is a morphism $1 \to 0$. There is also a unique morphism $0 \to 1$. They are necessarily inverse to each other.
  is_equivalence: false

- id: core-connected_implies_strongly-connected
  assumptions:
    - core-connected
  conclusions:
    - strongly connected
  proof: This is trivial.
  is_equivalence: false

- id: unique_object_generates
  assumptions:
    - core-connected
  conclusions:
    - generator
  proof: This is trivial.
  is_equivalence: false

- id: trivial_is_core-connected
  assumptions:
    - trivial
  conclusions:
    - core-connected
  proof: This is trivial.
  is_equivalence: false

- id: core_connected_becomes_trivial
  assumptions:
    - core-connected
    - initial object
  conclusions:
    - trivial
  proof: Every object is isomorphic to the initial object.
  is_equivalence: false
