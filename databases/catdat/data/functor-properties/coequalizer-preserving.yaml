id: coequalizer-preserving
relation: is
description: 'A functor $F$ preserves coequalizers when for every parallel pair of morphisms $f,g : A \rightrightarrows B$ whose coequalizer $p : B \to Q$ exists, also $F(p) : F(B) \to F(Q)$ is an coequalizer of $F(f),F(g) : F(A) \rightrightarrows F(B)$.'
nlab_link: null
invariant_under_equivalences: true
dual_property_id: equalizer-preserving
