id: coreflexive-equalizer-preserving
relation: is
description: 'A functor $F$ <i>preserves coreflexive equalizers</i> when for every coreflexive parallel pair of morphisms $f,g : A \rightrightarrows B$ whose equalizer $i : E \to A$ exists, also $F(i) : F(E) \to F(A)$ is an equalizer of $F(f),F(g) : F(A) \rightrightarrows F(B)$.'
nlab_link: https://ncatlab.org/nlab/show/reflexive+coequalizer
invariant_under_equivalences: true
dual_property: reflexive-coequalizer-preserving
related_properties:
  - continuous
  - equalizer-preserving
