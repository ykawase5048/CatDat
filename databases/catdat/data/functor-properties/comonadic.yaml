id: comonadic
relation: is
description: 'A functor $F : \C \to \D$ is <i>comonadic</i> when there is a comonad $T$ on $\D$ such that $F$ is equivalent to the forgetful functor $U^T : \CoAlg(T) \to \D$.'
nlab_link: https://ncatlab.org/nlab/show/comonadic+functor
invariant_under_equivalences: true
dual: monadic
related_properties:
  - left adjoint
  - faithful

tags:
  - adjunctions
