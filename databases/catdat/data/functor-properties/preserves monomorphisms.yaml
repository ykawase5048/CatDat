id: preserves monomorphisms
relation: ''
description: |-
  A functor $F : \C \to \D$ <i>preserves monomorphisms</i> if every monomorphism in $\C$ is mapped to a monomorphism in $\D$.
  This property is useful to rule out some adjunctions.
nlab_link: https://ncatlab.org/nlab/show/monomorphism
invariant_under_equivalences: true
dual: preserves epimorphisms
related:
