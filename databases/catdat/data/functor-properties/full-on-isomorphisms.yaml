id: full on isomorphisms
relation: 'is'
description: 'A functor $F : \C \to \D$ is <i>full on isomorphisms</i> when, for every pair of objects $A,B \in \C$, every isomorphism $F(A) \to F(B)$ is induced by an isomorphism $A \to B$.'
