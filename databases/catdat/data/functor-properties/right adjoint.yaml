id: right adjoint
relation: is a
description: 'A functor $F : \C \to \D$ is a <i>right adjoint</i> when there is a functor $G : \D \to \C$ such that there are natural bijections $\Hom(G(A),B) \cong \Hom(A,F(B))$.'
