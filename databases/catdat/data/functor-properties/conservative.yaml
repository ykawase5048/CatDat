id: conservative
relation: is
description: 'A functor $F : \C \to \D$ is <i>conservative</i> when it is isomorphic-reflecting: If $f$ is a morphism in $\C$ such that $F(f)$ is an isomorphism, then $f$ is an isomorphism.'
