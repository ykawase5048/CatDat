id: cocontinuous
relation: is
description: A functor is <i>cocontinuous</i> when it preserves all small colimits.
nlab_link: https://ncatlab.org/nlab/show/cocontinuous+functor
invariant_under_equivalences: true
dual_property: continuous
related_properties:
  - preserves coproducts
  - right exact
  - left adjoint
  - preserves coequalizers
  - finitary
  - lifts small colimits
