id: epimorphism-preserving
relation: is
description: 'A functor $F : \C \to \D$ preserves epimorphisms if every epimorphism in $\C$ is mapped to an epimorphism in $\D$.<br> This property is useful to rule out some adjunctions.'
nlab_link: https://ncatlab.org/nlab/show/epimorphism
invariant_under_equivalences: true
dual_property_id: monomorphism-preserving
