id: binary_coproduct_sets
name: binary coproduct functor on sets
notation: $+$
source: SetxSet
target: Set
description: This functor maps a pair of sets $(X,Y)$ to their coproduct $X + Y$. It is an example of a right-invertible left adjoint functor which is not a reflector.
nlab_link: null

tags:
  - set theory

related:
  - doubling_sets
  - binary_product_sets

satisfied_properties:
  - property: right-invertible
    proof: The functor $\Set \to \Set \times \Set$, $X \mapsto (X,0)$ provides a right inverse since $X + 0 \cong X$.

  - property: preserves equalizers
    proof: This can be checked with a straight forward calculation.

  - property: conservative
    proof: This is easy to check.

  - property: left adjoint
    proof: >-
      The coproduct functor is left adjoint to the diagonal functor since
      $$\Hom(A + B,X) \cong \Hom(A,X) \times \Hom(B,X) \cong \Hom((A,B),(X,X)).$$

  - property: cofinitary
    proof: We already know that <a href="/category/Set">$\Set$</a> has cocartesian cofiltered limits; this is a consequence of <a href="/category-implication/extensive_cocartesian_cofiltered_limits">this result</a>.

unsatisfied_properties:
  - property: preserves terminal objects
    proof: The terminal object is mapped to a set with two elements, which is not terminal.

  - property: preserves binary products
    proof: The canonical map $(X_1 \times X_2) + (Y_1 \times Y_2) \to (X_1 + Y_1) \times (X_2 + Y_2)$ is injective, but misses the "mixed terms" $X_1 \times Y_2$ and $Y_1 \times X_2$ in the codomain, hence is not surjective when $X_1,Y_2$ (or $Y_1,X_2$) are non-empty.

  - property: essentially injective
    proof: Both $(1,0)$ and $(0,1)$ are mapped to $1$.

  - property: reflector
    proof: 'Its right adjoint, the diagonal functor $\Delta : \Set \to \Set \times \Set$, is faithful, but not full.'
