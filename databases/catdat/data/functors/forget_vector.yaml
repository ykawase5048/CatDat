id: forget_vector
name: forgetful functor for vector spaces
notation: $U_{\Vect}$
source: Vect
target: Set
description: This functor maps a vector space $V$ (over a fixed field $K$) to its underlying set $U_{\Vect}(V)$.
nlab_link: https://ncatlab.org/nlab/show/forgetful+functor

tags:
  - algebra
  - forgetful

related_functors:
  - forget_group
  - forget_ring

satisfied_properties:
  - property: representable
    proof: This functor is represented by any $1$-dimensional vector space.

  - property: monadic
    proof: For every algebraic category the forgetful functor to the category of sets is monadic.

  - property: finitary
    proof: For every algebraic category the forgetful functor to the category of sets preserves filtered colimits.

  - property: preserves epimorphisms
    proof: This follows from the classifications of epimorphisms in <a href="/category/Vect">$\Vect$</a> and in <a href="/category/Set">$\Set$</a>.

  - property: preserves reflexive coequalizers
    proof: This follows from Theorem 2.5 at the <a href="https://ncatlab.org/nlab/show/reflexive+coequalizer" target="_blank">nLab</a>.

unsatisfied_properties:
  - property: full
    proof: This is trivial.

  - property: essentially surjective
    proof: The empty set has has no vector space structure.

  - property: preserves initial objects
    proof: The underlying set of a trivial vector space is not empty.

  - property: preserves coequalizers
    proof: 'The coequalizer of $0,i_1 : K \to K^2$ in $\Vect$ is $p_2 : K^2 \to K$, but the coequalizer in $\Set$ is $(K \times K^*) \cup \{(0,0)\}$.'
