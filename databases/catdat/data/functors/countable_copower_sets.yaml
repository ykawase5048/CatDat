id: countable_copower_sets
name: countable copower functor on sets
notation: $\IN \times (-)$
source: Set
target: Set
description: This functor maps a set $X$ to the product $\IN \times X$, which can also be seen as the copower $\IN \otimes X = \coprod_{n \in \IN} X$. It is an example of a polynomial functor.
nlab_link: null

tags:
  - set theory

related_functors:
  - id_Set
  - binary_coproduct_sets
  - doubling_sets

satisfied_properties:
  - property: preserves equalizers
    proof: This is trivial.

  - property: cofinitary
    proof: This is trivial.

  - property: conservative
    proof: This is easy to check.

  - property: left adjoint
    proof: We have $\Hom(\IN \times X,Y) \cong \Hom(X,Y^{\IN})$.

  - property: dominant
    proof: If $X$ is any set, the map $X \to \IN \times X$, $x \mapsto (0,x)$ is a split monomorphism.

unsatisfied_properties:
  - property: preserves terminal objects
    proof: We have $\IN \times 1 \cong \IN \not\cong 1$.

  - property: preserves binary products
    proof: The canonical map $\IN \times (X \times Y) \to (\IN \times X) \times (\IN \times Y)$ is given by $(n,(x,y)) \mapsto ((n,x),(n,y))$. It is clearly not surjective when $X$ and $Y$ are non-empty.

  - property: essentially surjective
    proof: A non-empty finite set is not contained in the essential image.

  - property: essentially injective
    proof: For any two non-empty finite sets $X,Y$ there is a bijection $\IN \times X \cong \IN \cong \IN \times Y$, so this does not imply $X \cong Y$.
