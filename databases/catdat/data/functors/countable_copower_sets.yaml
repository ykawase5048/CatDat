id: countable_copower_sets
name: countable copower functor on sets
notation: $\IN \times (-)$
source: Set
target: Set
description: This functor maps a set $X$ to the product $\IN \times X$, which can also be seen as the copower $\IN \otimes X = \coprod_{n \in \IN} X$. It is an example of a polynomial functor.
nlab_link: null

tags:
  - set theory

related_functors:
  - id_Set
  - coproduct_sets
  - doubling_sets

satisfied_properties:
  - property: monomorphism-preserving
    reason: This is trivial.

  - property: equalizer-preserving
    reason: This is trivial.

  - property: cofinitary
    reason: This is trivial.

  - property: conservative
    reason: This is easy to check.

  - property: left adjoint
    reason: We have $\Hom(\IN \times X,Y) \cong \Hom(X,Y^{\IN})$.

unsatisfied_properties:
  - property: full
    reason: If $X$ is non-empty, the map $\IN \times X \to \IN \times X$, $(n,x) \mapsto (n+1,x)$ is not induced by a map $X \to X$.

  - property: terminal-object-preserving
    reason: We have $\IN \times 1 \cong \IN \not\cong 1$.

  - property: essentially surjective
    reason: A non-empty finite set is not contained in the essential image.
