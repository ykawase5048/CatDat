id: forget_ring
name: forgetful functor for rings
notation: $U_{\Ring}$
source: Ring
target: Set
description: This functor maps a ring $R$ to its underlying set $U_{\Ring}(R)$.
nlab_link: https://ncatlab.org/nlab/show/forgetful+functor
left_adjoint: null

tags:
  - algebra
  - forgetful

related:
  - forget_group
  - forget_vector
  - forget_addition

satisfied_properties:
  - property: representable
    proof: This functor is represented by the polynomial ring $\IZ[T]$.

  - property: monadic
    proof: For every algebraic category the forgetful functor to the category of sets is monadic.

  - property: finitary
    proof: For every algebraic category the forgetful functor to the category of sets preserves filtered colimits.

  - property: preserves reflexive coequalizers
    proof: This follows from Theorem 2.5 at the <a href="https://ncatlab.org/nlab/show/reflexive+coequalizer" target="_blank">nLab</a>.

unsatisfied_properties:
  - property: essentially injective
    proof: This is trivial.

  - property: dominant
    proof: There is no ring $R$ with a split monomorphism $\varnothing \hookrightarrow U(R)$ since $U(R)$ is non-empty.

  - property: preserves epimorphisms
    proof: This follows from the classifications of epimorphisms in <a href="/category/Ring">$\Ring$</a> and in <a href="/category/Set">$\Set$</a>. Namely, the unique homomorphism $\IZ \to \IQ$ is an epimorphism in $\Ring$, but its underlying map of sets is not surjective, and hence no epimorphism in $\Set$.

  - property: preserves initial objects
    proof: The initial object of $\Ring$ is $\IZ$, whose underlying set is not empty.

  - property: preserves coequalizers
    proof: Consider the two ring homomorphisms $\IZ[X] \rightrightarrows \IZ[X,Y]$ defined by $X \mapsto X$ resp. $X \mapsto 0$. Their coequalizer in $\Ring$ (and also $\CRing$) is $\IZ[Y]$. Every multiple of $X$ becomes zero. However, the $\Set$-coequalizer does not identify $XY$ with $0$. In fact, polynomials in $U(\IZ[X,Y]) \setminus U(\IZ[X])$ are only equivalent to themselves.
