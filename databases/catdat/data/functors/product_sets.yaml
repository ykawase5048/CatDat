id: product_sets
name: binary product functor on sets
notation: $\times$
source: SetxSet
target: Set
description: This functor maps a pair of sets $(X,Y)$ to their product $X \times Y$. It is an example of a right-invertible right adjoint functor which is not a coreflector.
nlab_link: null
left_adjoint: diagonal_sets

tags:
  - set theory

related_functors:
  - squaring_sets
  - coproduct_sets

satisfied_properties:
  - property: right-invertible
    proof: The functor $\Set \to \Set \times \Set$, $X \mapsto (X,1)$ provides a right inverse since $X \times 1 \cong X$.

  - property: preserves initial objects
    proof: This is obvious.

  - property: preserves epimorphisms
    proof: This follows easily from the description of epimorphisms in $\Set$ as surjective maps.

  - property: representable
    proof: We have $X \times Y \cong \Hom_{\Set \times \Set}((1,1),(X,Y))$.

  - property: finitary
    # TODO: refactor this once we add "preserves sifted colimits"
    proof: This is obvious. The functor even preserves all sifted colimits.

  - property: preserves reflexive coequalizers
    # TODO: refactor this once we add "preserves sifted colimits"
    proof: See Prop. 2.4 at the <a href="https://ncatlab.org/nlab/show/reflexive+coequalizer" target="_blank">nLab</a>.

unsatisfied_properties:
  - property: full
    proof: If $X$ is a non-empty set, the unique map of empty sets $X \times \varnothing \to \varnothing \times X$ is not induced by a map $X \to \varnothing$.

  - property: faithful
    proof: 'If $f,g : A \rightrightarrows B$ are two maps, we always have $f \times \id_{\varnothing} = g \times \id_{\varnothing} : A \times \varnothing \rightrightarrows B \times \varnothing$.'

  - property: essentially injective
    proof: Both $(1,0)$ and $(0,1)$ are mapped to $0$.

  - property: preserves coequalizers
    proof: 'Since the diagonal functor $\Delta : \Set \to \Set \times \Set$ preserves coequalizers (in fact, all colimits), it would follow that the composition $\Set \to \Set$, $X \mapsto X^2$ preserves coequalizers. But this is the <a href="/functor/squaring_sets">squaring functor</a>, from we already know that it does not preserve coequalizers.'

  - property: coreflector
    proof: 'Its left adjoint, the diagonal functor $\Delta : \Set \to \Set \times \Set$, is faithful, but not full.'
