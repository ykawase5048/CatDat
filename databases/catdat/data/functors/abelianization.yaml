id: abelianization
name: abelianization functor for groups
notation: $(-)^{\ab}$
source: Grp
target: Ab
description: This functor maps a group $G$ to its abelianization $G^{\ab} \coloneqq G/[G,G]$.
nlab_link: https://ncatlab.org/nlab/show/abelianization

tags:
  - algebra
  - free

related_functors: []

satisfied_properties:
  - property: left adjoint
    proof: This functor is left adjoint to the forgetful functor.

  - property: essentially surjective
    proof: For abelian groups $G$ we have $G \cong G^{\ab}$.

  - property: preserves finite products
    proof: See <a href="https://mathoverflow.net/questions/386144">MO/386144</a>.

unsatisfied_properties:
  - property: essentially injective
    proof: The abelianizations of $S_3$ and $C_2$ are both isomorphic to $C_2$.

  - property: faithful
    proof: Both the inclusion $A_3 \hookrightarrow S_3$ and the trivial homomorphism $A_3 \to S_3$ are mapped to the trivial homomorphism $A_3 \to 1$.

  - property: full
    proof: See <a href="https://math.stackexchange.com/questions/716686" target="_blank">MSE/716686</a>.

  - property: preserves monomorphisms
    proof: The monomorphism $A_3 \hookrightarrow S_3$ is mapped to $A_3 \to 1$.

  - property: preserves products
    proof: 'If $G$ is a group, the canonical homomorphism $(G^{\IN})^{\ab} \to (G^{\ab})^{\IN}$ is surjective, but does not need to be an isomorphism: otherwise, the inclusion $[G^{\IN}, G^{\IN}] \subseteq [G,G]^{\IN}$ would be an equality. But this requires the commutator width of $G$ to be finite, which fails for $G = F_2$ for instance. See also <a href="https://arxiv.org/abs/1608.02220">The abelianization of inverse limits of groups</a>, Remark 0.0.7.'
