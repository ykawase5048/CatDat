id: forget_group
name: forgetful functor for groups
notation: $U_{\Grp}$
source: Grp
target: Set
description: This functor maps a group $G$ to its underlying set $U_{\Grp}(G)$.
nlab_link: https://ncatlab.org/nlab/show/forgetful+functor
left_adjoint: free_group

tags:
  - algebra
  - forgetful

related_functors:
  - forget_vector
  - forget_ring
  - forget_abelian
  - forget_group_pointed

satisfied_properties:
  - property: representable
    proof: This functor is represented by the additive group $\IZ$.

  - property: monadic
    proof: For every algebraic category the forgetful functor to the category of sets is monadic.

  - property: finitary
    proof: For every algebraic category the forgetful functor to the category of sets preserves filtered colimits.

  - property: preserves reflexive coequalizers
    proof: This follows from Theorem 2.5 at the <a href="https://ncatlab.org/nlab/show/reflexive+coequalizer" target="_blank">nLab</a>.

unsatisfied_properties:
  - property: essentially injective
    proof: This is trivial.

  - property: dominant
    proof: There is no group $G$ with a split monomorphism $\varnothing \hookrightarrow U(G)$ since $U(G)$ is non-empty.

  - property: preserves initial objects
    proof: The underlying set of a trivial group is not empty.

  - property: preserves coequalizers
    proof: 'The coequalizer of $1,2 : \IZ \rightrightarrows \IZ$ is the trivial group in $\Grp$, but the coequalizer of these maps in $\Set$ is infinite.'
