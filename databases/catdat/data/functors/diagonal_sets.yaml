id: diagonal_sets
name: binary diagonal functor on the category of sets
notation: $\Delta$
source: Set
target: SetxSet
description: 'Every category $\C$ has a (binary) diagonal functor $\Delta : \C \to \C^2$, $X \mapsto (X,X)$. Here, we specify that $\C$ is the category of sets.'
nlab_link: https://ncatlab.org/nlab/show/diagonal+functor
left_adjoint: binary_coproduct_sets

tags:
  - set theory

related_functors:
  - id_Set

satisfied_properties:
  - property: left-invertible
    proof: This follows from $p_1 \circ \Delta = \id_\Set$.

  - property: left adjoint
    proof: >-
      The diagonal functor is left adjoint to the product functor since
      $$\Hom(X, A \times B) \cong \Hom(X,A) \times \Hom(X,B) \cong \Hom((X,X),(A,B)).$$

  - property: right adjoint
    proof: >-
      The diagonal functor is right adjoint to the coproduct functor since
      $$\Hom(A + B,X) \cong \Hom(A,X) \times \Hom(B,X) \cong \Hom((A,B),(X,X)).$$

unsatisfied_properties:
  - property: full on isomorphisms
    proof: 'Take any pair of distinct isomorphisms $f,g : X \rightrightarrows Y$. Then $(f,g) : (X,X) \to (Y,Y)$ is not induced by an isomorphism $X \to Y$.'

  - property: dominant
    proof: If $Y$ is a non-empty set, there is no set $X$ with a split monomorphism $(\varnothing,Y) \hookrightarrow (X,X)$. In fact, this would give a pair of epimorphisms $X \to \varnothing$ and $X \to Y$. The first one gives $X = \varnothing$, and the second one then gives $Y = \varnothing$.
