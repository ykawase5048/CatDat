id: doubling_sets
name: doubling functor on sets
notation: $2(-)$
source: Set
target: Set
description: This functor maps a set $X$ to its double $2 X \coloneqq X + X$. It is a simple example of a polynomial functor.
nlab_link: null

tags:
  - set theory

related_functors:
  - id_Set
  - coproduct_sets
  - countable_copower_sets

satisfied_properties:
  - property: left adjoint
    proof: We have $\Hom(X+X,Y) \cong \Hom(X,Y)^2 \cong \Hom(X,Y^2)$.

  - property: conservative
    proof: This is easy to check.

  - property: preserves equalizers
    proof: The doubling functor can also be written as $X \mapsto \{1,2\} \times X$, from which the claim follows.

  - property: cofinitary
    proof: The doubling functor can also be written as $X \mapsto \{1,2\} \times X$, from which the claim follows.

unsatisfied_properties:
  - property: full
    proof: If $X$ is non-empty, the swap $2X \to 2X$ is not induced by a map $X \to X$.

  - property: preserves terminal objects
    proof: This is trivial.

  - property: essentially surjective
    proof: The singleton set is not contained in the essential image.
