id: continuous_functions
name: functor of continuous functions
notation: $C$
source: Top_op
target: CAlg(R) # TODO: specify that R is IR
description: 'This functor maps a topological space $X$ to the commutative $\IR$-algebra $C(X)$ of continuous functions $X \to \IR$. A continuous map $f : X \to Y$ is mapped to the algebra homomorphism $f^* : C(Y) \to C(X)$, $u \mapsto u \circ f$.'
nlab_link: null

tags:
  - topology

related: []

satisfied_properties:
  - property: continuous
    proof: 'Since the forgetful functor $U : \CAlg(\IR) \to \Set$ is conservative and continuous, it suffices to prove that $U \circ C : \Top^{\op} \to \Set$ is continuous. But this functor is representable.'

  - property: preserves initial objects
    proof: The initial object in $\Top^{\op}$ is the singleton space, which is mapped to $\IR$, the initial commutative $\IR$-algebra.

unsatisfied_properties:
  - property: essentially injective
    proof: 'If $X,Y$ are non-empty indiscrete spaces, then $C(X) \cong \IR \cong C(Y)$ since every continuous function on $X$ resp. $Y$ is constant.'

  - property: dominant
    proof: The algebra $C(X)$ is <a href="https://en.wikipedia.org/wiki/Reduced_ring" target="_blank">reduced</a>, and every subalgebra of a reduced algebra is also reduced. But there exist non-reduced algebras such as $\IR[T]/\langle T^2 \rangle$.

  - property: faithful
    proof: 'If $X,Y$ are non-empty indiscrete spaces, there is only one homomorphism of $\IR$-algebras $C(Y) \to C(X)$ (since both are isomorphic to $\IR$), but there can be many maps $X \to Y$.'

  - property: full
    proof: >-
      Every continuous function $\omega_1 \to \IR$ is eventually constant, where $\omega_1$ denotes the first uncountable ordinal equipped with the order topology. We obtain a homomorphism
      $$\varphi : C(\omega_1) \to \IR \cong C(1)$$
      mapping each continuous function $\omega_1 \to \IR$ to its eventual value. Assume that it is induced by a continuous map $1 \to \omega_1$. This corresponds to an ordinal $\alpha < \omega_1$ such that $\varphi(u) = u(\alpha)$ for all $u \in C(\omega_1)$. But the continuous function
      $$u(\beta) \coloneqq \begin{cases} 0 & \beta \leq \alpha \\ 1 & \beta > \alpha \end{cases}$$
      satisfies $\varphi(u) = u(\alpha + 1) \neq u(\alpha)$.

  - property: preserves finite coproducts
    proof: 'The canonical homomorphism $C(X) \otimes_{\IR} C(Y) \to C(X \times Y)$ need not be surjective. For example, for $X = Y = \IR$ one can show that $(x,y) \mapsto \exp(xy)$ is not contained in its image.'

  - property: preserves regular epimorphisms
    proof: 'The embedding $i : \IR \setminus \{0\} \hookrightarrow \IR$ is a regular monomorphism in $\Top$, i.e. a regular epimorphism in $\Top^{\op}$. It is mapped to the restriction map $i^* : C(\IR) \to C(\IR \setminus \{0\})$, which is not surjective, as witnessed by the map $x \mapsto x^{-1}$. Hence, $i^*$ is not a regular epimorphism.'

  - property: preserves epimorphisms
    proof: 'It is not sufficient to find an injective continuous map $i : X \to Y$ such that $i^* : C(Y) \to C(X)$ is not surjective, since epimorphisms in $\CAlg(\IR)$ do not need to be surjective. But a simple counterexample can again be constructed using (in)discrete spaces. Namely, if $X$ is any finite set with at least two elements, we have a continuous bijection $D(X) \to I(X)$, $x \mapsto x$, where $D(X)$ (resp. $I(X)$) denotes the discrete (resp. indiscrete) space on $X$. It induces the algebra homomorphism $\IR \cong C(I(X)) \to C(D(X)) \cong \IR^X$, which is not an epimorphism since $\IR^X \otimes_\IR \IR^X \not\cong \IR^X$.'

  - property: finitary
    proof: >-
      For $n \geq 0$ consider the discrete space $X_n \coloneqq \{0,\dotsc,n\}$. Using the evident truncation maps $X_{n+1} \twoheadrightarrow X_n$, their limit is isomorphic to $\IN \cup \{\infty\}$, the one-point compactification of the discrete space $\IN$. The canonical homomorphism
      $$\textstyle \colim_n C(X_n) \to C(\lim_n X_n)$$
      can then be identified with the inclusion of the algebra of eventually constant sequences in $\IR$ into the algebra of convergent sequences in $\IR$. Thus, it is not surjective.
