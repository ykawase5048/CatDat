id: squaring_sets
name: squaring functor on sets
notation: $(-)^2$
source: Set
target: Set
description: This functor maps a set $X$ to its square $X^2$. It is a simple example of a polynomial functor.
nlab_link: null
left_adjoint: doubling_sets

tags:
  - set theory

related_functors:
  - id_Set
  - product_sets

satisfied_properties:
  - property: epimorphism-preserving
    reason: This is obvious.

  - property: initial-object-preserving
    reason: This is obvious.

  - property: representable
    reason: We have $X^2 \cong \Hom(\{1,2\},X)$.

  - property: finitary
    # TODO: refactor this once we add "preserves sifted colimits"
    reason: This is obvious. The functor even preserves all sifted colimits.

  - property: monadic
    # TODO: refactor this once crude monadicity theorem is added as implication
    # TODO: refactor this once we add "preserves sifted colimits"
    reason: >-
      We prove this using the crude monadicity theorem (see e.g. <a href="https://ncatlab.org/nlab/show/Sheaves+in+Geometry+and+Logic" target="_blank">Mac Lane & Moerdijk</a>, Thm. IV.4.2). It is clear that the squaring functor is conservative. Also, it has a left adjoint because of 
      $$\Hom(X+X,Y) \cong \Hom(X,Y)^2 \cong \Hom(X,Y \times Y).$$
      Finally, it preserves reflexive coequalizers (see Prop. 2.4 at the <a href="https://ncatlab.org/nlab/show/reflexive+coequalizer" target="_blank">nLab</a>), in fact all sifted colimits.

unsatisfied_properties:
  - property: essentially surjective
    reason: We have $2 \neq a^2$ for all $a \in \IN$.

  - property: finite-coproduct-preserving
    reason: For natural numbers $a,b > 0$ we have $(a+b)^2 \neq a^2 + b^2$.

  - property: coequalizer-preserving
    reason: 'Consider the two maps $f,g : \{\ast\} \rightrightarrows \{1,2\}$. Their coequalizer is $\{\ast\}$. The coequalizer of the two maps $f^2,g^2 : \{\ast\}^2 \rightrightarrows \{1,2\}^2$ is the quotient of $\{(1,1),(1,2),(2,1),(2,2)\}$ by the equivalence relation generated by $(1,1) \sim (2,2)$. It has three elements, hence is not isomorphic to $\{\ast\}^2 \cong \{\ast\}$.'
