id: squaring_sets
name: squaring functor on sets
notation: $(-)^2$
source: Set
target: Set
description: This functor maps a set $X$ to its square $X^2$. It is a simple example of a polynomial functor.
nlab_link: null
left_adjoint: doubling_sets

tags:
  - set theory

related_functors:
  - id_Set
  - binary_product_sets
  - sequences_sets

satisfied_properties:
  - property: preserves initial objects
    proof: This is obvious.

  - property: representable
    proof: We have $X^2 \cong \Hom(\{1,2\},X)$.

  - property: right adjoint
    proof: We have $\Hom(X+X,Y) \cong \Hom(X,Y)^2 \cong \Hom(X,Y \times Y)$.
    check_redundancy: false

  - property: conservative
    proof: 'This is a straight forward calculation. Assume that $f : X \to Y$ is a map such that $f^2 : X^2 \to Y^2$ is bijective. For every $y \in Y$ there is some $(x_1,x_2) \in X^2$ with $(y,y) = (f(x_1),f(x_2))$, so that $y = f(x_1)$. This shows that $f$ is surjective. To show that $f$ is injective, suppose that $x_1,x_2 \in X$ satisfy $f(x_1)=f(x_2)$. Then $f^2(x_1,x_1) = f^2(x_2,x_2)$, so that $(x_1,x_1) = (x_2,x_2)$. Hence, $x_1=x_2$.'

  - property: finitary
    # TODO: refactor this once we add "preserves sifted colimits"
    proof: This is obvious. The functor even preserves all sifted colimits.

  - property: preserves reflexive coequalizers
    # TODO: refactor this once we add "preserves sifted colimits"
    proof: See Prop. 2.4 at the <a href="https://ncatlab.org/nlab/show/reflexive+coequalizer" target="_blank">nLab</a>.

  - property: dominant
    proof: 'If $X$ is any set, the diagonal map $X \to X^2$, $x \mapsto (x,x)$ is a split monomorphism.'

  - property: essentially injective
    proof: Let $X,Y$ be two sets with $X^2 \cong Y^2$. If $X$ is finite, then $X^2$ and hence $Y^2$ is finite, so that also $Y$ is finite. For the cardinalities we deduce $\card(X)^2 = \card(Y)^2$ and hence $\card(X) = \card(Y)$. This yields $X \cong Y$. If $X$ is infinite, then $Y$ is infinite, and $X \cong X^2 \cong Y^2 \cong Y$.

unsatisfied_properties:
  - property: full on isomorphisms
    proof: If $X$ has more than one element, the swap map $X^2 \to X^2$, $(x,y) \mapsto (y,x)$ is not induced by any map $X \to X$.

  - property: essentially surjective
    proof: We have $2 \neq a^2$ for all $a \in \IN$.

  - property: preserves coequalizers
    proof: 'Consider the two maps $x,y : \{\ast\} \rightrightarrows \{x,y\}$. Their coequalizer is the unique map $\{x,y\} \to \{\ast\}$. The coequalizer of the induced maps $\{\ast\}^2 \rightrightarrows \{x,y\}^2$ is the quotient of $\{x,y\}^2$ by the equivalence relation generated by $(x,x) \sim (y,y)$. It has three elements and is therefore not isomorphic to $\{\ast\} \cong \{\ast\}^2$.'

  - property: left-invertible
    proof: >-
      Assume that there is a functor $F : \Set \to \Set$ with natural isomorphisms 
      $$\alpha_X : X \to F(X^2).$$
      By the Yoneda Lemma, there is some $u \in F(1)$ such that $\alpha_X$ is given by
      $$\alpha_X(x) = F((x,x) : 1 \to X^2)(u)$$
      for $x \in X$. Since $(x,x)$ factors through the diagonal $\Delta_X : X \to X^2$, and $\alpha_X$ is surjective, it follows that $F(\Delta_X) : F(X) \to F(X^2)$ is surjective. It is also injective since $\Delta_X$ is a split monomorphism. Hence, $F(\Delta_X)$ is an isomorphism.
      Thus, $X \cong F(X^2) \cong F(X)$. But then also $X \cong F(X^2) \cong X^2$, and we obtain a contradiction.
