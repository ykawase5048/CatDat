id: squaring_sets
name: squaring functor on sets
notation: $(-)^2$
source: Set
target: Set
description: This functor maps a set $X$ to its square $X^2$. It is a simple example of a polynomial functor.
nlab_link: null
left_adjoint: doubling_sets

tags:
  - set theory

related_functors:
  - id_Set
  - product_sets
  - sequences_sets

satisfied_properties:
  - property: epimorphism-preserving
    reason: This is obvious.

  - property: initial-object-preserving
    reason: This is obvious.

  - property: representable
    reason: We have $X^2 \cong \Hom(\{1,2\},X)$.

  - property: conservative
    reason: 'This is a straight forward calculation. Assume that $f : X \to Y$ is a map such that $f^2 : X^2 \to Y^2$ is bijective. For every $y \in Y$ there is some $(x_1,x_2) \in X^2$ with $(y,y) = (f(x_1),f(x_2))$, so that $y = f(x_1)$. This shows that $f$ is surjective. To show that $f$ is injective, suppose that $x_1,x_2 \in X$ satisfy $f(x_1)=f(x_2)$. Then $f^2(x_1,x_1) = f^2(x_2,x_2)$, so that $(x_1,x_1) = (x_2,x_2)$, which means that $x_1=x_2$.'

  - property: finitary
    # TODO: refactor this once we add "preserves sifted colimits"
    reason: This is obvious. The functor even preserves all sifted colimits.

  - property: reflexive-coequalizer-preserving
    # TODO: refactor this once we add "preserves sifted colimits"
    reason: See Prop. 2.4 at the <a href="https://ncatlab.org/nlab/show/reflexive+coequalizer" target="_blank">nLab</a>.

  - property: right adjoint
    reason: We have $\Hom(X+X,Y) \cong \Hom(X,Y)^2 \cong \Hom(X,Y \times Y)$.
    check_redundancy: false

unsatisfied_properties:
  - property: full
    reason: If $X$ has more than one element, the swap $X^2 \to X^2$, $(x,y) \mapsto (y,x)$ is not induced by a map $X \to X$.

  - property: coequalizer-preserving
    reason: 'Consider the two maps $x,y : \{\ast\} \rightrightarrows \{x,y\}$. Their coequalizer is the unique map $\{x,y\} \to \{\ast\}$. The coequalizer of the induced maps $\{\ast\}^2 \rightrightarrows \{x,y\}^2$ is the quotient of $\{x,y\}^2$ by the equivalence relation generated by $(x,x) \sim (y,y)$. It has three elements and is therefore not isomorphic to $\{\ast\} \cong \{\ast\}^2$.'

  - property: essentially surjective
    reason: We have $2 \neq a^2$ for all $a \in \IN$.
