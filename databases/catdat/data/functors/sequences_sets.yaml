id: sequences_sets
name: sequences functor on sets
notation: $(-)^{\IN}$
source: Set
target: Set
description: This functor maps a set $X$ to the countable power $X^{\IN}$, i.e. the set of sequences in $X$. It is an example of a polynomial functor.
nlab_link: null
left_adjoint: countable_copower_sets

tags:
  - set theory

related_functors:
  - id_Set
  - product_sets
  - squaring_sets

satisfied_properties:
  - property: epimorphism-preserving
    reason: This is obvious.

  - property: initial-object-preserving
    reason: This is obvious.

  - property: monadic
    reason: This is a special case of Theorem 1 in <a href="https://arxiv.org/abs/math/0407251" target="_blank">State monads and their algebras</a> by F. Metayer.

  - property: representable
    reason: We have $X^{\IN} \cong \Hom(\IN,X)$.

unsatisfied_properties:
  - property: full
    reason: There are many counterexamples. For example, take the map $\{0,1\}^\IN  \to \{0,1\}^\IN$ that switches the first two entries. It is not induced by a map $\{0,1\} \to \{0,1\}$.

  - property: essentially surjective
    reason: A finite set with at least $2$ elements is not contained in the essential image.

  - property: finitary
    reason: >-
      If $X$ is any set, it is the colimit of its finite subsets (ordered by inclusion), and the canonical map
      $$\colim_{E \subseteq X \text{ finite}} E^{\IN} \hookrightarrow X^{\IN}$$
      is the inclusion of the set of sequences with only finitely many values. Hence, when $X$ is infinite, it is not bijective.

  - property: finite-coproduct-preserving
    reason: 'The natural map $X^{\IN} + Y^{\IN} \hookrightarrow (X+Y)^{\IN}$ is injective, but it is not surjective if $X$ and $Y$ are both non-empty: Take $x \in X$, $y \in Y$, then the sequence $(x,y,y,y,\dotsc)$ is not contained in the image.'

  - property: reflexive-coequalizer-preserving
    reason: >-
      Let $E \coloneqq \{(a,b) \in \IZ^2 : |a-b| \leq 1 \}$. We have two projection maps $p_1,p_2 : E \rightrightarrows \IZ$ with common section $a \mapsto (a,a)$. The coequalizer of $p_1,p_2$ is the quotient of $\IZ$ by the equivalence relation generated by $a \sim a \pm 1$ for $a \in \IZ$. Thus, all integers become identified, and the unique map $\IZ \to \{\ast\}$ is a coequalizer of $p_1,p_2$. We will show that the coequalizer of ${p_1}^{\IN},{p_2}^{\IN}$ is much larger than $\{\ast\}^{\IN} \cong \{\ast\}$.

      The set $E^{\IN}$ can be identified with the set of pairs of integer sequences $(a,b) \in \IZ^{\IN} \times \IZ^{\IN}$ such that $|a_n - b_n| \leq 1$ for all $n \in \IN$. We have ${p_1}^{\IN}(a,b)=a$ and ${p_2}^{\IN}(a,b)=b$. Hence, their coequalizer is the quotient of the set of integer sequences $\IZ^{\IN}$ by the equivalence relation generated by the condition $|a_n - b_n| \leq 1$ for all $n \in \IN$. This relation can be described explicitly: two sequences $a,b$ are equivalent if and only if their difference $a-b$ is bounded, i.e. $\sup_{n \in \IN} |a_n - b_n| < \infty$.

      Therefore, there are many non-equivalent sequences, for example $(0,0,0,\dotsc)$ and $(1,2,3,\dotsc)$.
