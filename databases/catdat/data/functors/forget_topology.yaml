id: forget_topology
name: forgetful functor for topological spaces
notation: $U_{\Top}$
source: Top
target: Set
description: This functor maps a topological space $X$ to its underlying set $U_{\Top}(X)$.
nlab_link: https://ncatlab.org/nlab/show/forgetful+functor
left_adjoint: discrete_topology

tags:
  - topology
  - forgetful

related_functors: []

satisfied_properties:
  - property: faithful
    proof: This is trivial.

  - property: representable
    proof: This functor is represented by the singleton space.

  - property: essentially surjective
    proof: Every set can be equipped with the discrete topology.

  - property: left adjoint
    proof: 'The indiscrete topology defines a functor $I : \Set \to \Top$ which is right adjoint to $U_{\Top}$.'

unsatisfied_properties:
  - property: essentially injective
    proof: This is trivial.

  - property: conservative
    proof: If $X$ is a set, the map $D(X) \to I(X)$, $x \mapsto x$ is bijective and continuous (where $D(-)$ denotes the discrete topological space and $I()$ the indiscrete topological space), but not an isomorphism (unless $X$ has at most one element).
