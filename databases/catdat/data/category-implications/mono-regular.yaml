# results on mono-regular and normal categories

- id: mono_regular_consequence
  assumptions:
    - mono-regular
  conclusions:
    - balanced
  proof: Any regular monomorphism that is an epimorphism must be an isomorphism.
  is_equivalence: false

- id: normal_condition
  assumptions:
    - normal
  conclusions:
    - zero morphisms
  proof: This is part of our definition of a normal category.
  is_equivalence: false

- id: mono_regular_via_kernels
  assumptions:
    - normal
  conclusions:
    - mono-regular
  proof: This is trivial.
  is_equivalence: false

- id: normal_criterion
  assumptions:
    - mono-regular
    - preadditive
  conclusions:
    - normal
  proof: The a monomorphism is the equalizer of $f,g$, it is the kernel of $f-g$.
  is_equivalence: false
