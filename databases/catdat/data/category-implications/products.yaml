# results on products and powers

- id: products_consequences
  assumptions:
    - products
  conclusions:
    - countable products
    - finite products
    - powers
  reason: This is trivial.
  is_equivalence: false

- id: finite_products_characterization
  assumptions:
    - finite products
  conclusions:
    - binary products
    - terminal object
  reason: The non-trivial direction follows since finite products can be constructed recursively via $X_1 \times \cdots \times X_{n+1} = (X_1 \times \cdots \times X_n) \times X_{n+1}$.
  is_equivalence: true

- id: products_criterion
  assumptions:
    - cofiltered limits
    - finite products
  conclusions:
    - products
  reason: The product $\prod_{i \in I} X_i$ is the cofiltered limit of the finite partial products $\prod_{i \in E} X_i$ where $E$ ranges over the finite subsets of $I$.
  is_equivalence: false

- id: binary_products_criterion
  assumptions:
    - pullbacks
    - terminal object
  conclusions:
    - binary products
  reason: If $1$ is a terminal object, then $X \times_1 Y = X \times Y$.
  is_equivalence: false

- id: countable_products_consequence
  assumptions:
    - countable products
  conclusions:
    - countable powers
    - finite products
  reason: This is trivial.
  is_equivalence: false

- id: countable_products_criterion
  assumptions:
    - finite products
    - sequential limits
  conclusions:
    - countable products
  reason: If $X_1,X_2,\dotsc$ is an infinite sequence of objects, then their product is the limit of the sequence $\cdots \to X_2 \times X_1 \to X_1$.
  is_equivalence: false

