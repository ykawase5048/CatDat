- id: countable_powers_criterion
  assumptions:
    - finite powers
    - sequential limits
  conclusions:
    - countable powers
  reason: "We can write $X^{\\IN}$ as the limit of the sequence $\\cdots \\to X^3 \\to X^2 \\to X \\to 1$ with transition morphisms $f_n : X^{n+1} \\to X^n$, $(x_1,\\dotsc,x_{n+1}) \\mapsto (x_1,\\dotsc,x_n)$, i.e., $p_i f_n = p_i$ for $1 \\leq i \\leq n$."
  is_equivalence: false

- id: powers_criterion
  assumptions:
    - cofiltered limits
    - finite powers
  conclusions:
    - powers
  reason: The product $X^I$ is the cofiltered limit of the finite powers $X^E$, where $E$ ranges over the finite subsets of $I$.
  is_equivalence: false
