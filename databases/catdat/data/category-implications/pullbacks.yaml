# results on pullbacks and wide pullbacks

- id: pullbacks_criterion
  assumptions:
    - binary products
    - equalizers
  conclusions:
    - pullbacks
  proof: 'The pullback of $f : X \to S$ and $g : Y \to S$ is the equalizer of $p_1 \circ f, \, p_2 \circ g : X \times Y \rightrightarrows S$.'
  is_equivalence: false

- id: connected_limits_characterization
  assumptions:
    - connected limits
  conclusions:
    - equalizers
    - wide pullbacks
  proof: The direction $\Rightarrow$ is trivial. The direction $\Leftarrow$ can be found at the <a href="https://ncatlab.org/nlab/show/connected+limit" target="_blank">nLab</a>.
  is_equivalence: true

- id: wide_pullbacks_criterion
  assumptions:
    - wide pullbacks
  conclusions:
    - cofiltered limits
    - pullbacks
  proof: To prove $\Leftarrow$, a wide pullback can be constructed as a cofiltered limit of finite pullbacks, and finite pullbacks can be reduced to binary pullbacks (the empty-indexed pullback always exists). Conversely, assume that wide pullbacks exist in $\C$. For every object $A$ then the slice category $\C / A$ has wide pullbacks and a terminal object, hence is complete. Since a cofiltered limit can be finally reduced to such a slice, we are done.
  is_equivalence: true

- id: wide_pullbacks_finite
  assumptions:
    - essentially finite
    - pullbacks
  conclusions:
    - wide pullbacks
  proof: Each slice category has finite products and is essentially finite, hence has all products by <a href="/category-implication/freyd_finite">this result</a> followed by <a href="/category-implication/thin_finite_product_reduction">this result</a>.
  is_equivalence: false
