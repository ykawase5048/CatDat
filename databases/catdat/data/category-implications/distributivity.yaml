# results on distributive categories

- id: infinitary_distributive_assumption
  assumptions:
    - infinitary distributive
  conclusions:
    - coproducts
    - finite products
  reason: This holds by definition.
  is_equivalence: false

- id: countably_distributive_assumption
  assumptions:
    - countably distributive
  conclusions:
    - countable coproducts
    - finite products
  reason: This holds by definition.
  is_equivalence: false

- id: distributive_assumption
  assumptions:
    - distributive
  conclusions:
    - finite coproducts
    - finite products
  reason: This holds by definition.
  is_equivalence: false

- id: infinitary_distributive_trivial
  assumptions:
    - infinitary distributive
  conclusions:
    - countably distributive
  reason: This is trivial.
  is_equivalence: false

- id: countably_distributive_trivial
  assumptions:
    - countably distributive
  conclusions:
    - distributive
  reason: This is trivial.
  is_equivalence: false

- id: distributive_consequence
  assumptions:
    - distributive
  conclusions:
    - strict initial object
  reason: See the <a href="https://ncatlab.org/nlab/show/distributive+category" target="_blank">nLab</a> or Prop. 3.4 in <a href="https://doi.org/10.1016/0022-4049(93)90035-R" target="_blank">Introduction to extensive and distributive categories</a>.
  is_equivalence: false

- id: distributive_criterion
  assumptions:
    - cartesian closed
    - finite coproducts
  conclusions:
    - distributive
  reason: Each functor $A \times -$ is left adjoint and hence preserves finite coproducts (in fact, all colimits).
  is_equivalence: false

- id: countably_distributive_criterion
  assumptions:
    - cartesian closed
    - countable coproducts
  conclusions:
    - countably distributive
  reason: Each functor $A \times -$ is left adjoint and hence preserves countable coproducts (in fact, all colimits).
  is_equivalence: false

- id: infinitary_distributive_criterion
  assumptions:
    - cartesian closed
    - coproducts
  conclusions:
    - infinitary distributive
  reason: Each functor $A \times -$ is left adjoint and hence preserves coproducts (in fact, all colimits).
  is_equivalence: false

- id: infinite_distributive_filtered_criterion
  assumptions:
    - cartesian filtered colimits
    - coproducts
    - distributive
  conclusions:
    - infinitary distributive
  reason: Each functor $A \times -$ preserves finite coproducts and filtered colimits, hence all coproducts.
  is_equivalence: false

- id: countably_distributive_filtered_criterion
  assumptions:
    - cartesian filtered colimits
    - countable coproducts
    - distributive
  conclusions:
    - countably distributive
  reason: Each functor $A \times -$ preserves finite coproducts and filtered colimits, hence all countable coproducts.
  is_equivalence: false

- id: distributive_duality
  assumptions:
    - distributive
    - thin
  conclusions:
    - codistributive
  reason: This is equivalent to the classical result that the <a href="https://en.wikipedia.org/wiki/Distributive_lattice" target="_blank">distributivity law in a lattice</a> can be defined in two ways, see e.g. Birkhoff, <i>Lattice Theory</i>, Ch. IX, Thm. 1.
  is_equivalence: false
