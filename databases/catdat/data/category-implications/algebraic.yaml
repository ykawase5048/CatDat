# results on finitary algebraic categories and related notions

- id: finitary_algebraic_consequence
  assumptions:
    - finitary algebraic
  conclusions:
    - locally strongly finitely presentable
  reason: This is trivial because a locally strongly finitely presentable category is a variety of many-sorted finitary algebras.
  is_equivalence: false

- id: algebraic_well-copowered
  assumptions:
    - finitary algebraic
  conclusions:
    - well-copowered
  reason: See <a href="https://mathoverflow.net/questions/486607" target="_blank">MSE/486607</a>. Alternatively, one may combine the facts that finitary algebraic categories are locally (finitely) presentable and that locally presentable categories are well-copowered, both of which are saved in the database. But we include the direct proof here as well, since it makes it easier to deduce the property for finitary algebraic categories appearing in practice.
  is_equivalence: false

- id: many_sorted_algebraic_implies_regular
  assumptions:
    - locally strongly finitely presentable
  conclusions:
    - regular
  reason: The regular epimorphisms are precisely the sort-wise surjective homomorphisms, which are clearly stable under pullbacks.
  is_equivalence: false

- id: generalized_variety_require_sifted_colimit
  assumptions:
    - generalized variety
  conclusions:
    - sifted colimits
  reason: This holds by definition.
  is_equivalence: false

- id: generalized_variety_implies_accessible
  assumptions:
    - generalized variety
  conclusions:
    - ℵ₁-accessible
  reason: See <a href="http://www.tac.mta.ca/tac/volumes/8/n3/8-03abs.html" target="_blank">[AR01, Remark 4.8(2)]</a>.
  is_equivalence: false

- id: groupoids_are_generalized_varieties
  assumptions:
    - groupoid
    - essentially small
  conclusions:
    - generalized variety
    - finitely accessible
  reason: This is proven <a href="/content/sifted-colimits-in-groupoids">here</a>.
  is_equivalence: false

- id: generalized_variety_left_cancellative
  assumptions:
    - left cancellative
    - finitely accessible
  conclusions:
    - generalized variety
  reason: >-
    Let $\C$ be a finitely accessible left cancellative category. The proof of <a href="/category-implication/sifted_colimits_left_cancellative">this result</a> shows that every sifted diagram $\I \to \C$ factors through the preorder reflection of $\I$, and hence reduces to a filtered diagram. Since $\C$ has filtered colimits, it therefore also has sifted colimits.
    It follows that every functor on $\C$ preserving filtered colimits automatically preserves sifted colimits. In particular, for representable functors this means that every finitely presentable object is automatically strongly finitely presentable.
    Now let $G$ be a set of finitely presentable objects in $\C$ generating all objects via filtered colimits. The claim follows because every filtered colimit is sifted and the objects in $G$ are strongly finitely presentable.
  is_equivalence: false

- id: multi-algebraic_implies_locally_finitely_multi-presentable
  assumptions:
    - multi-algebraic
  conclusions:
    - locally finitely multi-presentable
  reason: This is because that every (finite product, coproduct)-sketch is clearly a (finite limit, coproduct)-sketch.
  is_equivalence: false

- id: varieties_are_multi-algebraic
  assumptions:
    - locally strongly finitely presentable
  conclusions:
    - multi-algebraic
  reason: This is because that every finite-product-sketch is clearly a (finite product, coproduct)-sketch.
  is_equivalence: false

- id: multi-algebraic_another_definition
  assumptions:
    - multi-algebraic
  conclusions:
    - generalized variety
    - multi-cocomplete
  reason: This follows from one of equivalent formulations of multi-algebraic categories.
  is_equivalence: true

- id: multi-algebraic_implies_effective_congruences
  assumptions:
    - multi-algebraic
  conclusions:
    - effective congruences
  reason: This is Thm. 4.0 in <a href="https://doi.org/10.1007/BF01224953" target="_blank">Yves Diers, Catégories Multialgébriques</a> or <a href="https://translations.thosgood.net/ADM-34-1980-193.pdf" target="_blank">its English translation</a>.
  is_equivalence: false
