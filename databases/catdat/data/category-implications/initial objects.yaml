# results on initial objects, zero objects, and strict initial objects

- id: pointed_characterization
  assumptions:
    - pointed
  conclusions:
    - initial object
    - zero morphisms
  reason: This is easy.
  is_equivalence: true

- id: strict_initial_consequence
  assumptions:
    - strict initial object
  conclusions:
    - initial object
  reason: This holds by definition.
  is_equivalence: false

- id: strict_initial_trivial
  assumptions:
    - pointed
    - strict initial object
  conclusions:
    - trivial
  reason: If $0$ is the zero object, then for every object $A$ the unique morphism $A \to 0$ is an isomorphism by assumption.
  is_equivalence: false

- id: strict_initial_left_criterion
  assumptions:
    - initial object
    - left cancellative
  conclusions:
    - strict initial object
  reason: "It suffices to prove that in general any monomorphism $f : A \\to 0$ into an initial object is an isomorphism. If $g : 0 \\to A$ is the unique morphism, then $f \\circ g = \\id_0$ since $0$ is initial. But then $f$ is a split epimorphism and a monomorphism, hence an isomorphism."
  is_equivalence: false

- id: strict_initial_right_criterion
  assumptions:
    - initial object
    - right cancellative
  conclusions:
    - strict initial object
  reason: "Let $f : A \\to 0$ be a morphism. Let $g : 0 \\to A$ be the unique morphism. It is an epimorphism by assumption. Also, $f \\circ g = \\id_0$ since $0$ is initial. But then $g$ is a split monomorphism and an epimorphism, hence an isomorphism."
  is_equivalence: false
