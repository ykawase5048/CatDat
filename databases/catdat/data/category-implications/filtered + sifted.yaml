# results on filtered and sifted categories

- id: filtered_is_sifted
  assumptions:
    - filtered
  conclusions:
    - sifted
  reason: 'Every filtered category $\C$ is inhabited and has final diagonal functors $\Delta : \C \to \C^J$ for all finite index categories $J$; in particular, it is inhabited and its diagonal $\Delta: \C \to \C \times \C$ is final.'
  is_equivalence: false

- id: sifted_is_connected
  assumptions:
    - sifted
  conclusions:
    - connected
  reason: Sifted categories are inhabited, and any two objects in a sifted category are joined by a cospan.
  is_equivalence: false

- id: coproducts_implies_sifted
  assumptions:
    - binary coproducts
    - inhabited
  conclusions:
    - sifted
  reason: The category is inhabited by assumption, and the coproduct of two objects is initial in the corresponding category of cospans.
  is_equivalence: false

- id: sifted_left_cancellative_implies_thin
  assumptions:
    - left cancellative
    - sifted
  conclusions:
    - thin
  reason: >-
    For any object $X$ in a left-cancellative category, the connected component containing
    $$X \xrightarrow{\id} X \xleftarrow{\id} X$$
    in the category of cospans from $X$ to $X$ consists only of cospans
    $$X \xrightarrow{f} Y \xleftarrow{g} X$$
    where $f=g$; hence when the category is also sifted, all cospans must be of this form, and so any two parallel morphisms are equal.
  is_equivalence: false

- id: terminal_object_yields_filtered
  assumptions:
    - terminal object
  conclusions:
    - filtered
  reason: This is obvious.
  is_equivalence: false

- id: filtered_criterion
  assumptions:
    - finitely cocomplete
  conclusions:
    - filtered
  reason: Every finite diagram even admits a <i>universal</i> cocone.
  is_equivalence: false

- id: filtered_via_equalizers
  assumptions:
    - coequalizers
    - semi-strongly connected
  conclusions:
    - filtered
  reason: This is obvious.
  is_equivalence: false
