# results on complete and multi-complete categories.
# for specific types of limits, use other files.

- id: complete_consequence
  assumptions:
    - complete
  conclusions:
    - connected limits
    - finitely complete
  reason: This is trivial.
  is_equivalence: false

- id: complete_characterization
  assumptions:
    - complete
  conclusions:
    - equalizers
    - products
  reason: See <a href="https://ncatlab.org/nlab/show/Categories+for+the+Working+Mathematician" target="_blank">Mac Lane</a>, V.2, Thm. 2.
  is_equivalence: true

- id: finitely_complete_characterization
  assumptions:
    - finitely complete
  conclusions:
    - equalizers
    - finite products
  reason: See <a href="https://ncatlab.org/nlab/show/Categories+for+the+Working+Mathematician" target="_blank">Mac Lane</a>, V.2, Cor. 1.
  is_equivalence: true

- id: complete_criterion
  assumptions:
    - terminal object
    - wide pullbacks
  conclusions:
    - complete
  reason: See the <a href="https://ncatlab.org/nlab/show/wide+pullback" target="_blank">nLab</a>.
  is_equivalence: false

- id: multi-complete_generalize_limits
  assumptions:
    - complete
  conclusions:
    - multi-complete
  reason: Limits are precisely multi-limits such that the set of cones is singleton.
  is_equivalence: false

- id: multi-terminal_special_case
  assumptions:
    - multi-complete
  conclusions:
    - multi-terminal object
  reason: This is trivial.
  is_equivalence: false

- id: multi-terminal_with_connected
  assumptions:
    - connected
    - multi-terminal object
  conclusions:
    - terminal object
  reason: Let $(T_i)_{i\in I}$ be a multi-terminal object in a connected category $\C$. By definition of multi-terminal objects, for each object $C$, there are a unique index $i_C\in I$ and a unique morphism $C \to T_{i_C}$. Since the index $i_C$ is invariant under connected components, $I$ must be a singleton. The converse is trivial.
  is_equivalence: true

- id: multi-complete_with_finite_coproducts
  assumptions:
    - finite coproducts
    - multi-complete
  conclusions:
    - complete
  reason: Let $D\colon \S \to \C$ be a small diagram in a category $\C$. Since $\C$ has finite coproducts, the category $\Cone(D)$ of cones over $D$ has finite coproducts. In particular, $\Cone(D)$ is connected, hence a multi-terminal object in it automatically becomes a terminal object.
  is_equivalence: false
