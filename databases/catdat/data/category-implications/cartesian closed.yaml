# results on cartesian closed categories and locally cartesian closed categories

- id: ccc_condition
  assumptions:
    - cartesian closed
  conclusions:
    - finite products
  reason: This holds by definition.
  is_equivalence: false

- id: ccc_consequence
  assumptions:
    - cartesian closed
    - initial object
  conclusions:
    - strict initial object
  reason: See the <a href="https://ncatlab.org/nlab/show/strict+initial+object" target="_blank">nLab</a>.
  is_equivalence: false

- id: ccc_cartesian_filtered_colimits
  assumptions:
    - cartesian closed
    - filtered colimits
  conclusions:
    - cartesian filtered colimits
  reason: Each functor $X \times -$ is a left adjoint and therefore preserves (filtered) colimits.
  is_equivalence: false

- id: ccc_no_strict_terminal
  assumptions:
    - cartesian closed
    - strict terminal object
  conclusions:
    - thin
  reason: If a morphism $X \to Y$ exists, we get a morphism $1 \to [X,Y]$, which forces $[X,Y]$ to be a terminal object by assumption. But then any two morphisms $1 \rightrightarrows [X,Y]$ are equal, so that any two morphisms $X \rightrightarrows Y$ are equal.
  is_equivalence: false

- id: power_construction
  assumptions:
    - cartesian closed
    - copowers
  conclusions:
    - powers
  reason: 'The power $X^I$ can be constructed as $[I \otimes 1, X]$ because $$\begin{align*} \Hom(T,[I \otimes 1, X]) & \cong \Hom(T \times (I \otimes 1),X) \\ & \cong \Hom(I \otimes (T \times 1),X) \\ & \cong \Hom(I \otimes T,X) \\ & \cong \Hom(T,X)^I. \end{align*}$$ In the second isomorphism we have used that $T \times -$ preserves copowers, which is true because it is a left adjoint.'
  is_equivalence: false

- id: countable_power_construction
  assumptions:
    - cartesian closed
    - countable copowers
  conclusions:
    - countable powers
  reason: We can recycle <a href="/category-implication/power_construction">this proof</a>.
  is_equivalence: false

- id: pullbacks_are_local_products
  assumptions:
    - locally cartesian closed
  conclusions:
    - pullbacks
  reason: Pullbacks are binary products in slice categories.
  is_equivalence: false

- id: locally_cartesian_closed_with_terminal_is_closed
  assumptions:
    - locally cartesian closed
    - terminal object
  conclusions:
    - cartesian closed
  reason: The slice over the terminal object is the category itself.
  is_equivalence: false

- id: lcc_implies_regular
  assumptions:
    - coequalizers
    - finitely complete
    - locally cartesian closed
  conclusions:
    - regular
  reason: See <a href="https://ncatlab.org/nlab/show/Sketches+of+an+Elephant" target="_blank">Johnstone</a>, Lemma A1.5.13. From this it follows also that every elementary topos is regular.
  is_equivalence: false

- id: cartesian_closed_thin_criterion
  assumptions:
    - complete
    - essentially small
    - infinitary distributive
    - thin
  conclusions:
    - cartesian closed
  reason: This is an application of the adjoint functor theorem. Specifically, if $P$ is a complete lattice in which $\sup_i \inf(t,x_i) = \inf(t, \sup_i y_i)$ always holds, then the functor $\inf(t,-)$ is a left adjoint because it preserves all suprema.
  is_equivalence: false

- id: sequential_implies_lcc
  assumptions:
    - semi-strongly connected
    - thin
  conclusions:
    - locally cartesian closed
  reason: Each slice is thin, semi-strongly connected, and has a terminal object. Thus, it corresponds to a linear order with a largest element $1$. Every such category is cartesian closed, where the exponential $a \Rightarrow b$ (Heyting implication) is $1$ when $a \leq b$ and otherwise $b$.
  is_equivalence: false
