id: kernels
relation: has
description: 'A category has <i>kernels</i> if it has zero morphisms and every morphism $f : A \to B$ has a kernel, i.e. an equalizer of $f$ with the zero morphism $0_{A,B} : A \to B$.'
nlab_link: https://ncatlab.org/nlab/show/kernel
dual: cokernels
invariant_under_equivalences: true

related_properties:
  - coquotients of cocongruences
  - equalizers
  - normal
  - zero morphisms

tags:
  - limits
