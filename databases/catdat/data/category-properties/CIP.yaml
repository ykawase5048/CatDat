id: CIP
relation: satisfies
description: >-
  A category satisfies <i>CIP</i> ("coproducts inject into products") if it has zero morphisms, products, coproducts, and for every family of objects $(X_i)_{i \in I}$ the canonical morphism
  $$\textstyle \alpha : \coprod_i X_i \to \prod_{i \in I} X_i$$
  defined by $p_j \circ \alpha \circ \iota_i = \delta_{i,j}$ is a monomorphism.
  This is no standard terminology. This property has been added to clarify relationships between other properties, in particular those concerning the commutation between limits and colimits.
nlab_link: null
dual_property: CSP
invariant_under_equivalences: true

related_properties:
  - coproducts
  - counital
  - filtered-colimit-stable monomorphisms
  - products
  - zero morphisms

tags:
