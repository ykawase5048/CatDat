id: copowers
relation: has
description: If $X$ is an object and $I$ is a set, the <i>copower</i> is defined as the coproduct $I \otimes X \coloneqq \coprod_{i \in I} X$. This property refers to the existence of copowers.
nlab_link: https://ncatlab.org/nlab/show/copower
dual_property: powers
invariant_under_equivalences: true

related_properties:
  - coproducts
  - countable copowers
  - finite copowers
