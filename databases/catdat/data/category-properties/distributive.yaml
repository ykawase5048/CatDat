id: distributive
relation: is
description: A category is <i>distributive</i> if it has finite products, finite coproducts, and for every object $A$ the functor $A \times -$ preserves finite coproducts. Concretely, for every finite family of objects $(B_i)$ the canonical morphism $\coprod_i (A \times B_i) \to A \times \coprod_i B_i$ must be an isomorphism.
nlab_link: https://ncatlab.org/nlab/show/distributive+category
dual_property: codistributive
invariant_under_equivalences: true

related_properties:
  - countably distributive
  - finite coproducts
  - finite products
  - infinitary distributive

tags:
  - limit–colimit interaction
