id: locally strongly finitely presentable
relation: is
description: 'A category is <i>locally strongly finitely presentable</i> if it is cocomplete and there is a set $G$ of strongly finitely presentable objects such that every object is a sifted colimit of objects from $G$. There are several equivalent conditions: <ol> <li>It is equivalent to the category of models of a many-sorted finitary algebraic theory.</li> <li>It is equivalent to the category of finite-product-preserving functors to $\Set$ from a small category with finite products (=Lawvere theory).</li> <li>It is equivalent to the category of models of a small finite-product sketch.</li> <li>It is equivalent to the Eilenberg&ndash;Moore category of a finitary (=filtered-colimit-preserving) monad on $\Set^S$ for some set $S$.</li> <li>It is equivalent to the Eilenberg&ndash;Moore category of a sifted-colimit-preserving monad on $\Set^S$ for some set $S$. (cf. [<a href="https://doi.org/10.2168/LMCS-8(3:14)2012" target="_blank">KR12</a>, Proposition 3.3])</li> </ol> A category satisfying this property is simply called a <i>variety</i> (of algebras) by some authors, although one should be aware that this term is sometimes used only for the one-sorted case.'
nlab_link: https://ncatlab.org/nlab/show/locally+strongly+finitely+presentable+category
invariant_under_equivalences: true

