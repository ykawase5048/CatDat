id: mono-regular
relation: is
description: A category is <i>mono-regular</i> when every monomorphism is regular, i.e. the equalizer of a pair of morphisms. Notice that this is not standard terminology, <a href="https://math.stackexchange.com/questions/5031588" target="_blank">apparently</a> the literature has no name for this yet. A <i>preadditive</i> category is mono-regular iff it is normal. The notion of a normal category is reserved for categories with zero morphisms, while mono-regular applies to all categories.
nlab_link: https://ncatlab.org/nlab/show/regular+monomorphism
dual_property: epi-regular
invariant_under_equivalences: true

related_properties:
  - effective congruences
  - normal
  - subobject-trivial
