id: countable coproducts
relation: has
description: A category has <i>countable coproducts</i> if it has coproducts for countable families of objects.
dual_property: countable products
invariant_under_equivalences: true

related_properties:
  - coproducts
  - finite coproducts
  - countable copowers
  - ℵ₂-small coproducts
