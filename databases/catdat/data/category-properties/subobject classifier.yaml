id: subobject classifier
relation: has a
description: 'A category $\C$ has a <i>subobject classifier</i> if it has finite limits and a monomorphism* $\top : 1 \hookrightarrow \Omega$ such that for every monomorphism $m : A \hookrightarrow B$ there is a unique morphism $\chi_m : B \to \Omega$ such that $$\begin{CD} A @>{m}>> B \\ @V{!}VV @VV{\chi_m}V \\ 1 @>>{\top}> \Omega \end{CD}$$ is a pullback diagram. Equivalently, the functor $\Sub : \C^{\op} \to \Set^+$ is representable.<br> *Every morphism $1 \to \Omega$ is a split monomorphism anyway.'
nlab_link: https://ncatlab.org/nlab/show/subobject+classifier
dual_property_id: quotient object classifier
invariant_under_equivalences: true

related_properties:
  - elementary topos
  - finitely complete
  - regular subobject classifier
