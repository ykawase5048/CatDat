id: normal
relation: is
description: A category is <i>normal</i> if it has zero morphisms and every monomorphism is a kernel of some morphism (in which case case it is also called a <i>normal monomorphism</i>). The assumption of having zero morphisms makes it possible to talk about kernels.
nlab_link: https://ncatlab.org/nlab/show/normal+monomorphism
dual_property: conormal
invariant_under_equivalences: true

related_properties:
  - effective congruences
  - kernels
  - mono-regular
  - zero morphisms
