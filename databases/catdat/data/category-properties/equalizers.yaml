id: equalizers
relation: has
description: 'An <i>equalizer</i> of a pair of morphisms $f,g : A \rightrightarrows B$ is an object $E$ with a morphism $e : E \to A$ such that $f \circ e = g \circ e$ and which is universal with respect to this property. This property refers to the existence of equalizers.'
nlab_link: https://ncatlab.org/nlab/show/equalizer
dual_property_id: coequalizers
invariant_under_equivalences: true

related_properties:
  - coquotients of cocongruences
  - coreflexive equalizers
  - finitely complete
  - kernels
