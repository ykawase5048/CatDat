id: finitely accessible
relation: is
description: A category is <i>finitely accessible</i> if it has filtered colimits and there is a (small) set $G$ of finitely presentable objects such that every object is a filtered colimit of objects in $G$.
nlab_link: https://ncatlab.org/nlab/show/accessible+category
invariant_under_equivalences: true

related_properties:
  - accessible
  - filtered colimits
  - locally finitely multi-presentable
  - locally finitely presentable
  - ℵ₁-accessible

