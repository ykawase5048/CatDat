id: multi-algebraic
relation: is
description: >-
  A category is <i>multi-algebraic</i> if it satisfies one of the following equivalent conditions:
  <ol>
  <li>It is a multi-cocomplete generalized variety, that is, it has multi-colimits and sifted colimits of all small diagrams, and there is a (small) set $G$ of strongly finitely presentable objects such that every object is a sifted colimit of objects from $G$.</li>
  <li>It is equivalent to the category of models of a small (finite product, coproduct)-sketch, shortly small <i>FPC-sketch</i>.</li>
  <li>It is equivalent to the category of multi-finite-product-preserving functors to $\Set$ from a small category with multi-finite-products (<i>multi-algebraic theory</i>). Here, multi-finite-products means multi-limits of finite discrete diagrams.</li>
  <li>It is equivalent to the category of models of a small multi-finite-product sketch.</li>
  </ol>
  Multi-algebraic categories are like locally strongly finitely presentable categories but only with multi-colimits. The relation is similar as between locally finitely multi-presentable and locally finitely presentable categories. For equivalence of conditions above, see [<a href="https://doi.org/10.1016/S0022-4049(01)00015-9" target="_blank">AR01a</a>, Lem. 1] and [<a href="http://www.tac.mta.ca/tac/volumes/8/n3/8-03abs.html" target="_blank">AR01b</a>, Thm. 4.4]. This notion was originally introduced by <a href="https://doi.org/10.1007/BF01224953" target="_blank">Diers</a>.
nlab_link: null
invariant_under_equivalences: true

