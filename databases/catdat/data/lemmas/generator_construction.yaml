id: generator_construction

title: Construction of Generators

claim: In a category let $S$ be a generating set which is <a href="/category-property/strongly_connected">strongly connected</a> (between any two objects in $S$ there is a morphism). If the coproduct $U \coloneqq \coprod_{G \in S} G$ exists, then it is a generator.

proof: 'This is a straight forward generalization of <a href="/category-implication/generator_via_coproduct">this result</a>. We remark that the assumption about $S$ implies that each inclusion $G \to U$ has a left inverse. Now let $f,g : A \rightrightarrows B$ be two morphisms with $f h = g h$ for all $h : U \to A$. If $G \in S$, any morphism $G \to A$ extends to $U$ by our preliminary remark. Thus, $fh = gh$ holds for all $h : G \to A$ and $G \in S$. Since $S$ is a generating set, this implies $f = g$.'
