id: Ab
name: category of abelian groups
notation: $\Ab$
objects: abelian groups
morphisms: group homomorphisms
description: This is the prototype of an abelian category.
nlab_link: https://ncatlab.org/nlab/show/Ab

tags:
  - algebra

related_categories:
  - Ab_fg
  - CMon
  - FinAb
  - FreeAb
  - Grp
  - R-Mod
  - TorsAb
  - TorsFreeAb

satisfied_properties:
  - property: locally small
    proof: There is a forgetful functor $\Ab \to \Set$ and $\Set$ is locally small.

  - property: abelian
    proof: This is standard, see <a href="https://ncatlab.org/nlab/show/Categories+for+the+Working+Mathematician" target="_blank">Mac Lane</a>, Ch. VIII.

  - property: finitary algebraic
    proof: Take the algebraic theory of a commutative group.

unsatisfied_properties:
  - property: skeletal
    proof: This is trivial.

  - property: split abelian
    proof: The short exact sequence $0 \xrightarrow{} \IZ \xrightarrow{p} \IZ \xrightarrow{} \IZ/p \xrightarrow{} 0$ does not split.

  - property: CSP
    proof: The canonical homomorphism $\bigoplus_{n \geq 0} \IZ \to \prod_{n \geq 0} \IZ$ is not surjective, hence no epimorphism.

special_objects:
  initial object:
    description: trivial group
  terminal object:
    description: trivial group
  coproducts:
    description: direct sums
  products:
    description: direct products with pointwise operations

special_morphisms:
  isomorphisms:
    description: bijective homomorphisms
    proof: This characterization holds in every algebraic category.
  monomorphisms:
    description: injective homomorphisms
    proof: 'This holds in every finitary algebraic category: the forgetful functor to $\Set$ is faithful, hence reflects monomorphisms, and it is continuous (even representable), hence preserves monomorphisms.'
  epimorphisms:
    description: surjective homomorphisms
    proof: 'For the non-trivial direction, if $f : A \to B$ is an epimorphism, then $p \circ f = 0$ for the projection  $p : B \to B/f(A)$ implies that $p = 0$, so that $B = f(A)$.'
  regular monomorphisms:
    description: same as monomorphisms
    proof: This is because the category is mono-regular.
  regular epimorphisms:
    description: same as epimorphisms
    proof: This is because the category is epi-regular.
