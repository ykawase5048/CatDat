id: walking_pair
name: walking parallel pair
notation: $\{0 \rightrightarrows 1 \}$
objects: two objects $0$ and $1$
morphisms: the two identities and two parallel morphisms from $0$ to $1$
description: The name of this category comes from the fact that it consists of two parallel morphisms, and a functor out of this category is the same as a parallel pair of morphisms in the target category.
nlab_link: https://ncatlab.org/nlab/show/walking+structure

tags:
  - category theory
  - finite

related_categories:
  - walking_coreflexive_pair
  - walking_fork
  - walking_morphism

satisfied_properties:
  - property: small
    proof: This is trivial.

  - property: finite
    proof: This is trivial.

  - property: self-dual
    proof: This is trivial.

  - property: semi-strongly connected
    proof: This is trivial.

  - property: skeletal
    proof: The two objects are not isomorphic.

  - property: one-way
    proof: This is trivial.

  - property: generator
    proof: It is easy to check that $0$ is a generator.

  - property: left cancellative
    proof: The two morphisms $0 \rightrightarrows 1$ are clearly monomorphisms.

unsatisfied_properties:
  - property: strongly connected
    proof: There is no morphism $1 \to 0$.

  - property: pullbacks
    proof: 'The two morphisms $a,b : 0 \rightrightarrows 1$ have no pullback, since it would have to consist of identities $0 \leftarrow 0 \rightarrow 0$, but $a \neq b$.'

special_objects: {}

special_morphisms:
  isomorphisms:
    description: the two identities
    proof: This is trivial.
  monomorphisms:
    description: every morphism
    proof: This is trivial.
  epimorphisms:
    description: every morphism
    proof: Each $0 \to 1$ is an epimorphism since the only morphism starting at $1$ is the identity.
  regular monomorphisms:
    description: same as isomorphisms
    proof: This is because the category is right cancellative.
  regular epimorphisms:
    description: same as isomorphisms
    proof: This is because the category is left cancellative.
