id: walking_composable_pair
name: walking composable pair
notation: $\{ 0 \to 1 \to 2 \}$
objects: three objects $0,1,2$
morphisms: a single morphism from each natural number to one greater than or equal to it
description: The name of this category comes from the fact that a functor out of it is the same as a composable pair of morphisms.
nlab_link: https://ncatlab.org/nlab/show/composable+pair

tags:
  - category theory
  - finite
  - thin

related_categories:
  - walking_fork
  - walking_morphism

satisfied_properties:
  - property: small
    proof: This is trivial.

  - property: finite
    proof: This is trivial.

  - property: skeletal
    proof: This is trivial.

  - property: semi-strongly connected
    proof: This is trivial.

  - property: self-dual
    proof: This is trivial.

  - property: locally strongly finitely presentable
    proof: 'Take the two-sorted (finitary) algebraic theory with exactly one unary operation between them and the equation $x=y$ for each sort. There are exactly three algebras for this theory up to isomorphism: the identities on the empty set and the singleton, the morphism from the empty set to the singleton. Hence we get the equivalence to $\{0 \to 1 \to 2\}$.'

unsatisfied_properties:
  - property: finitary algebraic
    proof: This follows from <a href="/content/thin_algebraic_categories">this lemma</a>.

special_objects:
  initial object:
    description: $0$
  terminal object:
    description: $2$
  coproducts:
    description: supremum taken in $\{0 < 1 < 2\}$
  products:
    description: infimum taken in $\{0 < 1 < 2\}$

special_morphisms:
  isomorphisms:
    description: the three identities
    proof: This is trivial.
  monomorphisms:
    description: every morphism
    proof: It is a thin category.
  epimorphisms:
    description: every morphism
    proof: It is a thin category.
  regular monomorphisms:
    description: same as isomorphisms
    proof: This is because the category is right cancellative.
  regular epimorphisms:
    description: same as isomorphisms
    proof: This is because the category is left cancellative.
