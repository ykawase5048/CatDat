id: walking_morphism
name: walking morphism
notation: $I$
objects: $0$, $1$
morphisms: the two identities and a single morphism from $0$ to $1$
description: >-
  This is also known as the interval category and can be pictured as:
  $$\{0 \to 1\}$$
  It has the property that functors $I \to \C$ are the same as morphisms in $\C$, which explains its name.
nlab_link: https://ncatlab.org/nlab/show/interval+category
tags:
  - category theory
  - finite
  - thin

related:
  - walking_commutative_square
  - walking_composable_pair
  - walking_idempotent
  - walking_isomorphism
  - walking_pair
  - walking_span
  - walking_splitting

satisfied_properties:
  - property: small
    proof: This is trivial.

  - property: finite
    proof: This is trivial.

  - property: skeletal
    proof: The two objects are not isomorphic.

  - property: self-dual
    proof: This is trivial.

  - property: semi-strongly connected
    proof: This is trivial.

  - property: finitary algebraic
    proof: Take the algebraic theory with no operations but with the equation $x=y$ that is supposed to hold for all elements $x,y$. The algebras for this theory are the empty set and the singleton set, hence we get the equivalence to $I$.

unsatisfied_properties:
  - property: trivial
    proof: This is trivial.

special_objects:
  initial object:
    description: $0$
  terminal object:
    description: $1$
  coproducts:
    description: $0 \sqcup x = x$, $1 \sqcup x = 1$
  products:
    description: $0 \times x = 0$, $1 \times x = x$

special_morphisms:
  isomorphisms:
    description: the two identities
    proof: This is trivial.
  monomorphisms:
    description: every morphism
    proof: It is a thin category.
  epimorphisms:
    description: every morphism
    proof: It is a thin category.
  regular monomorphisms:
    description: same as isomorphisms
    proof: This is because the category is right cancellative.
  regular epimorphisms:
    description: same as isomorphisms
    proof: This is because the category is left cancellative.
