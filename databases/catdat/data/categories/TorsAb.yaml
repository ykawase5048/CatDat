id: TorsAb
name: category of torsion abelian groups
notation: $\TorsAb$
objects: torsion abelian groups
morphisms: group homomorphisms
description: This is a Grothendieck abelian category containing all finite abelian groups.
nlab_link: https://ncatlab.org/nlab/show/torsion+subgroup

tags:
  - algebra

related_categories:
  - Ab
  - FinAb
  - TorsFreeAb

satisfied_properties:
  - property_id: locally small
    reason: There is a forgetful functor $\TorsAb \to \Ab$ and $\Ab$ is locally small.

  - property_id: cocomplete
    reason: The embedding $\TorsAb \hookrightarrow \Ab$ is closed under colimits and $\Ab$ is cocomplete.
    check_redundancy: false

  - property_id: complete
    reason: The embedding $\TorsAb \hookrightarrow \Ab$ has a right adjoint, sending an abelian group $A$ to its torsion subgroup $T(A)$. Since $\Ab$ is complete, $\TorsAb$ is complete as well. The limit of a diagram of torsion abelian groups is the torsion subgroup of the limit of the underlying abelian groups. Notice that the torsion subgroup is not required in the case of equalizers, since a subgroup of a torsion abelian group is already torsion. Also, a <i>finite</i> product of torsion abelian groups is already torsion.
    check_redundancy: false

  - property_id: preadditive
    reason: It is a full subcategory of the preadditive category $\Ab$.

  - property_id: normal
    reason: 'If $f : A \to B$ is a monomorphism, it is injective (see below). In $\Ab$ it is then the kernel of $B \to B/f(A)$. Since $B/f(A)$ is torsion, it is also the kernel in $\TorsAb$.'

  - property_id: conormal
    reason: 'If $f : A \to B$ is an epimorphism, it is surjective (see below). In $\Ab$ it is then the cokernel of its kernel $K \hookrightarrow A$. Since $K$ is torsion, it is also the cokernel in $\TorsAb$.'

  - property_id: finitely accessible
    reason: We already know that (filtered) colimits exist and are preserved by the forgetful functor to $\Ab$. Every torsion abelian group is the filtered colimit of its finitely generated subgroups (which are finite). These are finitely presentable in $\Ab$, hence also in $\TorsAb$.

unsatisfied_properties:
  - property_id: skeletal
    reason: This is trivial.

  - property_id: split abelian
    reason: The sequence $0 \to \IZ/2 \to \IZ/4 \to \IZ/2 \to 0$ does not split.

  - property_id: CSP
    reason: The canonical homomorphism $\bigoplus_{n \geq 0} \IZ/2 \to T(\prod_{n \geq 0} \IZ/2)$ is not surjective, since the torsion element $(1,1,\dotsc)$ does not lie in the image. Hence, it is no epimorphism.

  - property_id: locally strongly finitely presentable
    reason: >-
      Assume that it is locally strongly finitely presentable, and therefore the category of algebras of a multi-sorted finitary algebraic theory. For each sort $s$ let $F_s$ be the free algebra on one generator of sort $s$. One of them must be non-trivial, since otherwise the category would be thin. So assume $F_s \neq 0$. It is finitely presentable, hence a finite abelian group, and regular projective. Any direct summand will have the same properties. So we find that some $\IZ/p^k$ (with $k \geq 1$ and $p$ prime) is regular projective. However, the exact sequence in $\TorsAb$
      $$0 \to \IZ/p \to \IZ/p^{k+1} \to \IZ/p^k \to 0$$
      does not split.

special_objects:
  initial object:
    description: trivial group
  terminal object:
    description: trivial group
  coproducts:
    description: direct sums
  products:
    description: torsion subgroup of the direct product

special_morphisms:
  isomorphisms:
    description: bijective group homomorphisms
    reason: This is easy.
  monomorphisms:
    description: injective group homomorphisms
    reason: 'For the non-trivial direction, assume $f : A \to B$ is a monomorphism and $a \in A$ satisfies $f(a)=0$. Choose $n \geq 1$ with $n a = 0$. Then $a$ corresponds to a homomorphism of torsion abelian groups $\tilde{a} : \IZ/n \to A$ satisfying $f \circ \tilde{a} = 0$. Hence, $\tilde{a} = 0$, which means $a = 0$.'
  epimorphisms:
    description: surjective homomorphisms
    reason: Clearly, surjective homomorphisms are epimorphisms. The converse follows since the forgetful functor $\TorsAb \to \Ab$ has a right adjoint, hence preserves epimorphisms.
  regular monomorphisms:
    description: same as monomorphisms
    reason: This is because the category is mono-regular.
  regular epimorphisms:
    description: same as epimorphisms
    reason: This is because the category is epi-regular.
