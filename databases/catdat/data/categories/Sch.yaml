id: Sch
name: category of schemes
notation: $\Sch$
objects: schemes
morphisms: morphisms of locally ringed spaces
nlab_link: https://ncatlab.org/nlab/show/scheme

tags:
  - algebraic geometry

related_categories:
  - LRS
  - Z

comments:
  - Monomorphisms are discussed at <a href="https://mathoverflow.net/questions/56591" target="_blank">MO/56591</a>. At least the case of morphisms of locally finite type is understood.
  - Regular monomorphisms are discussed at <a href="https://mathoverflow.net/questions/66279" target="_blank">MO/66279</a>.
  - Epimorphisms are discussed at <a href="https://mathoverflow.net/questions/56564" target="_blank">MO/56564</a>. Probably they cannot be classified.

satisfied_properties:
  - property_id: locally small
    reason: There is a forgetful functor $\Sch \to \LRS$ and $\LRS$ is locally small.

  - property_id: terminal object
    reason: The scheme $\Spec(\IZ)$ is terminal.

  - property_id: pullbacks
    reason: This is the well-known construction of the fiber product of schemes, see e.g. EGA I, Chap. I, Thm. 3.2.1.

  - property_id: well-powered
    reason: See <a href="https://mathoverflow.net/questions/160681" target="_blank">MO/160681</a>.

  - property_id: infinitary extensive
    reason: One uses the same proof as for locally ringed spaces, using that open subspaces of schemes are also schemes.

unsatisfied_properties:
  - property_id: countable powers
    reason: While all diagrams of affine schemes have a limit in the category of schemes, one can show that an infinite product of quasi-compact non-empty schemes only exists when almost all of them are affine, see <a href="https://mathoverflow.net/questions/65506" target="_blank">MO/65506</a>. Thus, for example the power $(\IP^1)^{\IN}$ does not exist in $\Sch$.

  - property_id: balanced
    reason: The canonical morphism $\Spec(\IZ/2 \times \IZ[1/2]) \longrightarrow \Spec(\IZ)$ is a mono- and an epimorphism, but no isomorphism.

  - property_id: skeletal
    reason: This is trivial.

  - property_id: Malcev
    reason: Consider the subscheme $V(x-y) \cup V(y) \subseteq \IA^2$. It contains the diagonal but it is not symmetric.

  - property_id: semi-strongly connected
    reason: This is because already the full subcategory of affine schemes is not semi-strongly connected, see <a href="/category/CRing">the entry for $\CRing$</a>. Specifically, there is no morphism between $\Spec(\IF_2)$ and $\Spec(\IF_3)$.

  - property_id: generating set
    reason: If $S$ is a generating set of schemes, then the set of affine open subsets of the schemes in $S$ would also be a generating set. This is then also a generating set in the category of affine schemes, corresponding to a cogenerating set in the <a href="/category/CRing">category of commutative rings</a>, which we know does not exist (see there for the proof).

  - property_id: quotients of congruences
    reason: If $\Sch$ had quotients of congruences, then by <a href="/lemma/pushouts-of-monos-via-congruence-quotients">this lemma</a> it would also have pushouts of monomorphisms, contradicting the fact that the span $\IA^1 \leftarrow \Spec(k(t)) \rightarrow \IA^1$ has no pushout - see <a href="https://mathoverflow.net/questions/9961" target="_blank">MO/9961</a>.

special_objects:
  initial object:
    description: empty scheme
  terminal object:
    description: $\Spec(\IZ)$
  coproducts:
    description: disjoint union with the product sheaf
  products:
    description: '[finite case] The idea is to use $\Spec(A) \times \Spec(B) = \Spec(A \otimes B)$ and then to glue affine pieces together. See EGA I, Chap. I, Thm. 3.2.1.'

special_morphisms:
  isomorphisms:
    description: pairs $(f,f^{\sharp})$ consisting of a homeomorphism $f$ and an isomorphism of sheaves $f^{\sharp}$
    reason: This is easy.
