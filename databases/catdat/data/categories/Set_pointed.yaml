id: Set*
name: category of pointed sets
notation: $\Set_*$
objects: pointed sets
morphisms: pointed maps
description: This is the category of sets with a distinguished element, often called the base point. A map is called pointed when it preserves the base point.
nlab_link: https://ncatlab.org/nlab/show/pointed+set

tags:
  - set theory

related_categories:
  - Set
  - Top*

satisfied_properties:
  - property_id: locally small
    reason: There is a forgetful functor $\Set_* \to \Set$ and $\Set$ is locally small.

  - property_id: pointed
    reason: The singleton set is a zero object.
    check_redundancy: false

  - property_id: finitary algebraic
    reason: Take the algebraic theory with just one constant.

  - property_id: subobject classifier
    reason: The pointed set $(\{0,1\},1)$ is a subobject classifier.

  - property_id: cogenerator
    reason: The pointed set $(\{0,1\},1)$ is a cogenerator.

  - property_id: epi-regular
    reason: Every epimorphism is surjective for this category, and in an algebraic category every surjective homomorphism is a regular epimorphism.

  - property_id: coregular
    reason: From the other properties we know that (co-)limits exist and that monomorphisms coincide with injective pointed maps. So it suffices to prove that these maps are stable under pushouts. This follows from the corresponding fact for the <a href="/category/Set">category of sets</a> and the observation that the forgetful functor $\Set_* \to \Set$ preserves pushouts.

  - property_id: co-Malcev
    reason: Malcev categories are closed under slice categories by Prop. 2.2.14 in <a href="https://ncatlab.org/nlab/show/Malcev,+protomodular,+homological+and+semi-abelian+categories" target="_blank">Malcev, protomodular, homological and semi-abelian categories</a>. It follows that co-Malcev categories are closed under coslice categories, and $\Set_*$ is a coslice category of $\Set$, which is co-Malcev since every elementary topos is co-Malcev.

  - property_id: cocartesian cofiltered limits
    reason: |-
      Let $X$ be a pointed set and $(Y_i)$ be a filtered diagram of pointed sets. Base points will be denoted by $0$. The canonical map $X \vee \lim_i Y_i \to \lim_i (X \vee Y_i)$ is injective since the wedge sum naturally embeds into the product and the natural map $X \vee \prod_i Y_i \to \prod_i (X \times Y_i)$ is injective. Now let $z = (z_i) \in \lim_i (X \vee Y_i)$.
      Case 1: There is some index $i$ with $z_i \in X \setminus \{0\}$. We claim $z_j \in X$ for any index $j$ and $z_j = z_i$ in $X$, so that $z$ has a preimage in $X$. To see this, choose an index $k \geq i,j$. Since $X \vee Y_i \to X \vee Y_k$ maps $z_i \mapsto z_k$ and is the identity on $X$, we see that $z_k \in X$ and $z_k = z_i$ in $X$. Since $X \vee Y_j \to X \vee Y_k$ maps $z_j \mapsto z_k$, we see that $z_j \notin Y_j$, since otherwise $z_k \in Y_k \cap X = \{0\}$. Hence, $z_j \in X \setminus \{0\}$, and then $z_j = z_k = z_i$.
      Case 2: We have $z_i \in Y_i$ for all $i$. Then clearly $(z_i) \in \lim_i Y_i$ is a preimage.

  - property_id: CIP
    reason: The coproduct (wedge sum) of a family of pointed sets $(X_i)_{i \in I}$ can be realized as the subset of $\prod_{i \in I} X_i$ consisting of those tuples $x$ such that $x_i = 0$ for all but (at most) one index.

  - property_id: effective cocongruences
    # TODO: rework this when Barr-exact is added
    reason: We have that $\Set_*^{\op}$ is a slice category of $\Set^{\op}$, which in turn is monadic over $\Set$. Therefore, by combining results from <a href="http://www.springer.com/us/book/9781402019616" target="_blank">Borceux and Bourn</a> Appendix A and <a href="https://ncatlab.org/nlab/show/colimits+in+categories+of+algebras#exact" target="_blank">nLab</a>, $\Set_*^{\op}$ is Barr-exact, and in particular it has effective congruences.

unsatisfied_properties:
  - property_id: skeletal
    reason: This is trivial.

  - property_id: unital
    reason: 'The joint image of $X \to X \times Y \leftarrow Y$ is just $\{(x,0) : x \in X\} \cup \{(0,y) : y \in Y\}$ (where $0$ denotes the base point), which is clearly a proper subset of $X \times Y$ when both $X,Y$ are non-trivial.'

  - property_id: CSP
    # TODO: remove duplication with unital proof
    reason: 'The image of $X \vee Y$ in $X \times Y$ is just $\{(x,0) : x \in X\} \cup \{(0,y) : y \in Y\}$ (where $0$ denotes the base point), which is clearly a proper subset when both $X,Y$ are non-trivial.'

  - property_id: conormal
    reason: 'Every cokernel is "injective away from the base point". Formally, if $p : A \to B$ is a cokernel in $\Set_*$, it has the property that $p(x)=p(y) \neq 0$ implies $x=y$ (where $0$ denotes the base point). Clearly this is not satisfied for every surjective pointed map, consider $(\IN,0) \to (\{0,1\},0)$ defined by $0 \mapsto 0$ and $x \mapsto 1$ for $x > 0$.'

  - property_id: cofiltered-limit-stable epimorphisms
    reason: We already know that $\Set$ does not have this property. Now apply the contrapositive of the dual of <a href="/lemma/filtered-monos">this lemma</a> to the functor $\Set \to \Set_*$ that freely adds a base point.

special_objects:
  initial object:
    description: singleton pointed set
  terminal object:
    description: singleton pointed set
  coproducts:
    description: wedge sum, aka one-point union
  products:
    description: direct products with pointwise operations

special_morphisms:
  isomorphisms:
    description: bijective pointed maps
    reason: This characterization holds in every algebraic category.
  monomorphisms:
    description: injective pointed maps
    reason: 'This holds in every finitary algebraic category: the forgetful functor to $\Set$ is faithful, hence reflects monomorphisms, and it is continuous (even representable), hence preserves monomorphisms.'
  epimorphisms:
    description: surjective pointed maps
    reason: 'If $f : X \to Y$ is an epimorphism of pointed sets, then the inclusion $i : f(X) \hookrightarrow Y$ is an epimorphism as well. But it is also a split monomorphism (we may map everything in $Y \setminus f(X)$ to the base point of $f(X)$, and do not touch the rest), hence an isomorphism.'
  regular monomorphisms:
    description: same as monomorphisms
    reason: This is because the category is mono-regular.
  regular epimorphisms:
    description: surjective homomorphisms
    reason: This holds in every finitary algebraic category.
