id: walking_commutative_square
name: walking commutative square
notation: $\Square$
objects: four objects $a,b,c,d$
morphisms: morphisms $a \to b$, $b \to d$, $a \to c$, $c \to d$, identities, and one morphism $a \to d$
description: >-
  This category consists of a commutative square:
  $$\begin{CD} a @>>> b \\ @VVV @VVV \\ c @>>> d \end{CD}$$
  Its name comes from the fact that a functor $\Square \to \C$ is the same as a <a href="https://ncatlab.org/nlab/show/commutative+square" target="_blank">commutative square</a> in $\C$. Notice that the category is isomorphic to the product category $I \times I$ of the <a href="/category/walking_morphism">walking morphism</a> with itself. Hence, most (but not all) properties are inherited from it.
nlab_link: https://ncatlab.org/nlab/show/commutative+square
tags:
  - category theory
  - finite
  - thin

related:
  - walking_fork
  - walking_morphism

satisfied_properties:
  - property: small
    proof: This is trivial.

  - property: finite
    proof: This is trivial.

  - property: skeletal
    proof: The four objects are not isomorphic.

  - property: self-dual
    proof: This is trivial.

  - property: locally cartesian closed
    proof: This is because the <a href="/category/walking_morphism">walking morphism</a> has this property.

  - property: locally strongly finitely presentable
    proof: This is because the <a href="/category/walking_morphism">walking morphism</a> has this property. Alternatively, we may represent this category as the category of algebras for the finitary algebraic theory with two sorts $S_1,S_2$, the equation $x=y$ for $x,y \in S_1$, and the equation $x=y$ for $x,y \in S_2$.

unsatisfied_properties:
  - property: semi-strongly connected
    proof: There is no morphism between $b$ and $c$ (resp., between $(0,1)$ and $(1,0)$).

  - property: finitary algebraic
    proof: This follows from <a href="/content/thin_algebraic_categories">this lemma</a>.

special_objects:
  initial object:
    description: $a$
  terminal object:
    description: $d$
  coproducts:
    description: $b \sqcup c = d$, $a \sqcup x = x$, $d \sqcup x = d$, $x \sqcup x = x$
  products:
    description: $b \times c = a$, $x \times x = x$, $a \times x = a$, $d \times x = x$

special_morphisms:
  isomorphisms:
    description: the four identities
    proof: This is trivial.
  monomorphisms:
    description: every morphism
    proof: It is a thin category.
  epimorphisms:
    description: every morphism
    proof: It is a thin category.
  regular monomorphisms:
    description: same as isomorphisms
    proof: This is because the category is right cancellative.
  regular epimorphisms:
    description: same as isomorphisms
    proof: This is because the category is left cancellative.
