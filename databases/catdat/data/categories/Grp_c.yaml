id: Grp_c
name: category of countable groups
notation: $\Grp_\c$
objects: countable groups
morphisms: group homomorphisms
description: A group is called countable if its underlying set is countable. In particular, every finite group is countable, but also every finitely generated group is countable.
nlab_link: null

tags:
  - algebra

related_categories:
  - Grp
  - FinGrp
  - Set_c

satisfied_properties:
  - property: locally small
    proof: There is an embedding $\Grp_\c \hookrightarrow \Grp$ and $\Grp$ is locally small.

  - property: essentially small
    proof: Every countable group is isomorphic to a group whose underlying set is a subset of $\IN$.

  - property: pointed
    proof: The trivial group is countable and is a zero object.
    check_redundancy: false

  - property: generator
    proof: The countable group $\IZ$ is a generator because it represents the forgetful functor $\Grp_\c \to \Set$.

  - property: finite products
    proof: This is because <a href="/category/Grp">$\Grp$</a> has finite (in fact, all) products, and $\Grp_\c \hookrightarrow \Grp$ is closed under finite products. This is because a finite product of countable sets is again countable.
    check_redundancy: false

  - property: equalizers
    proof: One can use the same construction as in <a href="/category/Grp">$\Grp$</a> since a subgroup of a countable group is again countable.
    check_redundancy: false

  - property: coequalizers
    proof: One can use the same construction as in <a href="/category/Grp">$\Grp$</a> since a quotient of a countable group is again countable.

  - property: countable coproducts
    proof: This is because <a href="/category/Grp">$\Grp$</a> has countable (in fact, all) coproducts, and $\Grp_\c \hookrightarrow \Grp$ is closed under countable coproducts. This is because a countable union of countable sets is again countable.

  - property: mono-regular
    proof: 'This can be deduced from the corresponding property of <a href="/category/Grp">$\Grp$</a> as follows: Let $i : K \hookrightarrow G$ be a monomorphism in $\Grp_\c$, i.e. an injective homomorphism of countable groups. Since $\Grp$ is mono-regular, there is a group $H$ and two homomorphisms $f,g : G \rightrightarrows H$ with $i = \eq(f,g)$. Let $H'' \subseteq H$ be the subgroup generated by $\im(f) \cup \im(g)$. Since $G$ is countable, $H''$ is countable as well, and $f,g$ corestrict to homomorphisms $f'', g'' : G \rightrightarrows H''$. Hence, $i = \eq(f'',g'')$.'

  - property: conormal
    proof: 'If $f : G \to H$ is an epimorphism in $\Grp_\c$, i.e. a surjective homomorphism of countable groups, then $f$ is the cokernel of $K \hookrightarrow G$ in $\Grp$, where $K$ is the kernel of $f$. Since $K$ is countable, it is also the cokernel in $\Grp_\c$.'

  - property: Malcev
    proof: We can use the same proof as for <a href="/category/Grp">$\Grp$</a>.

  - property: regular
    proof: We already know that the category is finitely complete, and that it has all coequalizers. The regular epimorphisms coincide with the surjective group homomorphisms (see below), hence are clearly stable under pullbacks.

  - property: effective congruences
    proof: 'A congruence on a countable group $G$ has the form $\{(g,h) \in G^2 : g^{-1} h \in N \}$ for some normal subgroup $N \subseteq G$. It is the kernel pair of the projection $p : G \twoheadrightarrow G/N$ in $\Grp$, but also in $\Grp_\c$ since $G/N$ is countable.'

  - property: effective cocongruences
    proof: 'Let $G + G \twoheadrightarrow H$ be a cocongruence in $\Grp_\c$. Since $\Grp_\c \hookrightarrow \Grp$ is closed under finite colimits, this is the same as a cocongruence in $\Grp$ where $G,H \in \Grp$ happen to be countable groups. Since we already know that <a href="/category/Grp">$\Grp$</a> has effective cocongruences, the cocongruence is the cokernel pair of some homomorphism of groups $K \to H$. If $K'' \subseteq H$ denotes the image of $K$, it is then also the cokernel pair of the inclusion $K'' \hookrightarrow H$, and $K''$ is countable.'

unsatisfied_properties:
  - property: skeletal
    proof: This is trivial.

  - property: small
    proof: Even the collection of all trivial groups is not a set.

  - property: normal
    proof: Every non-normal subgroup of a countable group (such as $C_2 \hookrightarrow S_3$) provides a counterexample.

  - property: counital
    proof: The canonical morphism $F_2 = \IZ \sqcup \IZ \to \IZ \times \IZ$ is not a monomorphism since $F_2$ is not abelian.

  - property: countable powers
    proof: Since the forgetful functor $\Grp_\c \to \Set$ is representable, it preserves products. Therefore, if the power $\IZ^{\IN}$ exists in $\Grp_\c$, its underlying set must be the ordinary cartesian product, which however is uncountable.

  - property: ℵ₂-small copowers
    proof: 'Assume that the copower $G \coloneqq I \otimes \IZ$ exists in $\Grp_\c$. We will prove that $I$ is countable; in particular, $\aleph_1 \otimes \IZ$ does not exist. The copower is a countable group $G$ with a universal family of elements $(x_i)_{i \in I}$. For every $i \in I$ there is a homomorphism $G \to \IZ$ defined by $x_i \mapsto 1$ and $x_j \mapsto 0$ for $j \neq i$. In particular, $x_i \neq x_j$ whenever $i \neq j$. Thus, $x : I \to G$ is an injective map, which proves that $I$ is countable.'

  - property: regular quotient object classifier
    proof: We can copy the proof from <a href="/category/Grp">$\Grp$</a>.

  - property: coregular
    proof: Pushouts of injective homomorphisms between countable groups do not need to be injective, see <a href="https://math.stackexchange.com/questions/5088032" target="_blank">MSE/5088032</a>.

  - property: cogenerator
    proof: 'Assume that a cogenerator $Q$ exists in $\Grp_\c$. There are only countably many finitely generated subgroups of $Q$. But there are continuum many finitely generated simple groups; this follows from Corollary 1.5 in <a href="https://arxiv.org/abs/1807.06478" target="_blank">Finitely generated infinite simple groups of homeomorphisms of the real line</a> by J. Hyde and Y. Lodha. Hence, there is a finitely generated (and hence countable) simple group $H$ which does not embed into $Q$. Since $H$ is simple, any homomorphism $H \to Q$ must be trivial then. But then $\id_H, 1 : H \rightrightarrows H$ are not separated by a homomorphism $H \to Q$.'

  - property: ℵ₁-cofiltered limits
    proof: >-
      The proof is similar to <a href="/category/Set_c">$\Set_\c$</a>. Since the forgetful functor $\Grp_\c \to \Set$ is representable, it preserves limits. Moreover, $\Grp \to \Set$ preserves limits. Therefore, it suffices to construct an $\aleph_1$-cofiltered diagram of countable groups whose $\Grp$-limit is not countable.
      Let $R$ be an uncountable set (such as $\IR$) and consider the poset $P_{<\aleph_1}(R)$ of countable subsets of $R$. It is $\aleph_1$-filtered, so its opposite is $\aleph_1$-cofiltered.
      Define a diagram $X : P_{<\aleph_1}(R)^{\op} \to \Grp_\c$ by mapping a countable subset $C \subseteq R$ to the free abelian group $F(C)$ on $C$ and an inclusion $C \subseteq D$ to the canonical epimorphism $F(D) \to F(C)$ which sends each element of $C$ to itself and sends all elements of $D \setminus C$ to $0$.
      For $r \in R$ we define $\varepsilon(r) \in \lim(X)$ by
      $$\varepsilon(r)_C = \begin{cases} r & r \in C \\ 0 & r \notin C \end{cases}$$
      It is easily checked that this indeed lies in the limit. Moreover, $\varepsilon(r) = \varepsilon(r')$ implies $r=r'$, since evaluating at $C \coloneqq \{r\}$ yields $r = r'$. Hence, $\lim(X)$ is uncountable.

special_objects:
  initial object:
    description: trivial group
  terminal object:
    description: trivial group
  coproducts:
    description: '[countable case] free products'
  products:
    description: '[finite case] direct products with pointwise operations'

special_morphisms:
  isomorphisms:
    description: bijective homomorphisms
    proof: This is easy.
  monomorphisms:
    description: injective homomorphisms
    proof: For the non-trivial direction, the forgetful functor to $\Set$ is representable (by the countable group $\IZ$), hence preserves monomorphisms.
  epimorphisms:
    description: surjective homomorphisms
    proof: 'For the non-trivial direction, if $f : G \to H$ is an epimorphism, we may factor it as $G \to f(G) \to H$, and $f(G) \to H$ is still an epimorphism, but also an inclusion and hence a monomorphism. Since we already know that the category is mono-regular, $f(G) \to H$ must be an isomorphism.'
  regular monomorphisms:
    description: same as monomorphisms
    proof: This is because the category is mono-regular.
  regular epimorphisms:
    description: same as epimorphisms
    proof: This is because the category is epi-regular.
