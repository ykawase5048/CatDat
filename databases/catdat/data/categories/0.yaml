id: '0'
name: empty category
notation: $\0$
objects: no objects
morphisms: no morphisms
description: This is the category with no objects and no morphisms. It is the initial object in the category of small categories.
nlab_link: https://ncatlab.org/nlab/show/empty+category

tags:
  - finite
  - thin

related_categories:
  - '1'

satisfied_properties:
  - property: discrete
    proof: This is trivial.

  - property: binary products
    proof: This is vacuously true.

  - property: finite
    proof: This is trivial.

  - property: small
    proof: This is trivial.

  - property: preadditive
    proof: This is vacuously true.

unsatisfied_properties:
  - property: inhabited
    proof: This is trivial.

special_objects: {}

special_morphisms:
  isomorphisms:
    description: none
    proof: This is trivial.
  monomorphisms:
    description: none
    proof: This is trivial.
  epimorphisms:
    description: none
    proof: This is trivial.
  regular monomorphisms:
    description: none
    proof: This is trivial.
  regular epimorphisms:
    description: none
    proof: This is trivial.
