id: LRS_R
name: category of locally ringed spaces
notation: $\LRS_R$
objects: locally ringed spaces over $R \neq 0$, i.e. pairs $(X,\O_X)$ consisting of a topological space and a sheaf of commutative $R$-algebras on it whose stalks are local rings
morphisms: 'A morphism $(f,f^\#) : (X,\O_X) \to (Y,\O_Y)$ consists of a continuous map $f : X \to Y$ and a homomorphism $f^\# : \O_Y \to f_* \O_X$ of sheaves of $R$-algebras such that for every $x \in X$ the induced map on stalks $f_x : \O_{Y,f(x)} \to \O_{X,x}$ is local.'
description: Here, $R$ is a fixed non-trivial commutative ring. The general properties of this category will not depend on the choice of $R$. For $R = \IZ$ we obtain the category $\LRS$ of locally ringed spaces.
nlab_link: https://ncatlab.org/nlab/show/locally+ringed+topological+space

tags:
  - algebraic geometry

related_categories:
  - Sch_R

satisfied_properties:
  - property: locally small
    proof: For two ringed spaces $(X,\O_X), (Y,\O_Y)$, the collection of morphisms $X \to Y$ of ringed spaces is the collection $\prod_{f \in \Hom(X,Y)} \Hom(\O_Y,f_* \O_X)$, which is a set since $\Hom(X,Y)$ is a set and each $\Hom(\O_Y,f_* \O_X)$ is a set.

  - property: complete
    proof: See <a href="https://arxiv.org/abs/1103.2139" target="_blank">Localization of ringed spaces</a> by W. Gillam. See also <a href="https://math.stackexchange.com/questions/1033675" target="_blank">MSE/1033675</a>.

  - property: cocomplete
    proof: See Demazure-Gabriel's "Groupes algébriques", I. §1. 1.6. Specifically, the forgetful functor from locally ringed spaces to ringed spaces preserves colimits, and colimits of ringed spaces are built from colimits of topological spaces and limits of commutative rings, see <a href="https://math.stackexchange.com/questions/1646202" target="_blank">MSE/1646202</a>.

  - property: well-powered
    proof: 'Let $f : X \to Y$ be a monomorphism of locally ringed spaces. I claim that $f$ is injective, from which the claim will follow. The diagonal $\Delta : X \to X \times_Y X$ is an isomorphism. By the explicit construction of fiber products, $X \times_Y X$ consists of triples $(x_1,x_2,\p)$ where $x_1,x_2 \in X$, $y \coloneqq f(x_1) = f(x_2)$ and $\p$ is a prime ideal in $k(x_1) \otimes_{k(y)} k(x_2)$. The map $\Delta$ is given by $\Delta(x) = \bigl(x,x,\ker(k(x) \otimes_{k(f(x))} k(x) \to k(x)\bigr)$, and it is bijective. This clearly implies that $f$ is injective (and that each tensor product $k(x) \otimes_{k(f(x))} k(x)$ has a unique prime ideal, namely the kernel mentioned).'

  - property: well-copowered
    proof: It is enough to prove that every epimorphism of locally ringed spaces is surjective. The forgetful functor $\LRS_R \to \RS_R$ has a right adjoint (see <a href="https://arxiv.org/abs/1103.2139" target="_blank">Localization of ringed spaces</a> by W. Gillam), so it preserves epimorphisms. The forgetful functor $\RS_R \to \Top$ also has a right adjoint, namely $X \mapsto (X,\underline{R})$, so it also preserves epimorphisms.

  - property: infinitary extensive
    proof: '[Sketch] Since <a href="/category/Top">$\Top$</a> is infinitary extensive, a morphism $f : Y \to \coprod_i X_i \eqqcolon X$ yields a decomposition $Y = \coprod_i Y_i$ (as topological spaces) with continuous maps $f_i : Y_i \to X_i$. Endow the open subset $Y_i \subseteq Y$ with the restricted sheaf. Then each $f_i$ becomes a morphism of locally ringed spaces, and $Y = \coprod_i Y_i$ holds as locally ringed spaces.'

unsatisfied_properties:
  - property: skeletal
    proof: This is trivial.

  - property: balanced
    proof: Choose a residue field $K$ of $R$. The canonical morphism $$\Spec(K[X]/X \times K[X,X^{-1}]) \longrightarrow \Spec(K[X])$$ is a mono- and an epimorphism, but no isomorphism.

  - property: semi-strongly connected
    proof: This is because already the full subcategory <a href="/category/Sch_R">$\Sch_R$</a> of $R$-schemes is not semi-strongly connected.

  - property: Malcev
    proof: This is because already the full subcategory <a href="/category/Sch_R">$\Sch_R$</a> of $R$-schemes is not Malcev.

  - property: co-Malcev
    proof: 'We can adjust the proof for <a href="/category/Top">$\Top$</a> (see <a href="https://mathoverflow.net/questions/509548" target="_blank">MO/509548</a>) as follows: Let $K$ be a residue field of $R$, let $X$ be a singleton and $Y = \{u,v\}$ be the Sierpinski space where $\{u\}$ is open, but $\{v\}$ is not. Endow both with the sheaf of locally constant functions to $K$. Thus, $\O_X(X) = K$, $\O_Y(Y) = \O_Y(\{u\}) = K$. There is a canonical morphism $p : X + X \to Y$. It is a coreflexive corelation that is not cosymmetric.'

  - property: generating set
    proof: >-
      Out of any small set $S$ of locally ringed spaces, there is only a small set of residue fields at their points. Therefore, if $K$ is a field over $R$ with a strictly larger cardinality than any of these residue fields, then the only possible morphism from an element of $S$ to $\Spec K(X,Y)$ is one with an empty domain. However, that makes it impossible for $S$ to distinguish the two canonical automorphisms of $\Spec K(X,Y)$.

      Alternatively, using the usual adjunction between affine schemes and locally ringed spaces (<a href="https://en.wikipedia.org/wiki/%C3%89l%C3%A9ments_de_g%C3%A9om%C3%A9trie_alg%C3%A9brique" target="_blank">EGA I</a> (1971), Ch. 1, Prop. 1.6.3), a generating set in $\LRS_R$ would induce a generating set in the category of affine $R$-schemes, which contradicts the fact that <a href="/category/CAlg(R)">$\CAlg(R)$</a> does not have a cogenerating set.

  - property: cartesian closed
    proof: This is Corollary 4(a) <a href="/content/Top-embeds-in-LRS">here</a>.
    check_redundancy: false

  - property: cartesian filtered colimits
    proof: This is Corollary 4(b) <a href="/content/Top-embeds-in-LRS">here</a>.

  - property: regular
    proof: This is Corollary 4(c) <a href="/content/Top-embeds-in-LRS">here</a>.

  - property: cofiltered-limit-stable epimorphisms
    proof: This is Corollary 4(d) <a href="/content/Top-embeds-in-LRS">here</a>.

  - property: effective cocongruences
    proof: This is Corollary 4(e) <a href="/content/Top-embeds-in-LRS">here</a>.

special_objects:
  initial object:
    description: empty space
  terminal object:
    description: $\Spec(R)$
  coproducts:
    description: disjoint union with the product sheaf
  products:
    description: See <a href="https://arxiv.org/abs/1103.2139" target="_blank">Localization of ringed spaces</a> by W. Gillam. See also <a href="https://math.stackexchange.com/questions/1033675" target="_blank">MSE/1033675</a>.

special_morphisms:
  isomorphisms:
    description: pairs $(f,f^{\sharp})$ consisting of a homeomorphism $f$ and an isomorphism of sheaves $f^{\sharp}$ of $R$-algebras
    proof: This is easy.
