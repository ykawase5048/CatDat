id: walking_span
name: walking span
notation: $\{1 \leftarrow 0 \rightarrow 2\}$
objects: $0,1,2$
morphisms: $0 \to 1$, $0 \to 2$, and the identities
description: The name of this category comes from the fact that a functor out of it is the same as a <a href="https://ncatlab.org/nlab/show/span" target="_blank">span</a> in the target category. It is isomorphic to the partial order of proper positive divisors of $6$.
nlab_link: https://ncatlab.org/nlab/show/span#the_walking_span

tags:
  - category theory
  - finite
  - thin

related_categories:
  - walking_morphism
  - walking_pair

satisfied_properties:
  - property: small
    reason: This is trivial.

  - property: finite
    reason: This is trivial.

  - property: thin
    reason: This is trivial.

  - property: skeletal
    reason: The three objects are not isomorphic.

  - property: initial object
    reason: $0$ is an initial object.

  - property: binary products
    reason: We have $0 \times x = 0$ for all $x$, $x \times x = x$, and $1 \times 2 = 0$.

  - property: locally cartesian closed
    reason: The slice category over $0$ is the <a href="/category/1">trivial category</a>, and the slice category over $1$ is the <a href="/category/walking_morphism">walking morphism</a>, which is cartesian closed. The same holds for $2$ by symmetry.

unsatisfied_properties:
  - property: sifted
    reason: There is no cospan between $1$ and $2$.

special_objects:
  initial object:
    description: $0$
  products:
    description: '[binary case] $1 \times 2 = 0$, $x \times x = x$, $0 \times x = 0$'

special_morphisms:
  isomorphisms:
    description: the three identities
    reason: This is trivial.
  monomorphisms:
    description: every morphism
    reason: It is a thin category.
  epimorphisms:
    description: every morphism
    reason: It is a thin category.
  regular monomorphisms:
    description: same as isomorphisms
    reason: This is because the category is right cancellative.
  regular epimorphisms:
    description: same as isomorphisms
    reason: This is because the category is right cancellative.
