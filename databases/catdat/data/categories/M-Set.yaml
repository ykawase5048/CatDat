id: M-Set
name: category of M-sets
notation: $M{-}\Set$
objects: sets with a left action of a monoid $M$
morphisms: maps that are compatible with the $M$-action, meaning $f(m \cdot x)=m \cdot f(x)$, also called $M$-maps
description: Here, $M$ can be any monoid. But the most important special case is that of a group. To settle (future) non-properties, we assume that $M$ is non-trivial, since otherwise we just get the <a href="/category/Set">category of sets</a>.
nlab_link: https://ncatlab.org/nlab/show/MSet

tags:
  - algebra

related_categories:
  - J2
  - R-Mod
  - Set

satisfied_properties:
  - property_id: locally small
    reason: There is a forgetful functor $M{-}\Set \to \Set$ and $\Set$ is locally small.

  - property_id: Grothendieck topos
    reason: It is the category of sheaves on the opposite of the one-object category associated to $M$.

  - property_id: finitary algebraic
    reason: Take the algebraic theory of an $M$-sets (having a unary operation for each $m \in M$).

unsatisfied_properties:
  - property_id: skeletal
    reason: This is trivial.

  - property_id: trivial
    reason: This is trivial.

category_property_comments:
  - property_id: semi-strongly connected
    comment: If this category is semi-strongly connected depends on the choice of $M$. For $M = 1$ it is, for $M = \IZ$ it is not. In general, if $G$ is a group, then $G{-}\Set$ is semi-strongly connected if and only if for all subgroups $H,K \subseteq G$, $H$ is subconjugated to $K$ or $K$ is subconjugated to $H$. If $G$ is abelian, this means that the poset of subgroups is linear, in which case $G$ is either isomorphic to $\IZ/p^n$ or to $\IZ/p^{\infty}$ for a prime $p$. See also <a href="https://math.stackexchange.com/questions/5129804" target="_blank">MSE/5129804</a>.

special_objects:
  initial object:
    description: empty set with the unique action
  terminal object:
    description: singleton set with the unique action
  coproducts:
    description: disjoint union with obvious $M$-action
  products:
    description: direct products with the evident $M$-action

special_morphisms:
  isomorphisms:
    description: bijective $M$-maps
    reason: This characterization holds in every algebraic category.
  monomorphisms:
    description: injective $M$-maps
    reason: "This holds in every finitary algebraic category: the forgetful functor to $\\Set$ is faithful, hence reflects monomorphisms, and it is continuous (even representable), hence preserves monomorphisms."
  epimorphisms:
    description: surjective $M$-maps
    reason: This holds in every functor category $[\C,\Set]$, here applied to the case that $\C$ has just one object.
  regular monomorphisms:
    description: same as monomorphisms
    reason: This is because the category is mono-regular.
  regular epimorphisms:
    description: surjective homomorphisms
    reason: This holds in every finitary algebraic category.
