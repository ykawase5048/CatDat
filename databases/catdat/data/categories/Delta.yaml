id: Delta
name: simplex category
notation: $\Delta$
objects: the non-empty ordered sets $[n] := \{0 < \cdots < n\}$ for $n \in \IN$
morphisms: order-preserving maps
description: The simplex category is a skeleton of $\FinOrd \setminus \{\varnothing\}$. It plays an important role in topology and is used to define the <a href="/category/sSet">category of simplicial sets</a>.
nlab_link: https://ncatlab.org/nlab/show/simplex+category

tags:
  - combinatorics
  - order theory
  - topology

related_categories:
  - FinOrd
  - Setne
  - sSet
  - walking_coreflexive_pair

satisfied_properties:
  - property_id: countable
    reason: This is obvious.

  - property_id: small
    reason: This is trivial.

  - property_id: terminal object
    reason: The ordered set $[0] = \{0\}$ is terminal.

  - property_id: strongly connected
    reason: For all $n,m$ there are morphisms $[n] \to [0] \to [m]$.

  - property_id: cogenerator
    reason: The ordered set $[1] = \{0 < 1\}$ is a cogenerator, even for <a href="/category/Pos">the category of posets</a>, see there for a proof.

  - property_id: coequalizers
    reason: Assume that $X \rightrightarrows Y$ are morphisms in $\FinOrd \setminus \{\varnothing\}$. Since <a href="/category/FinOrd">$\FinOrd$ has coequalizers</a>, we have a coequalizer $Y \to Q$. Since $Y$ is non-empty, $Q$ is non-empty as well, and clearly $Y \to Q$ is then also the coequalizer in $\FinOrd \setminus \{\varnothing\}$.

  - property_id: generator
    reason: The ordered set $[0] = \{0\}$ is a generator.

  - property_id: skeletal
    reason: 'If $f : [n] \to [m]$ is an isomorphism, then $n + 1 = m + 1$ by comparing the cardinalities, hence $n = m$.'

  - property_id: core-thin
    reason: The category $\FinOrd \setminus \{\varnothing\}$ is core-thin because already $\FinOrd$ is core-thin (see its <a href="/category/FinOrd">category page</a>).

  - property_id: mono-regular
    reason: The <a href="/category/FinOrd">proof for $\FinOrd$</a> also works for $\FinSet \setminus \{\varnothing\}$.

  - property_id: epi-regular
    reason: The <a href="/category/FinOrd">proof for $\FinOrd$</a> also works for $\FinSet \setminus \{\varnothing\}$.

  - property_id: cosifted
    reason: |-
      Let $X,Y \in \Delta$. We may pick $x \in X$, $y \in Y$. Then there is a "point span" $X \xleftarrow{x} [0] \xrightarrow{y} Y$. Every span $X \xleftarrow{f} Z \xrightarrow{g} Y$ is connected to such a point span: Pick $z \in Z$. This defines a morphism of spans:
          $$\begin{CD} X @<{f(z)}<< [0] @>{g(z)}>> Y \\ @| @VV{z}V @| \\ X @<<{f}< Z @>>{g}> Y \end{CD}$$
          It remains to show that all point spans are connected to each other. Assume $x_0,x_1 \in X$ and $y \in Y$, w.l.o.g. $x_0 \leq x_1$. Define the map $f : [1] \to X$ by $f(0) = x_0$, $f(1) = x_1$, and the map $g : [1] \to Y$ by $g(0)=g(1)=y$. They are order-preserving and fit into a zig-zag of spans:
          $$\begin{CD} X @<{x_0}<< [0] @>{y}>> Y \\ @| @V{0}VV @| \\ X @<{f}<< [1] @>{g}>> Y \\ @| @A{1}AA @| \\ X @<{x_1}<< [0] @>{y}>> Y \end{CD}$$
          This shows that the choice of $x \in X$ does not matter, and for $y \in Y$ the proof is the same.

unsatisfied_properties:
  - property_id: strict terminal object
    reason: This is trivial.

  - property_id: cofiltered
    reason: 'The two maps $d^0,d^1 : [0] \rightrightarrows [1]$ are not equalized by any morphism.'

  - property_id: coreflexive equalizers
    reason: 'The two maps $d^0,d^1 : [0] \rightrightarrows [1]$ have a common left inverse, the unique map $s^0 : [1] \to [0]$, but are not equalized by any morphism.'

  - property_id: sequential colimits
    reason: We can just copy the <a href="/category/FinOrd">proof for $\FinOrd$</a> to show that the sequence of inclusions $[0] \hookrightarrow [1] \hookrightarrow [2] \hookrightarrow \cdots$ has no colimit.

  - property_id: sequential limits
    reason: We can just copy the <a href="/category/FinOrd">proof for $\FinOrd$</a> to show that the sequence of truncations $\cdots \twoheadrightarrow [2] \twoheadrightarrow [1] \twoheadrightarrow [0]$ has no limit.

  - property_id: pushouts
    reason: Assume that the two inclusions $\{0 < 1\} \leftarrow \{0\} \rightarrow \{0 < 2\}$ have a pushout in $\FinOrd \setminus \{\varnothing\}$. This would be a universal non-empty finite ordered set $X$ with three elements $0,1,2$ satisfying $0 \leq 1$ and $0 \leq 2$. Assume w.l.o.g. $1 \leq 2$ (the case $2 \leq 1$ is similar). The universal property yields an order-preserving map $X \to \{a < b < c\}$ with $0 \mapsto a$, $1 \mapsto c$, $2 \mapsto b$. But then $c \leq b$, which is a contradiction.

special_objects: {}

special_morphisms:
  isomorphisms:
    description: bijective order-preserving maps
    reason: This is easy. Notice that bijective order-preserving maps automatically also reflect the order (because we work with totally ordered sets).
  monomorphisms:
    description: injective order-preserving maps
    reason: For the non-trivial direction, the forgetful functor to $\Set$ is representable (by the terminal object), hence preserves monomorphisms.
  epimorphisms:
    description: surjective order-preserving maps
    reason: We can use the same <a href="/category/FinOrd">proof as for $\FinOrd$</a> since this has merely used the non-empty ordered set $\{0 < 1\}$.
  regular monomorphisms:
    description: same as monomorphisms
    reason: This is because the category is mono-regular.
  regular epimorphisms:
    description: same as epimorphisms
    reason: This is because the category is epi-regular.
