id: real_interval
name: poset [0,1]
notation: $([0,1],\leq)$
objects: real numbers between $0$ and $1$
morphisms: 'a unique morphism $(s,t) : s \to t$ when $s \leq t$'
description: Every poset can be regarded as a small thin category. This is a specific example. This category is locally $\aleph_1$-presentable (in fact, <i>every</i> object is $\aleph_1$-presentable), but not locally finitely presentable (in fact, only $0$ is finitely presentable).
nlab_link: https://ncatlab.org/nlab/show/interval

tags:
  - analysis
  - thin

related_categories:
  - N_oo

satisfied_properties:
  - property: small
    proof: This is trivial.

  - property: self-dual
    proof: Take $t \mapsto 1-t$.

  - property: skeletal
    proof: The relation $\leq$ is antisymmetric.

  - property: semi-strongly connected
    proof: This is trivial.

  - property: locally ℵ₁-presentable
    proof: See <a href="https://math.stackexchange.com/questions/4481902/locally-presentable-vs-compactly-presentable-categories#comment9399784_4482185" target="_blank">MSE/4481902</a>.

unsatisfied_properties:
  - property: essentially countable
    proof: This is trivial.

  - property: direct
    proof: Consider the strictly decreasing sequence $1/2^n$ for $n \geq 0$.

  - property: inverse
    proof: Consider the strictly increasing sequence $1 - 1/2^n$ for $n \geq 0$.

  - property: locally finitely presentable
    proof: It suffices to prove that $0$ (the initial object) is the only finitely presentable object. If $s > 0$, then $s = \sup_{n \in \IN, \, s \geq 1/n } (s - 1/n)$, but there is no $n$ with $s \leq s - 1/n$.

special_objects:
  initial object:
    description: $0$
  terminal object:
    description: $1$
  coproducts:
    description: supremum
  products:
    description: infimum

special_morphisms:
  isomorphisms:
    description: only the identity morphisms
    proof: This is true for every poset (regarded as a category).
  monomorphisms:
    description: every morphism
    proof: It is a thin category.
  epimorphisms:
    description: every morphism
    proof: It is a thin category.
  regular monomorphisms:
    description: same as isomorphisms
    proof: This is because the category is right cancellative.
  regular epimorphisms:
    description: same as isomorphisms
    proof: This is because the category is left cancellative.
