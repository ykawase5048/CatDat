id: Met
name: category of metric spaces with non-expansive maps
notation: $\Met$
objects: metric spaces
morphisms: non-expansive maps $f$, meaning $d(f(x),f(y)) \leq d(x,y)$ for all $x,y$
description: In contrast to continuous maps, which only refer to the induced topology, non-expansive maps are closer related to the metrics themselves. This category is badly-behaved, though, especially when compared with $\Met_{\infty}$.
nlab_link: https://ncatlab.org/nlab/show/Met

tags:
  - analysis

related_categories:
  - Ban
  - Met_c
  - Met_oo
  - PMet

satisfied_properties:
  - property_id: locally small
    reason: There is a forgetful functor $\Met \to \Set$ and $\Set$ is locally small.

  - property_id: strict initial object
    reason: The empty metric space is initial and clearly strict.

  - property_id: generator
    reason: The one-point metric space is a generator since it represents the forgetful functor $\Met \to \Set$.

  - property_id: cogenerator
    reason: 'We claim that $\IR$ with the usual metric is a cogenerator. Let $a,b \in X$ be two points of a metric space such that $f(a)=f(b)$ for all non-expansive maps $f : X \to \IR$. This applies in particular to $f(x) := d(a,x)$ and shows that $0=d(a,a)=d(a,b)$, so that $a=b$.'

  - property_id: semi-strongly connected
    reason: Every non-empty metric space is weakly terminal (by using constant maps).

  - property_id: equalizers
    reason: Just restrict the metric to the equalizer built from the sets.

  - property_id: binary products
    reason: The product of two metric spaces $(X,d)$, $(Y,d)$ is $(X \times Y,d)$ with $d((x_1,y_1),(x_2,x_2)) := \sup(d(x_1,x_2),d(y_1,y_2))$.
    check_redundancy: false

  - property_id: terminal object
    reason: The one-point metric space is terminal.
    check_redundancy: false

  - property_id: coequalizers
    reason: This is because the category of pseudo-metric spaces <a href="/category/PMet">$\PMet$</a> has coequalizers and $\Met \hookrightarrow \PMet$ has a left adjoint, mapping a pseudo-metric space $X$ to $X /{\sim}$ where $x \sim y \iff d(x,y)=0$. Concretely, we take the coequalizer in the category of pseudo-metric spaces and then identify points with distance zero.

  - property_id: filtered colimits
    reason: This is because the category of pseudo-metric spaces <a href="/category/PMet">$\PMet$</a> has filtered colimits and $\Met \hookrightarrow \PMet$ has a left adjoint, mapping a pseudo-metric space $X$ to $X /{\sim}$ where $x \sim y \iff d(x,y)=0$. Concretely, we take the filtered colimit in the category of pseudo-metric spaces and then identify points with distance zero.
    check_redundancy: false

  - property_id: cartesian filtered colimits
    reason: >-
      We already saw that filtered colimits and finite products exist. The canonical map $\colim_i (X \times Y_i) \to X \times \colim_i Y_i$ is an isomorphism for filtered diagrams $(Y_i)$: It is surjective by the concrete description of filtered colimits. It is isometric because of the elementary observation
      $$\textstyle\inf_i \max(r, s_i) = \max(r, \inf_i s_i)$$
      for $r, s_i \in \IR$, where $i \leq j \implies s_i \geq s_j$.

  - property_id: well-powered
    reason: This follows since monomorphisms are injective.

  - property_id: well-copowered
    reason: 'If $f : X \to Y$ is an epimorphism, then $f(X)$ is dense in $Y$ (see below). Hence, there is an injective map $Y \to X^{\IN}$, which bounds the size of $Y$.'

unsatisfied_properties:
  - property_id: skeletal
    reason: This is trivial.

  - property_id: essentially small
    reason: This is trivial.

  - property_id: locally finite
    reason: This is obvious.

  - property_id: strict terminal object
    reason: This is trivial.

  - property_id: balanced
    reason: The inclusion $\IQ \hookrightarrow \IR$ is a counterexample; it is an epimorphism since $\IQ$ is dense in $\IR$. Alternatively, consider the identity map $(X,2d) \to (X,d)$ for any non-trivial metric space $(X,d)$.

  - property_id: Malcev
    reason: 'Consider the metric subspace $\{(a,b) \in \IR^2 : a \leq b\}$ of $\IR^2$.'

  - property_id: countable powers
    reason: 'Assume that the power $P = \IR^{\IN}$ exists, where $\IR$ has the usual metric. Since the forgetful functor $\Met \to \Set$ is representable, it preserves limits, powers in particular. Thus, we may assume that $P$ is the set of sequences of numbers and that the projections $p_n : P \to \IR$ are given by $p_n(x) = x_n$. Now consider the sequences $x = (n)_n$ and $y = (0)_n$. Since each $p_n$ is non-expansive, we get $d(x,y) \geq d(p_n(x),p_n(y)) = d(n,0) = n$. But then $d(x,y) = \infty$, a contradiction.'

  - property_id: binary copowers
    reason: The coproduct of two non-empty metric spaces does not exist, see <a href="https://math.stackexchange.com/questions/1778408" target="_blank">MSE/1778408</a>. For example, the copower $\IR \sqcup \IR$ does not exist. We only get coproducts when allowing $\infty$ as a distance, as in <a href="/category/Met_oo">$\Met_{\infty}$</a>.

  - property_id: cartesian closed
    reason: This is proven in <a href="https://math.stackexchange.com/questions/5131457" target="_blank">MSE/5131457</a>.

  - property_id: filtered-colimit-stable monomorphisms
    reason: 'The following example is taken from Remark 2.7 in <a href="https://arxiv.org/abs/2006.01399" target="_blank">Approximate injectivity and smallness in metric-enriched categories</a> by Adamek-Rosicky: For $n \geq 1$ let $X_n$ denote the metric space with underlying set $\{0,1\}$ in which $0,1$ have distance $1/n$. We have bijective non-expansive maps $X_n \to X_{n+1}$, $x \mapsto x$. The colimit of this sequence in <a href="/category/PMet">$\PMet$</a> is $\{0,1\}$ where $0,1$ have distance $0$, so the colimit in $\Met$ collapses to $\{0\}$. Therefore, the colimit of the monomorphisms $X_0 \to X_n$, $x \mapsto x$ is the non-injective map $X_0 \to \{0\}$.'

  - property_id: natural numbers object
    reason: >-
      If $(N,z,s)$ is a natural numbers object in $\Met$, then
      $$1 \xrightarrow{z} N \xleftarrow{s} N$$
      is a coproduct cocone by <a href="https://ncatlab.org/nlab/show/Sketches+of+an+Elephant" target="_blank">Johnstone</a>, Part A, Lemma 2.5.5. Since there is a map $1 \to N$, we have $N \neq \varnothing$. However, the coproduct of two non-empty metric spaces does not exist, see <a href="https://math.stackexchange.com/questions/1778408" target="_blank">MSE/1778408</a>.

  - property_id: effective congruences
    reason: 'Any kernel pair of $h : X \to Z$ in $\Met$ corresponds to a closed subset of $X\times X$. However, there are plenty of non-closed congruences, such as $\Delta \cup (\IQ \times \IQ) \subseteq \IR \times \IR$ with the subspace metric.'

  - property_id: effective cocongruences
    reason: >-
      We will define a cocongruence on the interval $(0,1) \subseteq \IR$ where $E := (-1, 0) \cup (0, 1) \subseteq \IR$, and the two maps $(0, 1) \rightrightarrows E$ are the inclusion map and $x \mapsto -x$. Then for any metric space $X$, the induced relation on non-expansive maps $(0, 1) \to X$ is that $f \sim g$ if and only if
      $$d(f(x), g(y)) \le x+y$$
      for each $x, y \in (0, 1)$. This is reflexive since $d(f(x), f(y)) \le |x-y| < x+y$, and it is clearly symmetric. For transitivity, suppose $f\sim g$ and $g\sim h$. Then for any $\varepsilon > 0$, we have
      $$d(f(x), h(y)) \le d(f(x), g(\varepsilon)) + d(g(\varepsilon), h(y)) \le (x + \varepsilon) + (y + \varepsilon).$$
      Since this holds for every $\varepsilon > 0$, we conclude $d(f(x), h(y)) \le x+y$.
      On the other hand, if this cocongruence were effective, then by the dual of <a href="/lemma/effective-congruence-quotients">this result</a>, it would be the cokernel pair of the equalizer of the two inclusion maps. However, that equalizer is empty, so $E$ would have to be a binary copower of $(0,1)$, which does not exist in $\Met$.

special_objects:
  initial object:
    description: empty metric space
  terminal object:
    description: singleton space
  products:
    description: '[finite case] direct products with the metric $d(x,y) = \sup_i d_i(x_i,y_i)$'

special_morphisms:
  isomorphisms:
    description: bijective isometries
    reason: This is easy.
  monomorphisms:
    description: injective non-expansive maps
    reason: For the non-trivial direction, the forgetful functor to $\Set$ is representable (by the terminal object), hence preserves monomorphisms.
  epimorphisms:
    description: non-expansive maps with dense image
    reason: See <a href="https://math.stackexchange.com/questions/937387" target="_blank">MSE/937387</a>.
