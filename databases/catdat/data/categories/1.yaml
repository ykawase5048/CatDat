id: '1'
name: trivial category
notation: $\1$
objects: a single object $0$
morphisms: only the identity morphism
description: 'This is the simplest category, consisting of a single object $0$ and its identity morphism $\id_0 : 0 \to 0$. A concrete representation is the full subcategory of $\Set$ consisting of the empty set. It is the terminal object in the category of small categories.'
nlab_link: https://ncatlab.org/nlab/show/terminal+category

