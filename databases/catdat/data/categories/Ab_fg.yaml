id: Ab_fg
name: category of finitely generated abelian groups
notation: $\Ab_{\fg}$
objects: finitely generated abelian groups
morphisms: group homomorphisms
description: null
nlab_link: https://ncatlab.org/nlab/show/finitely+generated+module

tags:
  - algebra

related_categories:
  - Ab
  - FinAb
  - FinVect

satisfied_properties:
  - property: locally small
    proof: There is a forgetful functor $\FinAb \to \Set$ and $\Set$ is locally small.

  - property: abelian
    proof: This follows from the fact for abelian groups and the fact that subgroups of finitely generated abelian groups are also finitely generated.

  - property: generator
    proof: The group $\IZ$ is a generator since it represents the forgetful functor to $\Set$.

  - property: essentially countable
    proof: Every finitely generated abelian group is isomorphic to a group of the form $\IZ^n / U$, where $n \in \IN$ and $U$ is a subgroup of $\IZ^n$. Since $\IZ^n$ is Noetherian as a $\IZ$-module, $U$ is finitely generated, hence the category $\Ab_\fg$ has only countably many objects up to isomorphism. Furthermore, for any objects $A \cong \IZ^n / U$ and $B \cong \IZ^m / T$, the hom-set $\Hom(A,B)$ is countable. Indeed, precomposition with the quotient map yields an injection $\Hom(A,B) \hookrightarrow \Hom(\IZ^n, B) \cong B^n$, and $B^n$ is countable.

  - property: ℵ₁-accessible
    proof: The inclusion $\Ab_{\fg} \hookrightarrow \Ab$ is closed under $\aleph_1$-filtered colimits by <a href="https://mathoverflow.net/questions/400763/" target="_blank">MO/400763</a>. In particular, $\Ab_{\fg}$ has $\aleph_1$-filtered colimits. Since $\Ab_{\fg}$ is essentially small, there is a set $G$ such that every f.g. abelian group is isomorphic to one in $G$. So trivially it is also a $\aleph_1$-filtered colimit of such objects (take the constant diagram). Finally, every object is $\Ab_{\fg} = \Ab_{\fp}$ is finitely presentable in $\Ab$ and hence also in $\Ab_{\fg}$, a fortiori $\aleph_1$-presentable.

  - property: ℵ₁-cofiltered limits
    proof: A proof can be found <a href="/content/aleph1-cofiltered-limits-fg-groups">here</a>.

unsatisfied_properties:
  - property: small
    proof: Even the collection of trivial groups is not small.

  - property: locally finite
    proof: The group $\Hom(\IZ,\IZ) \cong \IZ$ is not finite.

  - property: skeletal
    proof: This is trivial.

  - property: countable
    proof: This is trivial.

  - property: split abelian
    proof: The short exact sequence $0 \xrightarrow{} \IZ \xrightarrow{p} \IZ \xrightarrow{} \IZ/p \xrightarrow{} 0$ does not split.

  - property: cogenerator
    proof: Let $Q$ be a finitely generated abelian group. By their well-known classification, we have $Q = F \oplus T$ for a free abelian group $F$ and a finite abelian group $T$. Let $p$ be a prime number which does not divide the order of $T$. Then $\Hom(\IZ/p, Q) = 0$, but $\IZ/p \neq 0$. Therefore, $Q$ is no cogenerator.

special_objects:
  initial object:
    description: trivial group
  terminal object:
    description: trivial group
  coproducts:
    description: '[finite case] direct sum'
  products:
    description: '[finite case] direct products'

special_morphisms:
  isomorphisms:
    description: bijective homomorphisms
    proof: This follows exactly as for abelian groups.
  monomorphisms:
    description: injective homomorphisms
    proof: 'Let $f : A \to B$ be a monomorphism of finitely generated abelian groups. Let $a \in A$ be in the kernel of $a$. Then we may view $a$ as a morphism $a : \IZ \to A$ with $f \circ a = 0$, and $\IZ$ is finitely generated. Hence, $a = 0$.'
  epimorphisms:
    description: surjective homomorphisms
    proof: Use the same proof as for abelian groups.
  regular monomorphisms:
    description: same as monomorphisms
    proof: This is because the category is mono-regular.
  regular epimorphisms:
    description: same as epimorphisms
    proof: This is because the category is epi-regular.
