id: Vect
name: category of vector spaces
notation: $\Vect_K$
objects: vector spaces over a field $K$
morphisms: linear maps
description: This is a special case of the category of modules over a ring, where the ring is a field. It is the prototype of a split abelian category.
nlab_link: https://ncatlab.org/nlab/show/Vect

tags:
  - algebra

related_categories:
  - R-Mod
  - R-Mod_div
  - FinVect
  - FreeAb

satisfied_properties:
  - property: locally small
    proof: There is a forgetful functor $\Vect \to \Set$ and $\Set$ is locally small.

  - property: split abelian
    proof: That $\Vect$ is abelian is a standard fact, see <a href="https://ncatlab.org/nlab/show/Categories+for+the+Working+Mathematician" target="_blank">Mac Lane</a>, Ch. VIII. Furthermore, it is a fact from linear algebra that every subspace has a complement, which is why every short exact sequence splits.

  - property: finitary algebraic
    proof: Take the algebraic theory of a vector space.

unsatisfied_properties:
  - property: skeletal
    proof: This is trivial.

  - property: CSP
    proof: The canonical homomorphism $\bigoplus_{n \geq 0} K \to \prod_{n \geq 0} K$ is not surjective, hence no epimorphism.

special_objects:
  initial object:
    description: trivial vector space
  terminal object:
    description: trivial vector space
  coproducts:
    description: direct sums
  products:
    description: direct products with pointwise operations

special_morphisms:
  isomorphisms:
    description: bijective linear maps
    proof: This characterization holds in every algebraic category.
  monomorphisms:
    description: injective linear maps
    proof: 'This holds in every finitary algebraic category: the forgetful functor to $\Set$ is faithful, hence reflects monomorphisms, and it is continuous (even representable), hence preserves monomorphisms.'
  epimorphisms:
    description: surjective linear maps
    proof: The forgetful functor to abelian groups is faithful and preserves colimits, hence reflects and preserves epimorphisms. Alternatively, just use the same proof as for abelian groups.
  regular monomorphisms:
    description: same as monomorphisms
    proof: This is because the category is mono-regular.
  regular epimorphisms:
    description: surjective homomorphisms
    proof: This holds in every finitary algebraic category.
