id: walking_isomorphism
name: walking isomorphism
notation: $\Isom$
objects: two objects $0$ and $1$
morphisms: identities, and two morphisms $0 \to 1$ and $1 \to 0$ that are mutually inverse
description: >-
  This category can be pictured as:
  $$\{0 \rightleftarrows 1\}$$
  Its name comes from the fact that a functor $\Isom \to \C$ is the same as an isomorphism in $\C$. The walking isomorphism is actually equivalent to the trivial category.
nlab_link: https://ncatlab.org/nlab/show/walking+isomorphism
tags:
  - category theory
  - finite
  - thin

related_categories:
  - '1'
  - walking_idempotent
  - walking_morphism

satisfied_properties:
  - property: small
    proof: This is trivial.

  - property: finite
    proof: This is trivial.

  - property: trivial
    proof: The inclusion $\{0\} \hookrightarrow \Isom$ is an equivalence.

unsatisfied_properties:
  - property: skeletal
    proof: The two objects are isomorphic, but different.

special_objects:
  initial object:
    description: both objects
  terminal object:
    description: both objects
  coproducts:
    description: $0 \sqcup 0 = 0$
  products:
    description: $0 \times 0 = 0$

special_morphisms:
  isomorphisms:
    description: every morphism
    proof: This is trivial.
  monomorphisms:
    description: every morphism
    proof: This is trivial.
  epimorphisms:
    description: every morphism
    proof: This holds because it is a groupoid.
  regular monomorphisms:
    description: same as isomorphisms
    proof: This is because the category is right cancellative.
  regular epimorphisms:
    description: same as isomorphisms
    proof: This is because the category is left cancellative.
