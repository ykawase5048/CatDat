id: Meas
name: category of measurable spaces
notation: $\Meas$
objects: measurable spaces
morphisms: measurable maps
description: This is very similar to the category of topological spaces. Accordingly, limits and colimits can be constructed in the same way.
nlab_link: https://ncatlab.org/nlab/show/Meas

tags:
  - analysis

related_categories:
  - Top

comments:
  - The thread <a href="https://math.stackexchange.com/questions/5024471/">MSE/5024471</a> asks for the finitely presentable objects of this category.

satisfied_properties:
  - property: locally small
    proof: There is a forgetful functor $\Meas \to \Set$ and $\Set$ is locally small.

  - property: semi-strongly connected
    proof: Every non-empty measurable space is weakly terminal (by using constant maps).

  - property: generator
    proof: The one-point measurable space (with the unique $\sigma$-algebra) is a generator since it represents the forgetful functor $\Meas \to \Set$.

  - property: cogenerator
    proof: Take the two-element set $2$ endowed with the trivial $\sigma$-algebra (where only $\varnothing$ and $2$ are measurable), and use that $2$ is a cogenerator for $\Set$.

  - property: well-powered
    proof: This follows from the fact that monomorphisms are injective in this category.

  - property: well-copowered
    proof: This follows from the fact that epimorphisms are surjective in this category.

  - property: complete
    proof: Take the limit of the underlying sets and take the smallest $\sigma$-algebra making all projections measurable.

  - property: cocomplete
    proof: Take the colimit of the underlying sets and take the largest $\sigma$-algebra making all inclusions measurable. That is, a set is measurable iff its preimage under each inclusion is measurable.

  - property: infinitary extensive
    proof: '[Sketch] Since <a href="/category/Set">$\Set$</a> is infinitary extensive, a map $f : Y \to \coprod_i X_i \eqqcolon X$ corresponds to a decomposition $Y = \coprod_i Y_i$ (as sets) with maps $f_i : Y_i \to X_i$. Endow the measurable subset $Y_i \subseteq Y$ with the restricted $\sigma$-algebra. If $f$ is measurable, each $f_i$ is measurable, and $Y = \coprod_i Y_i$ holds as measurable spaces.'

  - property: filtered-colimit-stable monomorphisms
    proof: This follows from <a href="/content/filtered-monos">this lemma</a> applied to the forgetful functor to $\Set$.

  - property: regular subobject classifier
    proof: The set $\{0,1\}$ with the trivial $\sigma$-algebra is a regular subobject classifier since measurable maps $X \to \{0,1\}$ correspond to subsets of $X$.

unsatisfied_properties:
  - property: skeletal
    proof: This is trivial.

  - property: balanced
    proof: Take a set $X$ with two different $\sigma$-algebras $\A \subset \B$ (for example, $\A = \{\varnothing,X\}$ and $\B = P(X)$ when $X$ has at least $2$ elements), then the identity map $(X,\B) \to (X,\A)$ provides a counterexample.

  - property: Malcev
    proof: Use that <a href="/category/Set">$\Set$</a> is not Malcev and endow sets with the trivial $\sigma$-algebra.

  - property: cartesian filtered colimits
    proof: See <a href="https://math.stackexchange.com/questions/5027218" target="_blank">MSE/5027218</a>.

  - property: cofiltered-limit-stable epimorphisms
    proof: We already know that <a href="/category/Set">$\Set$</a> does not have this property. Now apply the contrapositive of the dual of <a href="/content/filtered-monos">this lemma</a> to the functor $\Set \to \Meas$ which equips a set with the trivial $\sigma$-algebra.

  - property: effective cocongruences
    proof: 'The proof is similar to the one for <a href="/category/Top">$\Top$</a>: Use the trivial $\sigma$-algebra on a two-point set.'

  - property: regular
    proof: >-
      In a regular category, regular epimorphisms are stable under pullbacks and compositions (see Prop. 3.7 at the <a href="https://ncatlab.org/nlab/show/regular+epimorphism" target="_blank">nLab</a>), which implies that for every regular epimorphism $f : X \to Y$ also $f \times f : X \times X \to Y \times Y$ is a regular epimorphism. We will show that this fails in $\Meas$.


      Let $X \coloneqq [0, 1)$ equipped with the standard Borel $\sigma$-algebra $\B$. Consider the equivalence relation $x \sim y \iff x-y \in \IQ$, let $Y \coloneqq X /{\sim}$ be the set of equivalence classes, and $f: X \to Y$ be the natural projection map. Equip $Y$ with the quotient $\sigma$-algebra $\Sigma_Y$, so that $f$ is a regular epimorphism.


      Now consider the diagonal in the quotient space $\Delta_Y \coloneqq \{(y, y) \mid y \in Y\}$. Then
      $$\textstyle (f \times f)^{-1}(\Delta_Y) = \{(x_1, x_2) \in [0, 1)^2 \mid x_1 - x_2  \in \IQ\} \eqqcolon \bigcup_{q \in \IQ} L_q$$
      where each $L_q$ is the intersection of the diagonal level sets of $x_1 - x_2$ with $[0, 1)^2$. Because each line is closed in $\IR^2$, its intersection with $[0, 1)^2$ is a Borel set in $X \times X$. Since a countable union of Borel sets is Borel, $(f \times f)^{-1}(\Delta_Y) \in \B \otimes \B$.


      Now take any set $B \in \Sigma_Y$. Its preimage $f^{-1}(B)$ is a Borel set in $[0, 1)$ that is invariant under rational translations modulo 1. Because the action of $\IQ / \IZ$ on $[0, 1)$ is ergodic, the Lebesgue measure $\lambda(f^{-1}(B))$ must be exactly $0$ or $1$. Assume for contradiction that $\Sigma_Y$ is countably separated, i.e. there exists a countable sequence of measurable sets $(B_n)_{n \geq 1}$ in $\Sigma_Y$ that separates the points of $Y$. Let $A_n \coloneqq f^{-1}(B_n)$. Every $A_n$ has $\lambda(A_n) = 0$ or $\lambda(A_n) = 1$.


      Define a "bad set" $N \subseteq [0, 1)$ as
      $$\textstyle N \coloneqq \left( \bigcup_{\lambda(A_n)=0} A_n \right) \cup \left( \bigcup_{\lambda(A_n)=1} A_n^c \right)$$
      Because $N$ is a countable union of sets with measure $0$, we have $\lambda(N) = 0$, and thus $\lambda([0, 1) \setminus N)=1$. For any two points $x, y \in [0, 1) \setminus N$, clearly $x \in A_n \iff y \in A_n$ for every $n$. Consequently, the sequence $(B_n)$ fails to separate $f(x)$ and $f(y)$. Hence, $x \sim y$. Since $[0, 1) \setminus N$ has measure $1$, it is uncountable. Because each equivalence class is only countable, these uncountably many points must belong to uncountably many different equivalence classes. Thus, we can easily pick $x, y \in [0, 1) \setminus N$ where $x \not\sim y$. Thus $\Sigma_Y$ is not countably separated.


      Hence by Theorem 6.5.7 in Bogachev's <a href="https://link.springer.com/book/10.1007/978-3-540-34514-5" target="_blank">Measure theory</a> $\Delta_Y \notin \Sigma_Y \otimes \Sigma_Y$. We have identified a non-measurable subset of $Y \times Y$ whose preimage under $f \times f$ is measurable. Therefore, $f \times f$ is not a regular epimorphism.

special_objects:
  initial object:
    description: empty set with the unique $\sigma$-algebra
  terminal object:
    description: singleton set with the unique $\sigma$-algebra
  coproducts:
    description: disjoint union with the obvious $\sigma$-algebra
  products:
    description: direct products with the <a href="https://de.wikipedia.org/wiki/Produkt-%CF%83-Algebra" target="_blank">product $\sigma$-algebra</a>

special_morphisms:
  isomorphisms:
    description: bijective measurable maps that map measurable sets to measurable sets
    proof: This is easy.
  monomorphisms:
    description: injective measurable maps
    proof: For the non-trivial direction, the forgetful functor to $\Set$ is representable (by the terminal object), hence preserves monomorphisms.
  epimorphisms:
    description: surjective measurable maps
    proof: Use the same proof as for sets, where $2 = \{0,1\}$ is endowed with the trivial $\sigma$-algebra.
  regular monomorphisms:
    description: embeddings
    proof: '(This is the same proof as for <a href="/category/Top">$\Top$</a>.) Equalizers are embeddings by their construction. Conversely, if $f : X \to Y$ is an embedding, then $f$ is the equalizer of the two characteristic maps $\chi_Y, \chi_{f(X)} : Y \rightrightarrows \{0,1\}$, where $\{0,1\}$ carries the trivial $\sigma$-algebra.'
  regular epimorphisms:
    description: 'A measurable map $f : X \to Y$ is a regular epimorphism iff $f$ is surjective and $f$ is a quotient map, meaning that a subset of $Y$ is measurable when its $f$-preimage is measurable.'
    proof: 'The proof works the same as for $\Top$ (and can in fact be generalized to topological functors). Regular epimorphisms are surjective quotient maps by the explicit construction of coequalizers. Conversely, if $q : X \to Y$ is a surjective quotient map, then one checks that $q$ is the coequalizer of its kernel pair $X \times_Y X \rightrightarrows X$: This is true for the underlying sets, and measurability of the induced morphism follows since $q$ is a quotient map.'
