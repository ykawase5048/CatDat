id: N
name: poset of natural numbers
notation: $(\IN,\leq)$
objects: natural numbers $0, 1, 2, \dotsc$
morphisms: 'a unique morphism $(n,m) : n \to m$ if $n \leq m$'
description: This can also be seen as the path category of the infinite linear graph $\bullet \to \bullet \to \bullet \to \cdots$.
nlab_link: null

tags:
  - number theory
  - thin

related_categories:
  - N_oo
  - On
  - Z_div

satisfied_properties:
  - property: small
    proof: This is trivial.

  - property: countable
    proof: This is trivial.

  - property: thin
    proof: This is trivial.
    check_redundancy: false

  - property: finitely cocomplete
    proof: Finitely many natural numbers have a supremum natural number.
    check_redundancy: false

  - property: binary products
    proof: Two natural numbers have a minimum.

  - property: connected limits
    proof: Every non-empty set of natural numbers has a minimum.

  - property: semi-strongly connected
    proof: This is trivial.

  - property: direct
    proof: This is because the natural numbers with respect to $<$ are well-founded.

unsatisfied_properties:
  - property: countable coproducts
    proof: The numbers $0,1,2,\dotsc$ have no supremum, i.e. no coproduct.

special_objects:
  initial object:
    description: $0$
  coproducts:
    description: '[finite case] supremum'

special_morphisms:
  isomorphisms:
    description: only the identity morphisms
    proof: This is true for every poset (regarded as a category).
  monomorphisms:
    description: every morphism
    proof: It is a thin category.
  epimorphisms:
    description: every morphism
    proof: It is a thin category.
  regular monomorphisms:
    description: same as isomorphisms
    proof: This is because the category is right cancellative.
  regular epimorphisms:
    description: same as isomorphisms
    proof: This is because the category is left cancellative.
