id: walking_idempotent
name: walking idempotent
notation: $\Idem$
objects: a single object $0$
morphisms: 'two morphisms $\id_0,e : 0 \to 0$ with $e^2=e$'
description: The name of this category comes from the fact that a functor out of it is the same as an <a href="https://ncatlab.org/nlab/show/idempotent" target="_blank">idempotent morphism</a> in the target category. It can also be seen as the delooping of the monoid $\{1,e\}$ in which $e^2=e$.
nlab_link: null

tags:
  - category theory
  - finite
  - single object

related_categories:
  - BG_f
  - walking_isomorphism
  - walking_morphism
  - walking_splitting

satisfied_properties:
  - property: small
    proof: This is trivial.

  - property: finite
    proof: This is trivial.

  - property: gaunt
    proof: This is obvious.

  - property: self-dual
    proof: This is obvious.

  - property: generator
    proof: The unique object is a generator for trivial reasons.

  - property: subobject-trivial
    proof: This is because the identity is the only monomorphism.

  - property: preadditive
    proof: The monoid $\{1,e\}$ with $e^2=e$ is the underlying multiplicative monoid of the ring $\IZ/2$, where $e=0$. Thus, the (unique) preadditive structure is given by $1 + e = e + 1 = 1$, $e + e = e$ and $1 + 1 = e$.

  - property: ℵ₁-filtered
    proof: 'In fact, the walking idempotent is $\kappa$-filtered for every regular infinite cardinal $\kappa$: Every diagram $D : \I \to \Idem$ has the cocone $(e : D(i) \to 0)_{i \in \I}$.'

unsatisfied_properties:
  - property: terminal object
    proof: This is obvious.

  - property: Cauchy complete
    proof: The idempotent $e$ does not split.

special_objects: {}

special_morphisms:
  isomorphisms:
    description: the identity
    proof: This is trivial.
  monomorphisms:
    description: the identity
    proof: This is trivial.
  epimorphisms:
    description: the identity
    proof: This is trivial.
  regular monomorphisms:
    description: the identity
    proof: This is trivial.
  regular epimorphisms:
    description: the identity
    proof: This is trivial.
