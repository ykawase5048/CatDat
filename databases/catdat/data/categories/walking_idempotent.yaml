id: walking_idempotent
name: walking idempotent
notation: $\Idem$
objects: a single object $0$
morphisms: 'two morphisms $\id_0,e : 0 \to 0$ with $e^2=e$'
description: The name of this category comes from the fact that a functor out of it is the same as an <a href="https://ncatlab.org/nlab/show/idempotent" target="_blank">idempotent morphism</a> in the target category. It can also be seen as the delooping of the monoid $\{1,e\}$ in which $e^2=e$.

tags:
  - category theory
  - finite
  - single object

related_categories:
  - BG_f
  - walking_isomorphism
  - walking_morphism
  - walking_splitting

satisfied_properties:
  - property_id: finite
    reason: This is trivial.

  - property_id: small
    reason: This is trivial.

  - property_id: generator
    reason: The unique object is a generator for trivial reasons.

  - property_id: gaunt
    reason: This is obvious.

  - property_id: self-dual
    reason: This is obvious.

  - property_id: subobject-trivial
    reason: This is because the identity is the only monomorphism.

  - property_id: preadditive
    reason: The monoid $\{1,e\}$ with $e^2=e$ is the underlying multiplicative monoid of the ring $\IZ/2$, where $e=0$. Thus, the (unique) preadditive structure is given by $1 + e = e + 1 = 1$, $e + e = e$ and $1 + 1 = e$.

  - property_id: filtered
    reason: The pair $\id,e$ is coequalized by $e$ (non-universally).

unsatisfied_properties:
  - property_id: terminal object
    reason: This is obvious.

  - property_id: Cauchy complete
    reason: The idempotent $e$ does not split.

special_objects: {}

special_morphisms:
  isomorphisms:
    description: the identity
    reason: This is trivial.
  monomorphisms:
    description: the identity
    reason: This is trivial.
  epimorphisms:
    description: the identity
    reason: This is trivial.
  regular monomorphisms:
    description: the identity
    reason: This is trivial.
  regular epimorphisms:
    description: the identity
    reason: This is trivial.
