- id: continuous_consequences
  assumptions:
    - continuous
  conclusions:
    - cofinitary
    - preserves products
    - left exact
  proof: This is trivial.
  is_equivalence: false

- id: products_consequences
  assumptions:
    - preserves products
  conclusions:
    - preserves finite products
  proof: This is trivial.
  is_equivalence: false

- id: finite_products_consequences
  assumptions:
    - preserves finite products
  conclusions:
    - preserves terminal objects
  proof: This is trivial.
  is_equivalence: false

- id: continuous_criterion
  assumptions:
    - preserves equalizers
    - preserves products
  mapped_assumptions:
    source:
      - products
  conclusions:
    - continuous
  proof: This follows from the construction of limits via equalizers and products, see  <a href="https://ncatlab.org/nlab/show/Categories+for+the+Working+Mathematician" target="_blank">Mac Lane</a>, Ch. V, Theorem 2.2.
  is_equivalence: false

- id: continuous_criterion_filtered
  assumptions:
    - cofinitary
    - left exact
  mapped_assumptions:
    source:
      - finitely complete
  conclusions:
    - continuous
  proof: This is because every limit can be written as a filtered limit of finite limits, see <a href="https://ncatlab.org/nlab/show/Categories+for+the+Working+Mathematician" target="_blank">Mac Lane</a>, Ch. IX, Theorem 1.1.
  is_equivalence: false

- id: product_criterion_filtered
  assumptions:
    - cofinitary
    - preserves finite products
  mapped_assumptions:
    source:
      - finite products
  conclusions:
    - preserves products
  proof: This is because every product can be written as a filtered limit of finite products, see <a href="https://ncatlab.org/nlab/show/Categories+for+the+Working+Mathematician" target="_blank">Mac Lane</a>, Ch. IX, Theorem 1.1.
  is_equivalence: false

- id: exact_definition
  assumptions:
    - exact
  conclusions:
    - left exact
    - right exact
  proof: This holds by definition.
  is_equivalence: true

- id: left_exact_consequences
  assumptions:
    - left exact
  conclusions:
    - preserves finite products
    - preserves equalizers
    - preserves monomorphisms
  proof: >-
    Finite products and equalizers are special cases of finite limits. Moreover, a morphism $f : X \to Y$ is a monomorphism if and only the square
    $$\begin{CD} X @>{\id_X}>> X \\ @V{\id_X}VV @VV{f}V \\ X @>>{f}> Y \end{CD}$$
    is a pullback square, and pullbacks are special cases of finite limits.
  is_equivalence: false

- id: left_exact_criterion
  assumptions:
    - preserves equalizers
    - preserves finite products
  mapped_assumptions:
    source:
      - finite products
  conclusions:
    - left exact
  proof: This follows from the construction of finite limits via equalizers and finite products, see  <a href="https://ncatlab.org/nlab/show/Categories+for+the+Working+Mathematician" target="_blank">Mac Lane</a>, Ch. V, Theorem 2.2.
  is_equivalence: false

- id: representable_is_continuous
  assumptions:
    - representable
  conclusions:
    - continuous
  proof: This is standard, see <a href="https://ncatlab.org/nlab/show/Categories+for+the+Working+Mathematician" target="_blank">Mac Lane</a>, Ch. V, Theorem 4.1.
  is_equivalence: false

- id: equalizers_include_coreflexive_equalizers
  assumptions:
    - preserves equalizers
  conclusions:
    - preserves coreflexive equalizers
  proof: This is trivial.
  is_equivalence: false

- id: criterion_coreflexive_equalizers
  assumptions:
    - preserves coreflexive equalizers
    - preserves finite products # TODO: only need binary products
  mapped_assumptions:
    source:
      - binary products
  conclusions:
    - preserves equalizers
  proof: This follows easily from <a href="/category-implication/equalizers_via_coreflexive_equalizers">this result</a> about categories.
  is_equivalence: false

- id: mono-preserving_criterion
  assumptions:
    - preserves equalizers
  mapped_assumptions:
    source:
      - mono-regular
  conclusions:
    - preserves monomorphisms
  proof: Any monomorphism in the domain is a regular monomorphism and is mapped to a regular monomorphism.
  is_equivalence: false

- id: zero_preserving_condition
  assumptions:
    - preserves terminal objects
  mapped_assumptions:
    source:
      - pointed
    target:
      - pointed
  conclusions:
    - preserves initial objects
  proof: This is trivial.
  is_equivalence: false

- id: biproduct_preserving_condition
  assumptions:
    - preserves finite products
  mapped_assumptions:
    source:
      - biproducts
    target:
      - biproducts
  conclusions:
    - preserves finite coproducts
  proof: This is trivial.
  is_equivalence: false

- id: lift_implies_preservation
  assumptions:
    - lifts small limits
  mapped_assumptions:
    target:
      - complete
  conclusions:
    - continuous
  proof: 'Let $F : \C \to \D$ be the given functor and $X : \I \to \C$ be a small diagram. Since $\D$ is complete, the diagram $F \circ X$ has a limit cone. Since $F$ lifts small limits, there is a limit cone of $X$ which is mapped by $F$ to the limit cone of $F \circ X$. Hence, $F$ preserves this limit cone of $X$. Since any other limit cone of $X$ is isomorphic to it, the claim follows.'
  is_equivalence: false

- id: preservation_implies_lift
  assumptions:
    - continuous
  mapped_assumptions:
    source:
      - complete
  conclusions:
    - lifts small limits
  proof: 'Let $F : \C \to \D$ be the given functor and $X : \I \to \C$ be a small diagram such that $F \circ X$ has a limit cone. By assumption, $X$ has a limit cone, and $F$ maps it to a limit cone of $F \circ X$. But then the image must be isomorphic to the given limit cone.'
  is_equivalence: false
