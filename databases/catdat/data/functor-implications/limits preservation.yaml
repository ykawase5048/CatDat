- id: continuous_criterion
  assumptions:
    - equalizer-preserving
    - product-preserving
  source_assumptions:
    - products
  target_assumptions: []
  conclusions:
    - continuous
  reason: This follows from the construction of limits via equalizers and products, see  <a href="https://ncatlab.org/nlab/show/Categories+for+the+Working+Mathematician" target="_blank">Mac Lane</a>, Ch. V, Theorem 2.2.
  is_equivalence: false

- id: continuous_criterion_filtered
  assumptions:
    - cofinitary
    - left exact
  source_assumptions:
    - finitely complete
  target_assumptions: []
  conclusions:
    - continuous
  reason: This is because every limit can be written as a filtered limit of finite limits, see <a href="https://ncatlab.org/nlab/show/Categories+for+the+Working+Mathematician" target="_blank">Mac Lane</a>, Ch. IX, Theorem 1.1.
  is_equivalence: false

- id: product_criterion_filtered
  assumptions:
    - cofinitary
    - finite-product-preserving
  source_assumptions:
    - finite products
  target_assumptions: []
  conclusions:
    - product-preserving
  reason: This is because every product can be written as a filtered limit of finite products, see <a href="https://ncatlab.org/nlab/show/Categories+for+the+Working+Mathematician" target="_blank">Mac Lane</a>, Ch. IX, Theorem 1.1.
  is_equivalence: false

- id: exact_definition
  assumptions:
    - exact
  source_assumptions: []
  target_assumptions: []
  conclusions:
    - left exact
    - right exact
  reason: This holds by definition.
  is_equivalence: true

- id: left_exact_consequences
  assumptions:
    - left exact
  source_assumptions: []
  target_assumptions: []
  conclusions:
    - finite-product-preserving
    - equalizer-preserving
    - monomorphism-preserving
  reason: >-
    Finite products and equalizers are special cases of finite limits. Moreover, a morphism $f : X \to Y$ is a monomorphism if and only the square
    $$\begin{CD} X @>{\id_X}>> X \\ @V{\id_X}VV @VV{f}V \\ X @>>{f}> Y \end{CD}$$
    is a pullback square, and pullbacks are special cases of finite limits.
  is_equivalence: false

- id: left_exact_criterion
  assumptions:
    - equalizer-preserving
    - finite-product-preserving
  source_assumptions:
    - finite products
  target_assumptions: []
  conclusions:
    - left exact
  reason: This follows from the construction of finite limits via equalizers and finite products, see  <a href="https://ncatlab.org/nlab/show/Categories+for+the+Working+Mathematician" target="_blank">Mac Lane</a>, Ch. V, Theorem 2.2.
  is_equivalence: false

- id: representable_is_continuous
