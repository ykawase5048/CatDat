- id: monadic_consequences
  assumptions:
    - monadic
  conclusions:
    - conservative
    - faithful
    - right adjoint
  proof: This is clear since for a monad $T$ the forgetful functor from the category of $T$-algebras has these properties.
  is_equivalence: false

- id: crude_monadicity_theorem
  assumptions:
    - right adjoint
    - conservative
    - preserves reflexive coequalizers
  mapped_assumptions:
    source:
      - reflexive coequalizers
  conclusions:
    - monadic
  proof: This is the crude monadicity theorem. A proof can be found in <a href="https://ncatlab.org/nlab/show/Sheaves+in+Geometry+and+Logic" target="_blank">Mac Lane & Moerdijk</a>, Thm. IV.4.2.
  is_equivalence: false

- id: monadic_lift_limits
  assumptions:
    - monadic
  conclusions:
    - lifts small limits
  proof: 'See <a href="https://ncatlab.org/nlab/show/Abstract+and+Concrete+Categories" target="_blank">Joy of Cats</a>, Prop. 20.12.'
  is_equivalence: false
