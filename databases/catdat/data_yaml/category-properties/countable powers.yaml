id: countable powers
relation: has
description: A category has <i>countable powers</i> when for every object $X$ and every countable set $I$ the power $X^I$ exists.
nlab_link: https://ncatlab.org/nlab/show/powering
dual_property_id: countable copowers
invariant_under_equivalences: true

related_properties:
