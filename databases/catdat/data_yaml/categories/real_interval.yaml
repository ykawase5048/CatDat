id: real_interval
name: poset [0,1]
notation: $([0,1],\leq)$
objects: real numbers between $0$ and $1$
morphisms: "a unique morphism $(s,t) : s \\to t$ when $s \\leq t$"
description: Every poset can be regarded as a small thin category. This is a specific example. This category is locally $\aleph_1$-presentable (in fact, <i>every</i> object is $\aleph_1$-presentable), but not locally finitely presentable (in fact, only $0$ is finitely presentable).
nlab_link: https://ncatlab.org/nlab/show/interval

tags:
  - analysis
  - thin

related_categories:
  - N_oo

satisfied_properties:
  - property_id: small
    reason: This is trivial.

  - property_id: self-dual
    reason: Take $t \mapsto 1-t$.

  - property_id: semi-strongly connected
    reason: This is trivial.

  - property_id: locally ℵ₁-presentable
    reason: See <a href="https://math.stackexchange.com/questions/4481902/locally-presentable-vs-compactly-presentable-categories#comment9399784_4482185" target="_blank">MSE/4481902</a>.

  - property_id: skeletal
    reason: The relation $\leq$ is antisymmetric.

unsatisfied_properties:
  - property_id: essentially countable
    reason: This is trivial.

  - property_id: locally finitely presentable
    reason: It suffices to prove that $0$ (the initial object) is the only finitely presentable object. If $s > 0$, then $s = \sup_{n \in \IN, \, s \geq 1/n } (s - 1/n)$, but there is no $n$ with $s \leq s - 1/n$.

  - property_id: direct
    reason: Consider the strictly decreasing sequence $1/2^n$ for $n \geq 0$.

  - property_id: inverse
    reason: Consider the strictly increasing sequence $1 - 1/2^n$ for $n \geq 0$.

special_objects:
  initial object:
    description: $0$
  terminal object:
    description: $1$
  coproducts:
    description: supremum
  products:
    description: infimum

special_morphisms:
  isomorphisms:
    description: only the identity morphisms
    reason: This is true for every poset (regarded as a category).
  monomorphisms:
    description: every morphism
    reason: It is a thin category.
  epimorphisms:
    description: every morphism
    reason: It is a thin category.
  regular monomorphisms:
    description: same as isomorphisms
    reason: This is because the category is right cancellative.
  regular epimorphisms:
    description: same as isomorphisms
    reason: This is because the category is left cancellative.
