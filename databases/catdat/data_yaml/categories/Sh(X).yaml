id: Sh(X)
name: category of sheaves
notation: $\Sh(X)$
objects: sheaves of sets on a topological space $X$
morphisms: morphisms of sheaves
description: Here, we assume that the topological space $X$ is neither discrete nor indiscrete, since otherwise this category is just a product of copies of $\Set$. Another valid notation is $\Sh(X,\Set)$.
nlab_link: https://ncatlab.org/nlab/show/category+of+sheaves

tags:
  - algebraic geometry
  - topology

related_categories:
  - Set
  - SetxSet
  - Sh(X,Ab)

comments:
  - It is likely that neither of the currently remaining unknown properties (finitary algebraic, locally ℵ₁-presentable, exact filtered colimits, etc.) are satisfied for a <i>generic</i> space $X$, but we need to make this precise by adding additional requirements to $X$. Maybe we need to create separate entries for specific spaces $X$.

satisfied_properties:
  - property_id: locally small
    reason: This is easy.

  - property_id: Grothendieck topos
    reason: This holds by definition of a Grothendieck topos.

unsatisfied_properties:
  - property_id: skeletal
    reason: Consider constant sheaves for isomorphic but non-equal sets.

  - property_id: trivial
    reason: This is because $X$ is assumed to be non-empty.

special_objects:
  initial object:
    description: constant sheaf with value $\varnothing$, sending all non-empty open sets to $\varnothing$ and the empty set to a singleton
  terminal object:
    description: constant sheaf with value a singleton
  coproducts:
    description: associated sheaf to the section-wise disjoint union
  products:
    description: section-wise defined direct product

special_morphisms:
  isomorphisms:
    description: morphisms of sheaves that are bijective on every open set
    reason: This is easy.
  monomorphisms:
    description: morphisms of sheaves that are injective on every open subset
    reason: "For the non-trivial direction, assume that $f : F \\to G$ is a monomorphism of sheaves on $X$. Then the diagonal $F \\to F \\times_G F$ is an isomorphism. Since pullbacks of sheaves are constructed section-wise, it follows that the diagonal $F(U) \\to F(U) \\times_{G(U)} F(U)$ is an isomorphism for every open set $U \\subseteq X$. But this means that $f(U) : F(U) \\to G(U)$ is injective."
  epimorphisms:
    description: 'morphisms of sheaves $f : F \to G$ that are "locally surjective": for every local section $g \in G(U)$ there is an open covering $U = \bigcup_{i \in I} U_i$ such that each $g|_{U_i} \in G(U_i)$ is contained in the image of $f(U_i) : F(U_i) \to G(U_i)$.'
    reason: "The one direction is easy. For the other one, assume that $f : F \\to G$ is an epimorphism of sheaves. For every $x \\in X$ the map on stalks $f_x : F_x \\to G_x$ is an epimorphism because the stalk functor $\\Sh(X) \\to \\Set$ admits a right adjoint: take skyscraper sheaves. For $x \\in U$ then $g_x \\in G_x$ has a preimage in $F_x$, say represented by some $f \\in F(V_x)$ for some $x \\in V_x \\subseteq U$. By construction of the stalk $G_x$, there is some $x \\in U_x \\subseteq V_x$ with $f(U_x)(f|_{U_x}) = g|_{U_x}$. Hence, the sets $(U_x)$ provide the open covering."
  regular monomorphisms:
    description: same as monomorphisms
    reason: This is because the category is mono-regular.
  regular epimorphisms:
    description: same as epimorphisms
    reason: This is because the category is epi-regular.
