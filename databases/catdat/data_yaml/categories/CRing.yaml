id: CRing
name: category of commutative rings
notation: $\CRing$
objects: commutative rings
morphisms: ring homomorphisms
nlab_link: https://ncatlab.org/nlab/show/CRing

tags:
  - algebra

related_categories:
  - CAlg(R)
  - Ring
  - Rng

comments:
  - Regular monomorphisms are discussed in <a href="https://math.stackexchange.com/questions/695685" target="_blank">MSE/695685</a>, but probably they cannot be classified.

satisfied_properties:
  - property_id: locally small
    reason: There is a forgetful functor $\CRing \to \Set$ and $\Set$ is locally small.

  - property_id: finitary algebraic
    reason: Take the algebraic theory of a commutative ring.

  - property_id: strict terminal object
    reason: "If $f : 0 \\to R$ is a homomorphism, then $R$ satisfies $1=f(1)=f(0)=0$, so that $R=0$."
    check_redundancy: false

  - property_id: Malcev
    reason: This follows in the same way as for groups, see also Example 2.2.5 in <a href="https://ncatlab.org/nlab/show/Malcev,+protomodular,+homological+and+semi-abelian+categories" target="_blank">Malcev, protomodular, homological and semi-abelian categories</a>.

  - property_id: coextensive
    reason: "[Sketch] A ring homomorphism $f : A \\times B \\to R$ yields the idempotent element $e := f(1,0) \\in R$, so that $R \\cong eR \\times (1-e)R$. Then $f$ decomposes into the ring homomorphisms $f_A : A \\to eR$, $f_A(a) := f(a,0)$ and $f_B : B \\to (1-e)R$, $f_B(b) := f(0,b)$."

unsatisfied_properties:
  - property_id: balanced
    reason: The inclusion $\IZ \hookrightarrow \IQ$ is a counterexample.

  - property_id: cogenerating set
    reason: 'We apply <a href="/lemma/missing_cogenerating_sets">this lemma</a> to the collection of fields: If $F$ is a field and $R$ is a non-trivial commutative ring, any ring homomorphism $F \to R$ is injective. For every infinite cardinal $\kappa$ the field of rational functions in $\kappa$ variables has cardinality $\geq \kappa$ and a non-trivial automorphism (swap two variables).'

  - property_id: skeletal
    reason: This is trivial.

  - property_id: countably codistributive
    reason: "The canonical homomorphism $\\IQ \\otimes \\IZ^{\\IN} \\to (\\IQ \\otimes \\IZ)^{\\IN} = \\IQ^{\\IN}$ is not an isomorphism: its image consists of those sequences of rational numbers whose denominators can be bounded."

  - property_id: semi-strongly connected
    reason: There is no homomorphism between $\IF_2$ and $\IF_3$.

  - property_id: coregular
    reason: See <a href="https://math.stackexchange.com/questions/3745302" target="_blank">MSE/3745302</a>.

  - property_id: co-Malcev
    reason: 'See <a href="https://mathoverflow.net/questions/509552">MO/509552</a>: Consider the forgetful functor $U : \CRing \to \Set$ and the relation $R \subseteq U^2$ defined by $R(A) := \{(a,b) \in U(A)^2 : ab = a^2\}$. Both are representable: $U$ by $\IZ[X]$ and $R$ by $\IZ[X,Y] / \langle XY-X^2 \rangle$. It is clear that $R$ is reflexive, but not symmetric.'

  - property_id: regular quotient object classifier
    reason: "Assume that $P \\to \\IZ$ is a regular quotient object classifier. If $J$ denotes its kernel, this means that every ideal $I \\subseteq A$ of any commutative ring has the form $I = \\langle \\varphi(J) \\rangle$ for a unique homomorphism $\\varphi : P \\to A$. If $\\sigma : A \\to A$ is an automorphism with $\\sigma(I)=I$, then uniqueness gives us $\\sigma \\circ \\varphi = \\varphi$, which means that $\\varphi(J)$ lies in $A^{\\sigma}$, the fixed ring of $\\sigma$. But then $I$ is generated by elements in the fixed ring. This fails for $A = \\IZ[X]$, $I = \\langle X \\rangle$, $\\sigma(X)=-X$. The fixed ring is $\\IZ[X^2]$, and if $I$ was generated by elements $f \\in \\IZ[X^2] \\cap I$, they would be multiples of $X^2$, but $X$ is not a multiple of $X^2$."

  - property_id: cofiltered-limit-stable epimorphisms
    reason: 'For a prime $p$ consider the sequence of projections $\cdots \to \IZ/p^2 \to \IZ/p$ and the constant sequence $\cdots \to \IZ \to \IZ$. The surjective homomorphisms $\IZ \to \IZ/p^n$ induce the homomorphism $\IZ \to \IZ_p$ in the limit, where $\IZ_p$ is the ring of $p$-adic integers. It is not surjective since $\IZ_p$ is uncountable, but this is not sufficient (at least, for this category): We need to use <a href="https://stacks.math.columbia.edu/tag/04W0" target="_blank">SP/04W0</a> to conclude that it is no epimorphism in $\CRing$.'

special_objects:
  initial object:
    description: ring of integers
  terminal object:
    description: zero ring
  coproducts:
    description: tensor products over $\IZ$
  products:
    description: direct products with pointwise operations

special_morphisms:
  isomorphisms:
    description: bijective ring homomorphisms
    reason: This characterization holds in every algebraic category.
  monomorphisms:
    description: injective ring homomorphisms
    reason: "This holds in every finitary algebraic category: the forgetful functor to $\\Set$ is faithful, hence reflects monomorphisms, and it is continuous (even representable), hence preserves monomorphisms."
  epimorphisms:
    description: "A ring map $f : R \\to S$ is an epimorphism iff $S$ equals the <i>dominion</i> of $f(R) \\subseteq S$, meaning that for every $s \\in S$ there is some matrix factorization $(s) = Y X Z$ with $X \\in M_{n \\times n}(R)$, $Y \\in M_{1 \\times n}(S)$, and $Z \\in M_{n \\times 1}(S)$."
    reason: See <a href="https://stacks.math.columbia.edu/tag/04VM" target="_blank">Stacks Project</a> ,or, for many more results, the seminar <a href="https://www.numdam.org/issues/SAC_1967-1968__2_/">Les épimorphismes d'anneaux</a>. See also <a href="https://mathoverflow.net/questions/109/" target="_blank">MO/109</a> for some results.
  regular epimorphisms:
    description: surjective homomorphisms
    reason: This holds in every finitary algebraic category.
