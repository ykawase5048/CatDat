id: left adjoint
relation: is a
description: "A functor $F : \\C \\to \\D$ is a left adjoint when there is a functor $G : \\D \\to \\C$ such that there are natural bijections $\\Hom(F(A),B) \\cong \\Hom(A,G(B))$."
