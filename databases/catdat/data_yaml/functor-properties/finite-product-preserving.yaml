id: finite-product-preserving
relation: is
description: A functor $F$ preserves finite products when for every finite family of objects $(A_i)$ in the source whose product $\prod_i A_i$ exists, also the product $\prod_i F(A_i)$ exists in the target and such that the canonical morphism $F(\prod_i A_i) \to \prod_i F(A_i)$ is an isomorphism.
nlab_link: null
invariant_under_equivalences: true
dual_property_id: finite-coproduct-preserving
